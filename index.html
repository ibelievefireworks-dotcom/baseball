<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b3d2e">
<title>配球クイズ ⚾</title>
<style>
  :root{
    --bg:#0b3d2e; --bg2:#0f5740; --card:#ffffff; --ink:#1a2a26;
    --muted:#6b7d77; --line:#e3eae7; --accent:#2e8b57; --accent2:#1f6b41;
    --gold:#e8b53b; --ok:#1f9d55; --okbg:#e8f7ee; --ng:#d8473b; --ngbg:#fdecea;
    --shadow:0 8px 30px rgba(0,0,0,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    min-height:100vh; min-height:100dvh;
    display:flex; justify-content:center;
    padding:env(safe-area-inset-top) 12px calc(env(safe-area-inset-bottom) + 12px);
  }
  .app{width:100%; max-width:560px; margin:auto 0;}
  .wrap{padding:18px 0 8px;}

  /* header */
  .brand{text-align:center; color:#fff; margin:14px 0 18px;}
  .brand .ball{font-size:40px; line-height:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));}
  .brand h1{font-size:26px; margin:6px 0 2px; letter-spacing:.04em;}
  .brand p{margin:0; font-size:13px; opacity:.85;}

  .card{background:var(--card); border-radius:20px; box-shadow:var(--shadow); padding:20px; }

  h2.sec{font-size:15px; margin:2px 0 12px; color:var(--accent2); display:flex; align-items:center; gap:8px;}
  h2.sec::before{content:""; width:5px; height:18px; background:var(--gold); border-radius:3px;}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    border:1.5px solid var(--line); background:#fff; color:var(--ink);
    border-radius:999px; padding:8px 14px; font-size:13px; cursor:pointer;
    transition:.15s; user-select:none; font-weight:600;
  }
  .chip small{font-weight:400; color:var(--muted); margin-left:4px;}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff;}
  .chip.on small{color:rgba(255,255,255,.8);}
  .chip.book{border-color:var(--accent2); color:var(--accent2);}
  .chip.book.on{background:var(--accent2); color:#fff;}
  .catgroup{margin-bottom:14px;}
  .catgroup:last-child{margin-bottom:0;}
  .cathead{font-size:12.5px; font-weight:800; color:var(--accent2); margin:0 0 7px 2px; display:flex; align-items:center; gap:6px;}
  .cathead::before{content:""; width:8px; height:8px; border-radius:2px; background:var(--gold);}
  /* 進捗ダッシュボード */
  .goal{font-size:12.5px; color:var(--muted); margin:8px 2px 10px; line-height:1.6;}
  .drow{display:flex; align-items:center; gap:8px; font-size:12.5px; margin-bottom:7px;}
  .drow .nm{width:9.5em; font-weight:700; line-height:1.3;}
  .dbarw{flex:1; height:9px; background:#eef2f0; border-radius:99px; overflow:hidden;}
  .dbar{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width .4s;}
  .drow .pc{width:7.5em; text-align:right; color:var(--muted); font-weight:700; font-size:11.5px;}
  .btn.review{background:linear-gradient(135deg,#b7791f,#e8b53b); box-shadow:0 6px 16px rgba(184,121,31,.35); font-size:15px; padding:13px;}

  .row{display:flex; gap:8px; margin-top:8px;}
  .ghost{background:transparent;border:1.5px solid var(--line);color:var(--muted);border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer;}

  .opts{display:flex; gap:8px; flex-wrap:wrap;}
  .opt-num{flex:1; min-width:64px;}
  .seg{display:flex; border:1.5px solid var(--line); border-radius:12px; overflow:hidden;}
  .seg button{flex:1; border:0; background:#fff; padding:10px 4px; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer;}
  .seg button.on{background:var(--accent); color:#fff;}

  .btn{
    display:block; width:100%; border:0; border-radius:14px; cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
    font-size:18px; font-weight:800; padding:16px; margin-top:16px; letter-spacing:.05em;
    box-shadow:0 6px 16px rgba(31,107,65,.4); transition:.12s;
  }
  .btn:active{transform:translateY(1px); box-shadow:0 3px 8px rgba(31,107,65,.4);}
  .btn.lite{background:#fff;color:var(--accent2);border:2px solid var(--accent);box-shadow:none;}

  /* quiz */
  .topbar{display:flex; align-items:center; justify-content:space-between; color:#fff; margin:6px 2px 12px; font-size:13px;}
  .topbar .quit{background:rgba(255,255,255,.15); border:0; color:#fff; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer;}
  .pbar{height:8px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden; margin:0 2px 14px;}
  .pbar i{display:block; height:100%; background:var(--gold); width:0; transition:width .3s;}

  .qmeta{font-size:12px; color:var(--muted); margin-bottom:6px; display:flex; gap:8px; flex-wrap:wrap;}
  .tag{background:#eef5f1; color:var(--accent2); border-radius:6px; padding:2px 8px; font-weight:700;}
  .qtext{font-size:19px; font-weight:700; line-height:1.5; margin:4px 0 16px;}

  .answers{display:flex; flex-direction:column; gap:10px;}
  .ans{
    text-align:left; border:2px solid var(--line); background:#fff; color:var(--ink);
    border-radius:14px; padding:14px 14px 14px 46px; font-size:15.5px; line-height:1.45;
    cursor:pointer; position:relative; transition:.12s; font-weight:600;
  }
  .ans .mk{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:24px;height:24px;border-radius:50%;
    border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--muted); font-weight:800;}
  .ans:active{border-color:var(--accent);}
  .ans.correct{background:var(--okbg); border-color:var(--ok);}
  .ans.correct .mk{background:var(--ok); border-color:var(--ok); color:#fff;}
  .ans.wrong{background:var(--ngbg); border-color:var(--ng);}
  .ans.wrong .mk{background:var(--ng); border-color:var(--ng); color:#fff;}
  .ans.dim{opacity:.55;}
  .ans[disabled]{cursor:default;}

  .explain{margin-top:14px; background:#f6faf8; border:1px solid var(--line); border-left:5px solid var(--accent); border-radius:10px; padding:12px 14px; font-size:14px; line-height:1.6; display:none;}
  .explain.show{display:block; animation:fade .25s;}
  .explain b{color:var(--accent2);}
  .explain .src{display:block; margin-top:6px; font-size:11.5px; color:var(--muted);}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

  /* result */
  .result{text-align:center;}
  .score-ring{width:160px;height:160px;margin:6px auto 10px; position:relative;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .score-ring .num b{font-size:42px; line-height:1; color:var(--accent2);}
  .score-ring .num span{font-size:13px; color:var(--muted);}
  .rmsg{font-size:18px; font-weight:800; margin:4px 0 2px;}
  .rsub{font-size:13px; color:var(--muted); margin-bottom:10px;}
  .review{text-align:left; margin-top:16px;}
  .review h3{font-size:14px; color:var(--accent2); margin:0 0 8px;}
  .rev-item{border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; font-size:13.5px; line-height:1.5;}
  .rev-item .q{font-weight:700; margin-bottom:6px;}
  .rev-item .a{color:var(--ok); font-weight:700;}
  .rev-item .y{color:var(--ng); font-weight:700;}
  .foot{text-align:center; color:rgba(255,255,255,.6); font-size:11px; margin:16px 0 4px; line-height:1.6;}
  #timerWrap{margin:0 0 12px;}
  .tbar{height:10px;background:#eef2f0;border-radius:99px;overflow:hidden;}
  .tbar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#1f9d55,#e8b53b);transition:width .1s linear;}
  .tnum{text-align:right;font-size:12px;color:var(--muted);margin-top:3px;font-weight:800;}
  .tbar.low i{background:var(--ng);}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app">
  <div class="wrap">
    <div class="brand" style="position:relative;">
      <div class="ball">⚾</div>
      <h1>配球クイズ</h1>
      <p>配球・捕手の名著をクイズで学ぶ</p>
      <button id="sndBtn" style="position:absolute;top:0;right:0;border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:10px;padding:8px 10px;font-size:18px;cursor:pointer;">🔊</button>
    </div>

    <!-- ========== START ========== -->
    <div id="start" class="card">
      <h2 class="sec">プレイヤーと進捗</h2>
      <div class="chips" id="profChips"></div>
      <div class="goal" id="goalNote"></div>
      <div id="dash"></div>
      <button class="btn review hidden" id="reviewBtn"></button>
      <button class="btn lite hidden" id="starBtn" style="font-size:15px;padding:13px;margin-top:10px;"></button>
      <button class="btn hidden" id="voiceBtn" style="font-size:15px;padding:13px;margin-top:10px;">🎤 言語化に挑戦（声に出して説明）</button>

      <h2 class="sec" style="margin-top:18px;">本をえらぶ</h2>
      <div class="chips" id="bookChips"></div>
      <h2 class="sec" style="margin-top:18px;">章をえらぶ</h2>
      <div id="catChips"></div>
      <div class="row">
        <button class="ghost" id="selAll">この本の全章をえらぶ</button>
        <button class="ghost" id="selNone">解除</button>
      </div>

      <button class="btn" id="startBtn">スタート ▶（選んだ章をぜんぶ出題）</button>
      <p id="poolInfo" style="text-align:center;color:var(--muted);font-size:12px;margin:12px 0 0;"></p>
    </div>

    <!-- ========== QUIZ ========== -->
    <div id="quiz" class="hidden">
      <div class="topbar">
        <button class="quit" id="quitBtn">✕ やめる</button>
        <div><span id="qpos">1</span> / <span id="qtotal">10</span></div>
        <div>正解 <b id="scoreNow">0</b></div>
      </div>
      <div class="pbar"><i id="pbarFill"></i></div>
      <div class="card">
        <div id="timerWrap" class="hidden"><div class="tbar"><i id="tFill"></i></div><div id="tNum" class="tnum"></div></div>
        <div class="qmeta" id="qmeta"></div>
        <div class="qtext" id="qtext"></div>
        <div class="answers" id="answers"></div>
        <div class="explain" id="explain"></div>
        <div class="row" style="gap:8px;">
          <button class="btn lite hidden" id="prevBtn" style="flex:1;">◀ もどる</button>
          <button class="btn hidden" id="nextBtn" style="flex:1;">次の問題 ▶</button>
        </div>
      </div>
    </div>

    <!-- ========== RESULT ========== -->
    <div id="result" class="hidden">
      <div class="card result">
        <div class="score-ring">
          <svg width="160" height="160">
            <circle cx="80" cy="80" r="70" fill="none" stroke="#e3eae7" stroke-width="14"/>
            <circle id="ring" cx="80" cy="80" r="70" fill="none" stroke="#2e8b57" stroke-width="14" stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="439.8"/>
          </svg>
          <div class="num"><b id="rPct">0%</b><span id="rFrac">0 / 0</span></div>
        </div>
        <div class="rmsg" id="rMsg"></div>
        <div class="rsub" id="rSub"></div>
        <button class="btn" id="againBtn">もう一度（同じ範囲）</button>
        <button class="btn lite" id="homeBtn">範囲を選びなおす</button>

        <div class="review" id="review"></div>
      </div>
      <div class="foot">
        個人学習用 ⚾ 「実戦シナリオ」「応用」は各書の配球原則を状況に応用した問題です<br>出典：『配球の極意』(実業之日本社)／『配球学・リード術』(野村克也・克則／旬報社)<br>『野村ノート』(野村克也／小学館文庫)／『野球配球IQドリル』(野口寿浩監修／メイツ出版)<br>『工藤公康 配球とは』(工藤公康／PHPエディターズ・グループ)
      </div>
    </div>

  </div>
</div>

<script>
/* ============================================================
   問題バンク
   b = 書籍 ("極意" | "リード術")  / c = 章カテゴリ
   q = 問題 / o = 選択肢 / a = 正解index(シャッフル前) / e = 解説 / p = 出典ページ
   ============================================================ */
const BANK = [
/* ===== 実戦シナリオ（両書の配球原則を状況に応用） ===== */
// 実戦｜打者タイプで攻める
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"ドアスイング（バットが体から遠回りする）の打者。最も安全に攻めたいコース・球種は？",o:["インコース低めの速球・シュート系","アウトコース低めの大きなカーブ系","高めいっぱいの伸びるストレート系","真ん中やや外のスライダー系"],a:0,e:"ドアスイングは内角が詰まる。インコース高めはファウルになりやすく、ひざ元（低め）が安全ゾーン。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"アッパースイングの強打者を振り遅れさせたい。要求すべきは？",o:["高めのインコースへ速いストレート","低めいっぱいへ落ちるフォーク","外角低めへ大きく曲がるカーブ","真ん中やや高めのチェンジアップ"],a:0,e:"バットが下から出るため高めの速球に振り遅れる。ただし甘い高め・抜け球は長打に注意。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"基本に忠実なスクエアスタンスのアベレージヒッター。攻めの軸は？",o:["アウトコース低めのストレート・変化球＋緩急","インコース高めの速球で押し続ける","真ん中付近のストレートで力勝負","ボールゾーンの変化球で歩かせ気味に"],a:0,e:"基本に忠実な打者には外角低めを軸に、緩急を加えてタイミングを外す。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"長距離砲（パワーヒッター）。2ストライクまで追い込んだ後の勝負球は？",o:["思い切ってインコース低め・ひざ元へ","外角高めのストレートで押し切る","真ん中低めのスライダーで勝負する","高めのボール球で釣ってから外角へ"],a:0,e:"長く持つ打者・パワーヒッターは追い込んでからインロー・ひざ元へ。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"右投手 対 左打者。食い込ませて詰まらせる「クロスファイア」のコースは？",o:["左打者のインコースへ食い込ませる","左打者の外角低めへ逃がしていく","左打者の高めへ釣り球を見せる","左打者の真ん中低めへ集める"],a:0,e:"左投手→右打者、右投手→左打者へズバッと食い込ませる内角が有効。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"C型（器用型・配球を読んでくる）打者。最も避けたいのは？",o:["単調で読まれやすい“三拍子”のリード","早いカウントで内角を見せること","緩急を続けて使いすぎること","初球にいきなり変化球を使うこと"],a:0,e:"器用な打者には単調なリードは禁物。三拍子のような型は読まれて危険信号。",p:"『リード術』上級編 打者4分類"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"D型（不器用型・真っ直ぐか変化球どちらか狙い）打者への基本方針は？",o:["狙っていない方の球種で打ち取る","得意の真っ直ぐで最後まで押し切る","最初から最後まで変化球だけで攻める","全球を内角に集めて詰まらせる"],a:0,e:"狙いがどちらかに偏るため、逆の球種で打ち取る。",p:"『リード術』上級編 打者4分類"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"打者のタイプ（A〜D）は遅くともいつまでに見極めたい？",o:["2打席目まで","初球で","3打席目以降で","試合終盤で"],a:0,e:"右目で球、左目で打者の反応を見て、遅くとも2打席目までにタイプを掴む。",p:"『リード術』上級編 打者4分類"},

// 実戦｜カウントで組み立てる
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"カウント3ボール0ストライク（投手不利）。打者の狙いを踏まえた無難な配球は？",o:["変化球でストライクを取る","内角高めの速球で攻める","ど真ん中のストレートで勝負","ボール球で誘って様子を見る"],a:0,e:"不利カウントで打者はほぼストレート狙い。置きにいける変化球でストライクを取るのが無難。",p:"『極意』第2章／『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"1ボール1ストライク（バッテリー有利）。打ち気の打者をどう誘う？",o:["低めのゴロゾーンに落ちる球で誘う","ど真ん中のストレートで力勝負する","高めの釣り球で歩かせ気味に外す","確実にストライクだけを取りにいく"],a:0,e:"打者は追い込まれたくなく早めに手を出す→低めの誘い球でゴロを打たせる。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"2ストライクと追い込んだ。やってはいけないのは？",o:["1球を大きく外す・甘い球を置きにいく","高めの釣り球をボールゾーンに見せる","内角の厳しいコースを続けて突く","低めに落ちる球で空振りを狙う"],a:0,e:"球数に余裕があるので急がない。大きく外さず、高めや内角で次に生かす。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"初球。カウントを有利に運ぶ考え方として適切なのは？",o:["ストライクから入り、早めに追い込む","様子見のためボールから入り続ける","打者を惑わすため必ず変化球で入る","初球は毎回捨て球にして反応を見る"],a:0,e:"早めに追い込み、安全ゾーンで勝負する形に持っていく。",p:"『極意』第2章"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"ストライクを“稼ぐ”ためのカウント球。無難なコースは？",o:["外角","内角ぎりぎり","高め","真ん中"],a:0,e:"カウント球は外角が無難。打者を“仕留める”勝負球と使い分ける。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"フルカウント（3-2）。最も避けたい結果は？",o:["四球","ファウル","内野ゴロ","空振り三振"],a:0,e:"四球だけは避ける。最低2球先まで考え、テンポよく。",p:"『リード術』上級編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"追い込む前のカウントで絶対に避けたいのは？",o:["甘い「危険ゾーン」へ置きにいくこと","際どいボールゾーンへ外すこと","早いカウントで内角を見せること","緩急をつけて的を絞らせないこと"],a:0,e:"追い込む前に甘い危険ゾーンへ置きにいかない。安全ゾーンで勝負する。",p:"『極意』第2章"},

// 実戦｜走者・アウトの状況

{b:"実戦",c:"実戦｜複合シナリオ（難）",q:"同点7回1死二・三塁、相手の4番。内角は詰まらせ凡退・外角は流し打ちでヒットのデータ。一塁が空いている。最善は？",o:["申告敬遠で満塁にし、併殺態勢をつくる","得意ではない外角で慎重に勝負する","真ん中低めの速球で強気に押す","内角の甘めの球で反応を確かめる"],a:0,e:"一塁が空く強打者は敬遠して塁を埋め、フォースで併殺を狙うのが定石。外角は流し打ちでサヨナラ級。",p:"複合：走者状況×打者データ"},
{b:"実戦",c:"実戦｜複合シナリオ（難）",q:"2点リード8回無死一塁、相手は俊足でバント・盗塁とも警戒。打者はバント下手・引っ張り傾向。投手はクイックが速い。最優先は？",o:["クイック＋外角速球でゴロを打たせ併殺狙い","内角で長打覚悟の真っ向勝負をする","次の強打者を避けて敬遠で歩かせる","全球大きく外して盗塁だけを警戒する"],a:0,e:"引っ張り＆バント下手なら、外角でゴロを誘い併殺が最大の好機。クイックで盗塁も抑える。",p:"複合：走力×打者傾向×投手特徴"},
{b:"実戦",c:"実戦｜複合シナリオ（難）",q:"0-0の初回2死走者なし。相手1番は初球打ち率が高く早打ち。投手は立ち上がりに四球が多い。初球は？",o:["甘く入れず、誘い球や緩急で打ち気を外す","ど真ん中の速球でストライク先行する","内角の見せ球から強気に入っていく","四球覚悟でボールゾーンだけを使う"],a:0,e:"早打ちには初球から甘い球を与えない。打ち気を逆手に取り、誘い球で凡打を狙う。",p:"複合：打者データ×投手の状態"},
{b:"実戦",c:"実戦｜複合シナリオ（難）",q:"1点ビハインド最終回1死一塁、代打の強打者。引っ張りの長打が脅威で外角低めは苦手データ。投手は制球良いが球速140km。最善は？",o:["外角低めの変化球・速球でゴロを打たせる","内角の速球で思い切って詰まらせにいく","高めの釣り球で空振りを狙いにいく","真ん中低めで打たせて取りにいく"],a:0,e:"苦手コース（外角低め）を制球力で突き、長打を消してゴロ併殺を狙う。内角は引っ張り長打のリスク。",p:"複合：苦手コース×投手特徴"},
{b:"実戦",c:"実戦｜複合シナリオ（難）",q:"同点延長12回2死三塁、相手は当てるのが上手いC型（器用）。スクイズ・エンドランも警戒。フルカウント。最善は？",o:["低めの変化球で空振り・内野ゴロを狙う","大きく外してスクイズを警戒し続ける","内角の速球で力勝負を挑みにいく","申告敬遠で次の打者と勝負する"],a:0,e:"2死なのでスクイズの旨味は薄い。器用な打者には低めの変化球でゴロ・空振り。フルカウントで大きく外すのは暴投・四球が致命傷。",p:"複合：打者タイプ×カウント×走者"},
{b:"実戦",c:"実戦｜複合シナリオ（難）",q:"相手4番は今日フォークに3三振。だが明らかにフォーク狙いを捨てきれていない。最善の使い方は？",o:["フォークを見せ球にし、ストレートで勝負","信頼できるフォークでもう一度勝負","内角の速球で死球覚悟の意識づけ","不利を避けて申告敬遠で歩かせる"],a:0,e:"良い打者は痛打された球をマークする。意識づけ（ペア）を使い、逆の真っ直ぐで仕留める。",p:"複合：ペア×打者心理"},
{b:"実戦",c:"実戦｜複合シナリオ（難）",q:"3点リード9回2死走者なし、最後の打者。試合を締める配球の考え方は？",o:["長打だけ避け、ストライク先行で淡々と","三振で締めるため遊び球を多く使う","万一に備えて敬遠気味に慎重に入る","最後まで内角ギリギリの勝負を続ける"],a:0,e:"大量リードの終盤は無用な長打・四球を避け、確実にアウトを積む。最後まで根拠ある配球を崩さない。",p:"複合：得点差×試合運び"},

/* ===== 野球配球IQドリル（野口寿浩監修／メイツ出版） ===== */
{b:"IQドリル",c:"IQ｜試合前の準備",q:"試合前、キャッチャーがフェアグラウンドのライン際にボールを転がして確認することは？",o:["バントの打球が切れるか、切れずに転がるか","外野の芝の深さと打球の転がり方","内野の土の硬さと足場の状態","ファウルゾーンの広さと距離感"],a:0,e:"グラウンド状態の確認。塁間が硬くて走りやすければ、走者がいるときの配球にも影響する。",p:"p.16"},
{b:"IQドリル",c:"IQ｜試合前の準備",q:"試合の数日前からの正しい調整は？",o:["ハードな練習を避け疲労を抜き、睡眠を取る","直前まで全力で追い込んで仕上げる","当日の朝に集中して量をこなす","数日前から完全休養で何もしない"],a:0,e:"体力や技術は時間がある時期に高めるもの。前日は感覚確認程度、当日は早めに起きて軽いストレッチ。",p:"p.16"},
{b:"IQドリル",c:"IQ｜試合前の準備",q:"野球の勝敗の7割以上を握っているのは？",o:["バッテリー","4番打者","監督の采配","外野の守備力"],a:0,e:"3割打てば好打者＝投打の対決は投手主導で始まり打者は受け身になるから。",p:"p.17"},
{b:"IQドリル",c:"IQ｜試合前の準備",q:"試合前のすり合わせで「細かく決めすぎない」のがよい理由は？",o:["何が起こるかわからず、対応の余地を残すため","時間をかけるほど疲れがたまるから","決めごとがサインから漏れるから","細かい取り決めは当日忘れるから"],a:0,e:"大まかに決めておき、試合の中の変化に臨機応変に対応する。",p:"p.18"},
{b:"IQドリル",c:"IQ｜試合前の準備",q:"対戦データが少ない相手（高校生以下に多い）との試合で、まず優先すべきは？",o:["ピッチャーに自分のピッチングをさせてあげる","少ない情報から徹底的に弱点分析する","全打者に同じ攻めを試して様子を見る","慎重に変化球中心で入っていく"],a:0,e:"情報がないときは投手の持ち味を軸に入るのが基本。",p:"p.18"},
{b:"IQドリル",c:"IQ｜試合前の準備",q:"試合前のブルペンでキャッチャーが見つけておくべきものは？",o:["今日思い通りに投げられそうな球種とコース","その日に出せそうな球速の最高値","試合で試してみたい新しい変化球","直しておくべきフォームの欠点"],a:0,e:"それを軸にすれば比較的スムーズに試合に入れる。ブルペンとマウンドで変わる投手がいる点も考慮。",p:"p.18"},
{b:"IQドリル",c:"IQ｜配球の基本",q:"配球でもっとも重要なのは？",o:["根拠があるかどうか","結果が出たかどうか","球数の少なさ","見た目の華麗さ"],a:0,e:"同じ配球でも常に同じ結果にはならない。根拠がなく結果だけに捉われると次につながらない。",p:"p.19"},
{b:"IQドリル",c:"IQ｜配球の基本",q:"この本が挙げる配球の大きな3分類は？",o:["投手の持ち味・打者の苦手・状況への対応","内角・外角・緩急の使い分け","初球・中盤・決め球の三段階","強気・慎重・中間の三パターン"],a:0,e:"『野村ノート』の3分類（投手中心・打者中心・状況中心）と同じ考え方。最終目的は相手に得点を与えないこと。",p:"p.20"},
{b:"IQドリル",c:"IQ｜配球の基本",q:"バッターの記憶に残りやすい2球とは？",o:["初球と最後のボール（結果球）","2球目と3球目（組み立ての球）","投げられたすべての球","真ん中付近に来た甘い球だけ"],a:0,e:"だからベンチに戻ったらこの2球をメモしておくと次の対戦に生きる。",p:"p.20"},
{b:"IQドリル",c:"IQ｜配球の基本",q:"アマチュア投手がまず持っておきたいものは？",o:["平均レベル以上の球種を最低1つ","平均的な変化球を5種類ほど","140キロを超えるストレート","プロ並みの高速の牽制"],a:0,e:"苦しい状況に追い込まれたときの拠りどころになる。球種は1つずつ身につける以外に道はない。",p:"p.20"},
{b:"IQドリル",c:"IQ｜配球の基本",q:"ストレートをいつでも正確に投げられるようにしたいコースは？",o:["外角低め","内角高め","真ん中","外角高め"],a:0,e:"打者にとって最も遠く、長打にしにくいコースだから。",p:"p.20"},
{b:"IQドリル",c:"IQ｜観察とリード",q:"打者の狙いのヒントが最も隠れているのは？",o:["見逃し方（仕草・表情・タイミング）","構えたときのグリップの高さ","バットを構え直す仕草の回数","ネクストサークルでの待ち方"],a:0,e:"見逃し方にヒントが隠れているケースが多い。もちろん打者も狙いを変えるので駆け引きになる。",p:"p.22"},
{b:"IQドリル",c:"IQ｜観察とリード",q:"キャッチャーが相手ベンチを観察する効果は？",o:["作戦が見え、読んでいると示すだけで仕掛けづらくなる","審判への好印象で際どい球を取ってもらえる","間を作って投手をゆっくり休ませられる","効果は特になくただの癖になるだけ"],a:0,e:"キャッチャーの視線には情報収集と相手の仕掛けの抑止という2つの役割がある。",p:"p.22"},
{b:"IQドリル",c:"IQ｜観察とリード",q:"バッテリーが心理的に「嫌」なのはどっち？",o:["読まれて良い当たりをされ、たまたまアウトになった","ボテボテの当たりでヒットを打たれた","どちらも同じくらい嫌なものだ","アウトになったなら気にする必要はない"],a:0,e:"結果よりプロセス。読まれていること自体が危険信号だから。",p:"p.22"},
{b:"IQドリル",c:"IQ｜観察とリード",q:"配球の理解はバッテリー以外にも役立つ。野手と走者の例は？",o:["野手は打球方向の予測、走者は盗塁などの判断に使える","応援や仲間への声かけの内容が的確になっていく","スコアラーがつける記録が正確になっていく","バッテリー以外のポジションにはあまり役立たない"],a:0,e:"次の球がわかればプレーの予測が立つ。配球は全ポジションの武器。",p:"p.25"},
{b:"IQドリル",c:"IQ｜観察とリード",q:"データの少ないアマチュア野球での配球の基本は？",o:["キャッチャーの観察眼とセオリーを重視する","少ない対戦の記憶と勘に頼る","考えず速球中心の力押しで通す","プロの配球パターンをそのまま真似る"],a:0,e:"プロのような膨大なデータは使えない。観察とセオリーが土台になる。",p:"p.25"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"足が速く打率が高い1番打者。立ち上がりに簡単にストライクを取りにいくのは危険。どうする？",o:["ストライク率の高い球種を厳しいコースに投げさせる","ど真ん中の速球で強気に先手を取りにいく","全球ボールゾーンで反応だけをうかがう","最初から歩かせ気味に慎重に入っていく"],a:0,e:"「初球は振ってこないだろう」という安易な予測はしない。当てられてもリスクの低い球種を選ぶ。",p:"p.26-27"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"足の速い打者に打たせたい打球は？",o:["フライ（詰まらせる・落ちる球を拾わせる）","ゴロ（転がせば足の速さを消せる打球）","強いライナー（正面を突けば最速のアウト）","打球の種類はどれでもまったく同じ"],a:0,e:"ゴロは内野安打にされる恐れがある。フライならアウトにしやすく足を使わせない。",p:"p.27"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"無死走者あり。小技のうまい2番打者に簡単にバントをさせないために有効な球は？",o:["内角高めの速球","外角低めのカーブ","真ん中のチェンジアップ","ワンバウンドのフォーク"],a:0,e:"1つストライクを取れば打者に焦りが生まれる。",p:"p.29"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"走者なしの場面で、粘り強い小技型の打者への攻め方は？",o:["力のある速球で押して球数少なく仕留める","慎重にボールゾーンから探って入る","変化球を続けて的を絞らせない","粘られる前に歩かせてしまう"],a:0,e:"走者がいなければ小技を必要以上に警戒せず、粘らせないことを優先。",p:"p.28-29"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"穴が少なく広角に打てる好打者への攻めのセオリーは？",o:["緩急を織り交ぜ、外角低めから探りを入れる","内角の速球を軸に強気で攻め続ける","真ん中付近で思い切って力勝負する","全球ボールゾーンで慎重に探る"],a:0,e:"最もやっかいなタイプ。甘い球は痛打されるため、丁寧に探りながら狙い球を把握する。",p:"p.30-31"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"どんな強打者にも共通して苦労するコースは？",o:["体に近い内角の速球","外角高め","真ん中低め","外角のボールゾーン"],a:0,e:"見せ球にしつつ、4番相手では場合によって歩かせることも視野に入れて組み立てる。",p:"p.33"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"何度も対戦する相手の4番に対して、様子を見るための思い切った策として本書が挙げるのは？",o:["全球インコースを続けて考えさせ、混乱させる","全打席ボールゾーンだけで探り続ける","全球スローボールで焦らし続ける","毎打席まったく同じ配球を繰り返す"],a:0,e:"執拗に同じボールを続けることで、逆に相手に考えさせるリード。",p:"p.32"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"配球を読んで狙い球を絞ってくる打者に、主導権を渡さない工夫は？",o:["首を振る“演技”や前打席と違うパターンで考えさせる","球速の上積みだけでとにかく強引に押し切る","全球ボールゾーンにして勝負を避け続ける","毎回同じ勝負球であえて真っ向勝負する"],a:0,e:"必要以上に考えさせることで絞りを外す。投球モーションの変化（長く持つ・クイック）も有効。",p:"p.34-35"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"インコースが得意な「読み」の打者にも、どこかのタイミングでインコースを突く理由は？",o:["反応を見て次の狙い球を読むため","意地を示して心理的な圧をかけるため","苦手意識を植え付けて封じるため","得意コースを消して四球を狙うため"],a:0,e:"駆け引きと洞察力の勝負。反応が次の1球の根拠になる。",p:"p.34"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"一発の長打力はあるがムラのある打者。攻め方の基本は？",o:["はっきりした苦手なコース・球種を根気よく続ける","あえて得意コースで真っ向から力勝負する","全打席歩かせ気味にして慎重に攻め続ける","毎回初球ストライクから同じ形で入っていく"],a:0,e:"このタイプは苦手がはっきりしていることが多い。投げ続けられる制球力も磨いておく。",p:"p.36-37"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"選球眼に優れた打者を抑えるのに必要な技術は？",o:["コースを1球ごとに数センチずらせる調整力","平均球速を数キロ底上げする筋力と体力","より大きく鋭く曲がる新しい変化球の習得","走者を一瞬で刺せる鋭い牽制の上手さ"],a:0,e:"ゾーン内で完結せず、ストライク⇔ボールに出入りする変化球と高低の幅も使う。",p:"p.38"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"どんな好打者でも見極めが難しいのは？",o:["高低の選球","内外の選球","球種の見分け","スピードの変化"],a:0,e:"だから高さの幅を有効に使うべき。",p:"p.38"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"3割打者が3人連続でヒットを打つ「三連打」の確率は？",o:["約2.7%","約30%","約10%","約50%"],a:0,e:"連打での失点は実は起きにくい。だからこそ「もらった出塁」が怖い。",p:"p.40"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"エラーや四球の走者が本当に怖い理由は？",o:["「もらった出塁」と考え思い切った作戦を仕掛けてくるから","出塁の勢いで走者の足が実際より速く見えるから","守備全体が動揺して連鎖的にミスが出るから","記録に残らない失点になって士気が下がるから"],a:0,e:"走者三塁を作られると内野ゴロ・犠飛・パスボールでもヒットなしで失点する。",p:"p.40"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"同じ外角へのストレートでも「意味が変わる」のはなぜ？",o:["カウントごとに投手と打者の心理が変わるから","天候や風向きでボールの球筋が変わるから","イニングが進むほど球速が落ちていくから","捕手の構える位置がその都度違ってくるから"],a:0,e:"カウント別の心理を理解すると配球の意図が読めるようになる。野手や走者とも共有したい要素。",p:"p.42-43"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-0の初球、コントロールに自信がない投手に投げさせるべきは？",o:["リスクの小さいコースへ、自信のあるボール","厳しいコースへ思い切った難しいボール","真ん中へ置きにいくストレート","ワンバウンド覚悟の落ちる変化球"],a:0,e:"立ち上がりは投手も難しい。難しい球ではなく自信のある球でカウントを整える。",p:"p.44"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"過去の対戦で打ち取ったことがある打者への効果的な入り方は？",o:["打ち取ったボールの「残像」で勝負する","前回とは必ず逆のパターンから入る","様子見のボール球から慎重に入る","過去の対戦は考えずゼロから組む"],a:0,e:"打者の記憶に残っている結果球を利用する。",p:"p.44"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-1（1ストライク）で打者に働きやすい心理は？",o:["「追い込まれる前に打ちたい」という積極性","「じっくり見極めたい」という慎重さ","「転がして進めたい」という献身","「四球を選びたい」という我慢"],a:0,e:"だからストライクを投げ急がず、ストライクからボールになるゾーンで誘う。",p:"p.45-46"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"制球に自信がある投手の0-1。ゾーンの使い方のイメージは？",o:["ゾーンの内外を15cmずつ広げるイメージで使う","ゾーンのど真ん中を思い切って大胆に使う","ゾーンを普段よりぐっと狭く絞って使う","高めのボールゾーンだけを集中的に使う"],a:0,e:"先手を取れた優位性を生かし、ボールゾーンも含めて広く攻める。",p:"p.46"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-2で「とりあえず1球外す」がNGな理由は？",o:["①取る②追い込む③仕留めるのどれでもない無駄球だから","捕手のブロッキングの準備が難しくなるから","球数がかさんで試合終盤に響いてくるから","打者に呼吸を整える時間を与えてしまうから"],a:0,e:"外すなら高めの釣り球→フォーク、内角厳しく→外角勝負のように、次への伏線となる意味のあるボール球にする。",p:"p.47-48"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-2に追い込まれた打者は、どんな割合で球を待っている？",o:["8:2か7:3くらいの割合でストレート待ち","10:0で変化球だけを待っている","5:5でどちらにも備えている","狙いを捨てて当てにだけくる"],a:0,e:"不利な状況でフルスイングは難しく、コンパクトにミートしてくる。だから裏をつく変化球が有効。",p:"p.48"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-0からストライクを取る3つの手段とは？",o:["見逃し・空振り・ファウル","見逃し・敬遠・ボーク","空振りだけ","ファウルだけ"],a:0,e:"芯で捉えられても明らかなファウルなら問題ない。打ってもファウルになるコースに投げきれるかがカギ。",p:"p.49-50"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-0で走者一塁、盗塁が想定される場面の配球は？",o:["捕手が二塁へ送球しやすい外角中心の配球","盗塁を諦めさせる内角中心の配球","走者の逆を突くワンバウンドの変化球","高めの釣り球で空振りを狙う配球"],a:0,e:"ボール球を使いにくいカウントでも、送球のしやすさまで考えてコースを選ぶ。",p:"p.50"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-1の平行カウント、実はやや有利なのはどっち？",o:["バッテリー","打者（絞りやすくなっているから）","完全に五分で有利不利はない","球審のゾーン次第で変わる"],a:0,e:"打者の反応を2球分見ているから。2球分の情報がある。打ち気の打者にはギリギリの誘い球やチェンジアップが効く。",p:"p.51-52"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-2に追い込むと打者に起こる変化は？",o:["ヤマを張る余裕がなくなり、ゾーンが少し広がる","集中力が研ぎ澄まされ対応力が上がる","ほぼ確実に見逃して四球を待つ","バント気味の当てにいく打撃に変わる"],a:0,e:"ボール球でも振ってくれる状況。ウイニングショット・苦手攻め・伏線のボール球の3択で仕留める。",p:"p.53-54"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-0の打者は絶好のチャンス。そこに生まれやすいスキは？",o:["油断して甘い真っ直ぐ一本に絞ってくること","慎重になりすぎて手が出なくなること","作戦を考えすぎて集中を欠くこと","狙いを消して全球に対応しようとすること"],a:0,e:"だからストライクを取れる変化球をゾーンに投げ込めれば、あっさりカウントを稼げる。",p:"p.55"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-0で守備側が絶対に避けたいのは？",o:["四球（ヒットはしかたないという割り切りも必要）","痛烈なクリーンヒット（単打で済むもの）","しつこく粘られてのファウルの連続","勝負が長引いて球数がかさむこと自体"],a:0,e:"甘い球は必ず狙われている。割り切って四球だけは避ける。",p:"p.56"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-1は重要な分岐点。ボールゾーンに振らせる攻めをする条件は？",o:["3-1のリスクを理解し、打開できる制球があること","相手打者が下位打線で力が落ちていること","味方に精神的な余裕となるリードがあること","捕手のブロッキング技術が優れていること"],a:0,e:"成功すればヒットの確率を下げられるが、失敗すれば圧倒的不利な3-1。リスクと制球のセットで判断する。",p:"p.57-58"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-2で走者一塁。バッテリーがフルカウントを避けたい大きな理由は？",o:["3-2では走者がオートマチックスタートになるから","球数がかさんで試合終盤に響いてくるから","フルカウントは心理的に打者が有利だから","長引くと野手の集中が切れやすくなるから"],a:0,e:"だから2-2が勝負所。その日一番調子の良い球か、最も自信のあるウイニングショットで仕留める。",p:"p.59"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"「フルカウントにしたくない」という思いが先行すると起きやすいのは？",o:["かえってコントロールを乱す","球への集中が増して制球が良くなる","力みが取れて球速が上がる","打者が油断して手を出してくる"],a:0,e:"追い込まれた打者は変化球も意識している。速球派なら強い意志でストレートを投げ込む。",p:"p.60"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-0はほとんどの打者に「待て」が出る。バッテリーがすべきことは？",o:["ミットを真ん中に構え、入る球でまず1つ取る","際どいコースを狙い続けて仕留める","1球ボールで外して打ち気を探る","思い切って申告敬遠に切り替える"],a:0,e:"ストレートの四球だけは避ける。打ちにくる打者はゾーンを上げて甘い球だけを狙ってくる点に注意。",p:"p.61-62"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-1の打者はストレート1本に絞っていることが多い。そこで意外と有効なのは？",o:["多少甘くても変化球","さらに速いストレートで力ずくで押し込む","ボールになる釣り球でじっくり我慢比べ","走者を無視した早業のクイック投球"],a:0,e:"あっさり取れることがある。変化球でも腕の振りをゆるめないこと。強気のストレートで意表を突く手もある。",p:"p.63-64"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-1で変化球を要求するときキャッチャーが投手に送るべきメッセージは？",o:["「腕を振れ」のジェスチャー","「力を抜いてゆっくり」の落ち着かせ","「外してもいい」という安心づけ","「好きな球でいい」という委任"],a:0,e:"置きにいくな。置きにいった変化球が一番危ない。サインに首を振る\"演出\"で打者に考えさせる手も有効。",p:"p.64"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-1で打者側に働きやすい心理は？",o:["四球がちらつき「凡打がもったいない」と消極的になる","絶好機とばかりに強気一辺倒で振り回してくる","次の作戦に備えてバントの構えを見せてくる","狙いを捨てて来た球への反応だけで打ちにくる"],a:0,e:"圧倒的有利なのにプレッシャーがかかる。守る側はこの心理も利用できる。",p:"p.64"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"フルカウント（3-2）の打者が持ちがちな思い込みは？",o:["「必ずストライクが来る」","「必ずボールが来る」","「必ず敬遠される」","「必ず牽制が来る」"],a:0,e:"だから見ていない落ちるボールがあるなら効果大。ストライクからボールに落とせれば大ケガはない。",p:"p.65-66"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-2で最良の結果は三振。だが歩かせてしまった場合の考え方は？",o:["次の打者と0-0から勝負できると切り替える","大失敗として次の打席まで深く引きずる","次の打者にもまったく同じ攻めを繰り返す","外野の守備位置を思い切って大きく下げる"],a:0,e:"打球がヒットゾーンに飛ぶリスクより、仕切り直しの方がましな場面がある。",p:"p.66"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-2の勝負球を選ぶ最大の材料は？",o:["3-2までの過程で得た情報","その日の運と勘のひらめきに任せる","相手ベンチの声と雰囲気から感じ取る","スタンドの応援の勢いと流れを読む"],a:0,e:"狙い・見せていない球種。どのような過程でフルカウントになったのかがすべて。醍醐味のカウント。",p:"p.65-66"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"牽制球の本当の役割は？",o:["走者をアウトにすることではなく、出方をうかがうこと","走者を直接刺してアウトを一つ増やすこと","投球の間を作って呼吸を整え直すこと","捕手のサインを隠す時間を作り出すこと"],a:0,e:"牽制への帰塁や打者の構えの反応から、相手の戦術を予測する材料を得る。",p:"p.70"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"走者一塁で「走者を意識しすぎる」とどうなる？",o:["打者への投球がおろそかになりボール先行になる","牽制の精度と鋭さがかえって上がっていく","打者が萎縮してくれて守備側が有利になる","投球のリズムとテンポが自然と良くなる"],a:0,e:"警戒はしてもノーマークにしない程度に。勝負の主戦場はあくまで打者。",p:"p.70"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"盗塁が想定される場面の基本の配球は？",o:["キャッチャーが二塁へ送球しやすい外角","打者に近く送球が遅れる内角","バットが届きやすい真ん中低め","捕ってから握り替えるワンバウンド"],a:0,e:"外角偏重を読まれそうなら、思い切って内角を突く駆け引きも。",p:"p.70"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"打者が最もバントしにくい球は？",o:["球筋が近く感じるインコースのストレート","腕が伸びて当てやすいアウトコース","軌道が読みやすい緩いカーブ","バットに乗せやすい低めの変化球"],a:0,e:"高めはフライやファウルを打たせ、低めで空振りを狙える。アウトコースは避けたい。",p:"p.74"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二死一塁が「走者ありで最も得点が入りにくい」理由は？",o:["得点には少なくとも単打2本が必要だから","走者が二死では思い切って走れないから","打者の集中力が切れやすい場面だから","守備側が極端なシフトを組めるから"],a:0,e:"だから過度にピンチと意識せず、打者を抑えることに集中してよい場面。",p:"p.71"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二死一塁で盗塁を決められたときの正しいメンタルは？",o:["「この打者を抑えればチェンジ」というゆとり","次こそ盗塁を刺すことへの強い集中","牽制を増やして走者を釘付けにする闘志","1点までは仕方ないと覚悟する開き直り"],a:0,e:"セットポジションで走者を見るだけでも警戒は示せる。惑わされないこと。",p:"p.72"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"四球やエラーで出塁した走者が仕掛けやすい心理的理由は？",o:["「もともとアウトの計算だった走者」だから思い切れる","出塁の勢いで足が速く感じられるから","相手バッテリーが必ず動揺しているから","ベンチのサインが増えて迷いが消えるから"],a:0,e:"攻撃側は「もらった出塁」と考え、盗塁などの思い切った作戦に出やすい。",p:"p.72"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"無死一・二塁で守備側が理想とするゴロは？",o:["右打者に引っ張らせた三遊間へのゴロ","右打者に流させた一二塁間へのゴロ","投手の正面を突く強いゴロ","捕手の前に転がる弱いゴロ"],a:0,e:"二塁走者の背中側（一塁側）へのゴロは進塁打になり併殺が取りにくい。",p:"p.73-74"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"バントシフトの基本の動きは？",o:["サードとファーストが前進、二遊間がベースカバー","内野の全員が一斉に思い切って前進する","外野まで内野の後ろに詰めて備える","投手だけが前進して他は定位置を守る"],a:0,e:"投手も投球後に打球方向へダッシュしてカバーし合う。",p:"p.74"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"無死二塁。打者は「最悪でも進塁打」と考えている。右打者への攻めは？",o:["インコース中心","アウトコース中心（引っ張らせない）","真ん中で勝負（強気に押す）","高めのボール球だけ（釣り続ける）"],a:0,e:"右方向へ流させない。外角は右方向へおっつけられて進塁打になりやすい。『配球の極意』とも一致するセオリー。",p:"p.76"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二死二塁、一打サヨナラ級の場面での投球方針は？",o:["長打だけ避け「ゴロのヒットは仕方ない」と割り切る","なにがなんでも三振を取ることだけに集中する","高めの釣り球で空振りだけを狙い続ける","次の打者を考えて申告敬遠で塁を埋める"],a:0,e:"外野は前進守備。最悪の一打（長打）だけを消す。",p:"p.75"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"三塁走者ありでスクイズを警戒すべきなのは？",o:["無死・一死の早いカウント","二死で追い込んでからの土壇場の場面","フルカウントまでもつれたときだけ","走者の足が遅ければ警戒は必要ない"],a:0,e:"追い込めば選択肢を消せる。追い込んでしまえばスクイズはなくなるが、今度は犠飛のリスクが出る。",p:"p.77"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"三塁走者ありでフォークなど落ちる球を「使いにくい」と考えがちだが、本書の考えは？",o:["止める練習をしているはずだから、積極的に使う","リスクが大きいので絶対に使わない","高めに浮かせて投げれば安全に使える","走者を気にせず投げれば問題ない"],a:0,e:"パスボールを怖がって武器を封印しない。",p:"p.78"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"スクイズ狙いの打者に有効な2球種は？",o:["イン高めの速球→外低めの変化球","外角高めの速球→内角低めの変化球","真ん中の速球を思い切って2球続ける","緩いカーブを続けてタイミングを狂わす"],a:0,e:"内角高めは体が早く開いて空振りしやすく、その後の外低め変化球は手打ちのフライになりやすい。",p:"p.78"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"一・三塁でのダブルスチール（重盗）への守備側の対応は？",o:["捕手の二塁送球を投手かセカンドがカットして本塁を守る","迷わず二塁へフルスローして盗塁を刺しにいく","送球はせずに三塁走者の動きだけを見張っておく","すぐにタイムをかけて落ち着いて仕切り直しにする"],a:0,e:"一・三塁は最も頭を働かせる局面。初球〜3球目の仕掛けに要注意。",p:"p.82"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二・三塁で1点はOKという場面の考え方は？",o:["三塁走者は捨て、二塁走者を還さない配球と守備位置","1点もやらず0点に抑えることだけ考える","満塁にしないことだけを最優先で避ける","内野外野とも前進でバックホーム一択"],a:0,e:"状況次第では次打者の力が落ちるなら敬遠して満塁策も。欲しいのは三振か内野フライ。",p:"p.79-80"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"満塁のピンチでバッテリーが立つべき心構えは？",o:["走者を気にせずバッター勝負に全力を注ぐ","全走者への牽制を増やして警戒する","ボール球中心で慎重に様子を見る","スクイズの警戒だけに集中する"],a:0,e:"攻撃側が仕掛けられる作戦は奇襲のスクイズくらい。フォアボールとパスボールだけが自滅の道。",p:"p.83"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"打者が配球を読むときの「軸」になるバッテリーの基本とは？",o:["長打の少ない外角＋対応しにくい速いストレートが基本","内角の変化球で詰まらせるのが配球の基本","緩い球で目線を上下に狂わせるのが基本","決まった基本はなく捕手の感覚で毎回変わる"],a:0,e:"この基本を軸に、投手の持ち球・走者の状況・タイミングの合い方から次の球を予測する。守る側は読みの軸を知っておく。",p:"p.88"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"初球の外角ストレートに打者のタイミングが合っていた。打者に成り立つ読みは？",o:["「同じ球は続けにくい→次は変化球かな」","「タイミングが合った球こそ次も来る」","「次は必ず内角の厳しい球が来る」","「初球の結果から読みは成り立たない」"],a:0,e:"逆に捕手側は、変化球に踏み込まれたくなければ内角ストレートも選択肢。1球ごとに読み合いが動く。",p:"p.89"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"盗塁が想定される場面で投げにくい球種は？",o:["変化球","速いストレート","外角の速球","高めの釣り球"],a:0,e:"だから走者側は「変化球が来そうなカウント」が有利に働く。攻守両方で使える知識。",p:"p.89,100"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"バッテリーが打者の読みを外すのに必要なのは？",o:["コースか球種のどちらか一方を外せば十分","コースと球種の両方を外す必要がある","球速さえ変えれば読みは外せる","読まれても力で押せば問題ない"],a:0,e:"どちらかを外せれば十分なスイングをさせずに抑える確率が上がる。3割打者も7割は失敗する——抑えて当たり前の気持ちで。",p:"p.89"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"バントシフトでチャージされたときの送りバントのコツは？",o:["逆らわず、ファーストかサードに取らせるゴロを転がす","強めに押し出して前進した野手の間を狙う","投手か捕手の正面へ確実に転がしにいく","少し浮かせて前進した内野の頭を越す"],a:0,e:"強すぎるバントは二塁でフォースアウトにされる。一塁走者のスタートも大事。",p:"p.90"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"進塁打の難易度が右打者より左打者の方が高い理由は？",o:["一二塁間へのゴロが必要で、強引な引っ張りになるから","左打者はそもそも非力な選手が多いから","一塁に近く打球判断の時間が短いから","走者から打球が見えにくいから"],a:0,e:"右打者は外角ストレートを右方向におっつければよい。守る側はこの差も頭に入れる。",p:"p.93"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"ヒットエンドランを仕掛けやすいカウントは？",o:["平行カウント以上、できれば打者有利のカウント","ボール球や決め球が来そうなカウント","0-2などバッテリー有利のカウント","3-0など極端な打者有利のときだけ"],a:0,e:"ボール球・決め球が来るカウントではヒットゾーンに打つのが難しく、併殺のリスクも大きい。守る側はカウント負けすると相手に作戦の幅を与える。",p:"p.94-95"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"スクイズを仕掛けやすいのはどんなカウント？",o:["バッテリーが不利なカウント","バッテリーが有利なカウント（油断するから）","追い込まれた0-2の場面だけに限られる","カウントとスクイズはまったく無関係"],a:0,e:"ストライクが来るから。守る側は相手ベンチの動きを警戒し、ときには大胆にボール球で外す。追い込んでもスリーバントスクイズがある。",p:"p.96-97"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"スクイズが決まった後も守備側に残る危険は？",o:["緩慢な一塁送球で二塁走者まで還るツーランスクイズ","打者がそのままもう一度打席に入ること","ボークを取られて全走者が進塁すること","守備位置が乱れたまま次に備えること"],a:0,e:"1点で終わらせるか2点になるかは締めの動きひとつ。",p:"p.97"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"「1点まではOK」の場面の内野の守備隊形は？",o:["定位置と前進の間の中間守備で併殺を狙う","内野全員が思い切って前進する","全員定位置でヒットに備える","極端な引っ張りシフトを敷く"],a:0,e:"これ以上傷を広げないことを優先し、併殺で流れを取り戻す。1点も渡せないなら前進バックホーム体制。",p:"p.98-99"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"攻撃側の「走るぞ走るぞ」という見せかけの効果は？",o:["ストレート系を増やさせ、打者の読みの材料にできる","投手が動揺してボークや暴投がどんどん増える","守備位置が下がって内野安打が増えていく","見せかけだけの走る構えには何の効果もない"],a:0,e:"盗塁の圧力は配球を縛る。守る側は縛られすぎないバランスが必要。",p:"p.100"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"牽制で相手の裏をつくテクニックは？",o:["ゆっくりした牽制を見せてから、速い牽制を入れる","毎回同じ速さのままとにかく数だけ増やす","牽制は最初の1回だけと最初から決めておく","偽投だけを何度も繰り返して揺さぶり続ける"],a:0,e:"セットで長くボールを持ってから牽制し、打者の構えの変化（バントの気配）もチェックする。",p:"p.106-107"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"当たっている7番打者との勝負で「やってはいけない」のは？",o:["「振ってくれたら儲けもの」の中途半端な配球","リスクを覚悟した上で明確に勝負すること","思い切って迷いなく明確に歩かせること","次の打者を見据えて申告敬遠を選ぶこと"],a:0,e:"中途半端な球は甘くなって打たれる。歩かせるか勝負するかを明確にする。",p:"p.108-109"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"あえて敬遠で塁を埋める守備側のメリットは？",o:["フォースアウトが可能になり守りやすくなる","記録の上で失点が減らせる","相手打線の士気を確実に下げられる","投手の調子が自然と戻ってくる"],a:0,e:"作戦を明確にすることで「次の打者と勝負」という気持ちの切り替えもできる。球数制限のあるアマ野球では申告敬遠で投手の疲労も減らせる。",p:"p.109"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"前進守備の満塁でゴロが飛んだときの最優先は？",o:["本塁でのフォースアウト","素早い転送での併殺の完成","確実な一塁でのアウト","タイムを取っての仕切り直し"],a:0,e:"タッチ不要。捕手を含む野手が「バックホーム」と大声で指示しプレーを明確に。本塁から一塁への転送で併殺も狙える。",p:"p.112-113"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"井川慶のノーヒットノーラン（2004年、捕手は監修者・野口）。立ち上がりに使った工夫は？",o:["ストレート7:変化球3の配球を1巡目は5:5に変えた","初回から全球ストレートで強気に押し切った","全球変化球にして最後まで目先を変え続けた","サインをすべて投手の判断に任せ切った"],a:0,e:"調子が万全でない日こそ配球の工夫で補う。相手ベンチが円陣で変化球狙いに出たと察すると、今度はストレート主体へ切り替えた。",p:"p.114"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"「振り逃げ」が成立する条件は？",o:["第3ストライクを捕手が完全捕球できなかったとき","バットを振った空振り三振のときだけ","三振であればどんな場合でも必ず","捕手が一度でも弾いたら成立しない"],a:0,e:"見逃し三振でも成立する。二死ならどんな走者状況でも可能。無死・一死では走者一塁または一・二塁のときは不可。",p:"p.117,124"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"振り逃げできる場面で、打者が悔しさのあまりダートサークルを出てしまうと？",o:["走塁放棄とみなされアウトになる","プレーはそのまま何も起きない","ボールデッドでやり直しになる","守備妨害で走者もアウトになる"],a:0,e:"捕手側から見れば、相手打者がサークルを出るまでは気を抜けないということ。",p:"p.124"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"無死一・二塁の送りバントが投手前の小飛球に。走者が帰塁しているときの上級プレーは？",o:["あえてショートバウンドで捕り、三塁→二塁と転送する","迷わず直接捕球して確実に1アウトを取る","捕らずに見送ってファウルにしてしまう","タイムをかけて守備位置を整え直す"],a:0,e:"捕手が声で投げる塁を指示する。ただしグラブに当てて落とすと故意落球で1アウトしか取れない可能性がある。",p:"p.116,124"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"サヨナラの場面、二・三塁でタッチアップできる深さの外野ファウルフライ。守備側の選択肢は？",o:["あえて捕らずファウルにしてタッチアップを消す手もある","外野フライはどんな場面でも必ず捕球する","必ず見送ってから次の球で勝負し直す","内野手に任せて捕手は本塁だけを守る"],a:0,e:"捕れば犠飛でサヨナラの危険。捕らなければストライク1つ。チームの作戦・投手の疲労まで頭に入れて判断する。",p:"p.123,127"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"1番打者が初球から思い切り振っていくための準備は？",o:["投球練習から相手投手の球速にタイミングを合わせる","素振りの回数を増やして体を温めておく","前の試合の映像を直前まで見返しておく","特別な準備はせず自然体のまま打席に入る"],a:0,e:"狙い球を自分のスイングでコンタクトすることが大事。空振りしても次のチャンスがある。",p:"p.27"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"自分が「非力なタイプ」だと思う打者の正しい心得は？",o:["想定内と割り切り、短く持ってミート中心で振り切る","力負けしないようバットを長く持って強振する","当てにいくことだけに徹して振り切らない","セーフティバントで守備を揺さぶり続ける"],a:0,e:"内野手の頭を鋭いライナーで越える当たりが理想。",p:"p.29"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"追い込まれたカウントでの打者のスイングは？",o:["コンパクトなスイングに変える","フルスイングを最後まで貫く","バントの構えに切り替える","狙いを捨てて反射だけで振る"],a:0,e:"3番打者クラスでも追い込まれたら対応重視に切り替える。",p:"p.31"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"4番打者が厳しいコース攻めをされ続けるときの考え方は？",o:["見極めて四球ならそれもチャンスと捉え、引かずに勝負する","甘い球が来るまでとにかく振り続けていく","早めに当てにいくバッティングに切り替える","厳しい攻めが続く日は淡白に割り切る"],a:0,e:"警戒される打者ほど選球が武器になる。自分の最大限の力を総動員して勝負を挑む。",p:"p.33"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"ムラのある長距離型の打者がまず理解しておくべきことは？",o:["自分の得意と「穴」。バッテリーは必ず穴を突いてくる","自分の長所だけをとことん徹底的に磨けばよい","相手投手の弱点だけを徹底的に研究すればよい","頭で考えるより数を振って体で慣れればよい"],a:0,e:"誘い球に簡単に手を出さないためにも、自分の穴の把握が先。",p:"p.37"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"選球眼を良くするための習慣は？",o:["自分のゾーンを正確に把握し、ベンチから投手を見ておく","打席に入ってから目の前の球に集中すれば十分","球審ごとのゾーンの癖を何より最優先で覚える","選球眼は生まれつきの感覚でありもう変わらない"],a:0,e:"これを怠るとストライク・ボールの判断が曖昧になり、難しい球に手を出して打率を下げる。",p:"p.39"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"打者が打席で第一に考えるべき目的は？",o:["出塁すること","長打やホームランを打つこと","三振だけは絶対にしないこと","球数を投げさせて消耗させること"],a:0,e:"走者がいれば進塁のアシスト。得点の多くはチームプレーから生まれる。出塁がすべての起点。",p:"p.86"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"2-0の絶好のカウントで打者がやってはいけないのは？",o:["四球狙いで消極的になること","得意なコースと球種に絞ること","好球を積極的に狙っていくこと","強く最後まで振り切ること"],a:0,e:"難しい球や苦手コースは切って、得意なコースと球種に絞ってスイングしていい場面。",p:"p.56"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"2-1は打者有利。この場面の打者の心得は？",o:["狙いを絞って悔いのないスイングをする","慎重に見送ってフルカウントを待つ","バントの構えで揺さぶりをかける","狙いは決めず来た球に反応する"],a:0,e:"理想は長打で出塁して相手にプレッシャーをかけること。",p:"p.58"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"2-2で「待ちの意識」が強すぎるとどうなる？",o:["厳しいコースに手が出ず見逃し三振しやすい","どんな展開でもフルカウントまで必ずもつれる","ボールを見極めて四球で歩ける確率が上がる","待とうが振ろうが打撃には特に影響しない"],a:0,e:"ボール球を見逃せればフルカウントで有利になるが、勝負意識は捨てないこと。",p:"p.60"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"3-0から「打て」のサインでも、打ちにいくときの条件は？",o:["好きなポイントだけに絞り、自信を持って振り抜けること","どんな球でも来た球を積極的に打ちにいくこと","確実に当てて転がすことに徹し切ること","打つと見せかけてバントに切り替えること"],a:0,e:"投手が制球に苦しんでいるなら無理に打ちにいく必要はない。",p:"p.62"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"フルカウントで「見ていない落ちる球」がありそうなときの打者の対応は？",o:["ゾーンを上げて低めは切り、コンパクトに野手の間を狙う","低めの落ちる球にヤマを張ってじっと待つ","全球フルスイングで一発長打だけを狙う","手を出さずに四球だけをひたすら待ち続ける"],a:0,e:"粘ってフルカウントにしても狙いを絞り切れていないことが多い。整理して立つ。",p:"p.66"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"満塁で打席に入る打者の的の絞り方は？",o:["押し出しを嫌いストライク先行で来る球種に絞る","慎重になったボール球を見極めて待つ","初球は必ず見送って様子を確かめる","絞らずどんな球にも対応して当てる"],a:0,e:"単打で次につなぐ意識で十分。",p:"p.84"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"直前の球でストレートに詰まったファウル。次の球への合わせ方は？",o:["ストレートに合わせて待ち、遅い球には対応で拾う","変化球に合わせておいて速い球は見送っていく","どちらにも合わせず来た球へのその場の反応で","タイミングはあえて取らずミートだけに徹する"],a:0,e:"速い球に合わせておけば遅い球には何とかバットを当てられる。逆は不可能。",p:"p.93"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"右打者が進塁打を打つ技術のイメージは？",o:["アウトコースのストレートに絞り右へおっつける","内角の球を思い切って引っ張り抜く","高めの球を上から叩きつける","どんな球でも体を開いて流す"],a:0,e:"変化球のボール球に手を出すと空振り。ストライクにうまくバットを乗せて右へ。",p:"p.93"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"ヒットエンドランで打者が狙う打球方向は？",o:["ベースカバーで空いた二遊間の穴へ転がす","外野手の頭の上を思い切って狙っていく","投手の正面へできるだけ強い打球を打つ","方向は考えずとにかく強く叩きつけるだけ"],a:0,e:"走者のスタートで二遊間が動く。その穴を突けば出塁も狙える。",p:"p.94-95"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"スクイズを成功させる打者の技術は？",o:["構えを早くしすぎず、外されても当ててファウルにする","誰よりも早めに構えて確実に転がしにいく","高めのボール球は自信を持って見送っておく","三塁走者が来る前に少し強めに転がしておく"],a:0,e:"構えが早いとウエストされる。ボールに必ず当てることが三塁走者を守る。",p:"p.78"},

/* ===== 工藤公康 配球とは（PHPエディターズ・グループ） ===== */
{b:"工藤",c:"工藤｜配球の基本",q:"工藤が配球を考えるときの大前提は？",o:["1球では完結せず、次の投球への繋がりを考える","1球ごとに完全に独立させて深く考え抜く","最後の結果から逆算してすべてを決めておく","球種を投げる順番を試合前に決めておくこと"],a:0,e:"配球とは「球を配る」もの。1球投げて終わりではない。",p:"p.14"},
{b:"工藤",c:"工藤｜配球の基本",q:"コースの投げ分けの基本となる対角線は？",o:["インハイとアウトロー","アウトハイとインローを結ぶ対角線","真ん中と外角低めの出し入れの幅","高めと低めをただ二分するだけの線"],a:0,e:"目から遠い。目に近い。この2コースに投げ分けることで、打者の狙い球やコースがある程度見抜ける。",p:"p.14"},
{b:"工藤",c:"工藤｜配球の基本",q:"12カウントの中で最も難しいのは？",o:["初球（その打席での打者の考えがわからないから）","フルカウント（もう後がなく逃げ場もないから）","0-2（遊び方の選択肢が多すぎて難しいから）","2-0（不利で選べる選択肢が少ないから）"],a:0,e:"データがあってもその打席の考えは読めない。まず「何を待っているのか」を探る。",p:"p.14-15"},
{b:"工藤",c:"工藤｜配球の基本",q:"「配球に100%はない」と言われる理由は？",o:["カウント×走者×点差×調子で状況が無限にあるから","野球が運に大きく左右されるスポーツだから","現代の打者の技術が上がりすぎたから","データと流行が毎年変わってしまうから"],a:0,e:"12カウント×24通りの走者・アウト状況に、点差・前後半・心理まで加わる。だから「これをすれば絶対」はない。",p:"p.10-11"},
{b:"工藤",c:"工藤｜配球の基本",q:"「見せ球」の主な目的は？",o:["打者の狙いを知ること","カウントを楽に整えてストライクを稼ぐこと","球数を投げさせて相手打線を消耗させること","内角への恐怖心をあらかじめ植え付けること"],a:0,e:"待っている球種・コース。基本はインサイド寄り。見せ球の後に「どの球種を投げるか」の意図があるからこそ重要になる。",p:"p.12"},
{b:"工藤",c:"工藤｜配球の基本",q:"「誘い球」を使う場面と狙いは？",o:["追い込んだ後などに「バットを出させて」狙いを確認する","初球に必ず投げてまず打者の反応を見ておく","ボールゾーンに外し続けて歩かせ気味にする","敬遠の代わりとして大きく外へ外していく"],a:0,e:"追い込んだ後に打者の狙いが変わることに対して、狙いを確認する球。",p:"p.12"},
{b:"工藤",c:"工藤｜配球の基本",q:"「勝負球は一定にならず必ず変化する」の意味は？",o:["それまでの球との結びつきで勝負球は決まるという意味","試合ごとにランダムに変えるという意味","勝負球はあえて決めないという意味","相手の得意球に合わせるという意味"],a:0,e:"スライダーで仕留めたいなら、その前にインサイドの見せ球で意識づけしておく必要がある。",p:"p.12"},
{b:"工藤",c:"工藤｜配球の基本",q:"「カウント球＝ストライクを取る球」と思われがちだが、工藤の定義は？",o:["ボールでも振ってくれればカウント球になる","ゾーンに入る球だけがカウント球","初球専用のゆるい変化球のこと","置きにいくストレートのこと"],a:0,e:"手出しの多い打者にはストライクからボールゾーンへ投げることでカウント球になる。",p:"p.13"},
{b:"工藤",c:"工藤｜配球の基本",q:"「逆球」とは？",o:["外に構えたのに内へ行った球","低めを狙って高めに浮いた球","ワンバウンドしてしまった変化球","すっぽ抜けて意図なく外れた球"],a:0,e:"内→外も同様。高低のミスは逆球とは言わず「浮いた」と表現することが多い。",p:"p.13"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"「山を張る（配球を読む）」と「山勘」の違いは？",o:["山を張るはデータと経験に基づく。山勘は曖昧な決め打ち","山勘の方こそ経験に裏打ちされた高度な読み","呼び方が違うだけで中身はまったく同じもの","山を張るのはプロでは反則すれすれの行為"],a:0,e:"山勘でも当たることはあるが、再現性がまったく違う。",p:"p.16-17"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"打者が「待つ」球種の傾向は？",o:["軌道がわかりやすい球種を待つ","一番速いストレートだけに絞って待つ","一番遅い変化球に的を絞ってじっくり待つ","待つ球は決めず全球に反応して対応する"],a:0,e:"フォークは待たれない。フォークは不確定で落ち方が毎回違うため、狙い球ではなく「振らないようにする」対象になる。",p:"p.16"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"捕手の最も多いミスは？",o:["「ストレートでいいだろう」など初球の入りを安易に考えること","ワンバウンドの変化球を後ろに逸らしてしまうこと","盗塁されたときの二塁送球が高く逸れてしまうこと","複雑なサインを出し間違えて混乱させてしまうこと"],a:0,e:"曖昧なイメージのなんとなくのサインで打たれるのは避けなければならない。投手も「なんとなく」に応じないこと。",p:"p.20"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"投手の最も多いミスは？",o:["コントロールミス","牽制球の悪送球でのミス","バント処理などフィールディング","クイックが遅れる立ち上がり"],a:0,e:"百発百中の投手はいない。バッテリー間の配球ミスを比べると、明らかに捕手のほうが少ない。",p:"p.20"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"甘いコースに行った球がすべて失点になるわけではない理由は？",o:["打者は7割打ち損じる。合っていない打者は甘い球も凡打になる","審判の広いゾーンに助けられることが多いから","甘い球ほど打者が疑って手を出さないから","甘い球は不思議と野手の正面に飛びやすいから"],a:0,e:"打者の状態判断で最大の要素は「タイミングが合っているか」。失投でも三振することがある。",p:"p.21"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"弱気になったバッテリーの配球に出やすい癖は？",o:["外一辺倒になる","内角一辺倒になる","真ん中が増える","変化はない"],a:0,e:"逆に強気のバッテリーはストレートを選びやすく、それを打たれることもある。捕手は投手が弱気なら鼓舞し、強気すぎれば落ち着かせる。",p:"p.22,33"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"「上手く打たれた」と「たまたま打たれた」の違いは？",o:["崩されてもヘッドが残ってコンタクトされたのが「上手く」","打球の飛距離がどれだけ出たかどうかだけの違い","打球が逆方向へ飛んだかどうかだけの違い","呼び方が違うだけで実際のところ区別はない"],a:0,e:"ただしどちらも打たれたことに変わりはない。「たまたまだから仕方ない」で終わらせないこと。",p:"p.29-30"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"打たれた後に必要な習慣は？",o:["「別の球を見せていれば」と試合後に振り返るルーティン","切り替えのためにすぐ忘れてしまう習慣","映像は見返さず感覚だけで修正する習慣","打たれた球種を次の試合から封印する習慣"],a:0,e:"反省の積み重ねが頭の切り替えを上手くし、良い神経回路を作る。捕手にも非常に大切な作業。",p:"p.30"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"近年フォークボールを投げる投手が増えた配球上の理由は？",o:["狙い球にされず、制球精度が低い投手でも使えるから","流行に乗り遅れたくない投手が多いから","他の変化球より肘や肩への負担が少ないから","捕手が構えやすく後ろに逸らしにくいから"],a:0,e:"ストレートの軌道からストンと落ちるため捉えにくい。困った時のフォークが増えている。",p:"p.31"},
{b:"工藤",c:"工藤｜打者を知る",q:"工藤が投手の視点から打者を見ていた2つのポイントは？",o:["「どこから動き始めるか」「どうタイミングを取るか」","「身長と体重」と「スイングスピードの速さ」","「シーズン打率」と「本塁打数」の細かい推移","「構えの高さ」と「グリップの太さ」の組み合わせ"],a:0,e:"打者は手か足のどちらかが必ず最初に動き出す。その部位の観察が出発点。",p:"p.23"},
{b:"工藤",c:"工藤｜打者を知る",q:"インコースに1球投げた後、足からタイミングを取る打者がイン意識になったサインは？",o:["足の動き出しが早くなり、体の開きも早くなる","足の動き出しがかえって遅く慎重になっていく","構えの重心が全体に低くどっしり沈み込む","見た目にわかる変化はまったく出てこない"],a:0,e:"インコースは打つポイントが前になるため動き出しが早くなる。手から動くタイプなら手の動き出しが早くなる。",p:"p.23-24"},
{b:"工藤",c:"工藤｜打者を知る",q:"打撃練習で「引っ張り中心の選手がポイントを近づけて呼び込む練習」をしていたら？",o:["調子が悪いことが多い","絶好調で打ち急いでいる何よりのサイン","作戦でバントに備えている準備の動き","特に意味のないただの気分転換の練習"],a:0,e:"試合で肩が入りやすくなる。練習と試合の違いを観察・分析することで攻略のヒントが多く見つかる。",p:"p.24"},
{b:"工藤",c:"工藤｜打者を知る",q:"打撃練習の「音」からわかることは？",o:["良いと乾いた音、悪いと潰れた鈍い音がする","音からわかることは特にない","音が大きいほど調子が悪い","金属音なら好調で鈍い音は道具の問題"],a:0,e:"一見配球と関係なさそうな情報にも貴重なヒントが隠れている。",p:"p.24-25"},
{b:"工藤",c:"工藤｜打者を知る",q:"長距離ヒッターが一番嫌がるのは？",o:["ボールが上がらないこと","見逃し三振で無抵抗のままベンチに戻ること","四球ばかりで勝負してもらえないこと","詰まりながらのポテンヒットで済むこと"],a:0,e:"ゴロ、上っ面の打球。上がらなければホームランも長打も出ない。この心理は攻め筋になる。",p:"p.25"},
{b:"工藤",c:"工藤｜打者を知る",q:"「当てるだけのバッティング」になった打者にも残る危険は？",o:["抜けたスライダーなど遅い「中間球」は当ててくる","当てるだけの打撃になれば危険は何もない","かえって速球への対応力が一気に上がる","一発長打だけを警戒しておけばよい"],a:0,e:"遅いボールのほうがコンタクトしやすい。傾向が見えても慢心しないこと。",p:"p.26-27"},
{b:"工藤",c:"工藤｜打者を知る",q:"打者のルーティンを見る意味は？",o:["いつもと違う動きは調子・状態の変化のサインだから","時間をかけさせて相手を焦らせられるから","良い動きを真似すれば打撃の参考になるから","マナー違反がないかチェックするため"],a:0,e:"無意識のことが動きや行動に現れる。1球ごとに打席を外して素振りする等の変化に注目。",p:"p.27"},
{b:"工藤",c:"工藤｜打者を知る",q:"審判の癖（今日は低めを取る等）を知っておく配球上の効果は？",o:["打者のゾーンを半個〜1個分狂わせ、集中を欠かせる","抗議するときの材料として記録しておける","審判に良い印象を与えて判定を有利にできる","知っていても配球にはほとんど活かせない"],a:0,e:"打者は自分のゾーンがずれることを嫌う。ずれが大きくなるほど凡打の確率が上がる。",p:"p.28"},
{b:"工藤",c:"工藤｜打者を知る",q:"打者の意識の裏をとる基本形は？",o:["イン意識なら外で取りやすく、外の意識ならインで詰まらせる","打者の意識とはいっさい関係なく力で攻めるのが基本","意識しているコースへあえて真っ向から投げ込むのが筋","人間の意識の裏をとる方法はそもそも存在しない"],a:0,e:"打者の傾向を「知る」ことでカウントが取れ、追い込みやすくなり、凡打に打ち取りやすくなる。",p:"p.32-33"},
{b:"工藤",c:"工藤｜打者を知る",q:"捕手が「打たれるのが怖い」「失敗したくない」と思うと配球はどうなる？",o:["アウトコースへの変化球に偏り、癖が生まれる","より大胆で強気な内角攻めに走っていく","恐怖心は配球にはまったく影響しない","球種の選択が増えてかえって読みにくくなる"],a:0,e:"不利カウントで取りにいったストライクを打たれる悪循環に。捕手の性格・メンタルは配球の重要な要素。",p:"p.33"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"工藤自身の「勝負球」の作り方は？",o:["すべての球種を勝負球・決め球にする意識で磨いた","一つの魔球だけを徹底的に磨き上げた","勝負球はあえて決めず試合の流れに任せた","捕手の得意なリードのパターンに合わせた"],a:0,e:"プロの打者は狙った球種を待てば芯で捉える。だから目先を変えるより自分の球種を磨く努力を選んだ。",p:"p.36"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"ストレートは好調だが変化球が不調な日の配球の基本は？",o:["ストレートで押し、不調の変化球は見せ球に回す","不調の変化球はその日は完全に封印してしまう","変化球を数多く投げて感覚を取り戻していく","悪化する前に早めの交代をベンチに申し出る"],a:0,e:"その日のコンディションに合わせて球種の役割を組み替える。",p:"p.37"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"「四球率が高い」というデータ単体は配球に直接関係ないが、掛け合わせると？",o:["「三振が少ない」と合わせると選球眼の良さが明確になる","どう掛け合わせても新しい情報は出てこない","打率と掛け合わせると足の速さがわかる","球種別の弱点まで自動的に見えてくる"],a:0,e:"データは掛け合わせて読み解く。どんなデータも無駄にならない。",p:"p.40-42"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"「ここ3試合で7割5分」という好調情報を先発投手が知りすぎると？",o:["意識しすぎて1打席目ヒット、2打席目四球になりやすい","警戒心が強まってかえって必ず抑えられる","知っていても投球にはまったく影響しない","相手打者の方が萎縮して有利になる"],a:0,e:"情報は「投手も知るべきもの」と「捕手だけが知っておけばよいもの」に整理する必要がある。",p:"p.42-43"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"工藤が考える「投手に最も必要な要素」は？",o:["コントロール","球速","変化球の数","気迫"],a:0,e:"コンディショニングとコントロールがあれば心理戦に勝てる。配球とは簡単に言えば心理戦である。",p:"p.43"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"工藤が選手に配った短期決戦の「3つの準備」とは？",o:["身体の準備・心の準備・頭の準備","打つ準備・守る準備・走る準備の三つ","朝・昼・夜それぞれの過ごし方の準備","道具・食事・睡眠の生活面の準備"],a:0,e:"自分を知り相手を知る。短期決戦もシーズンと同じ攻め方で平常心。準備だけを整える。",p:"p.49"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"監督の作戦を投手に伝えるとき、工藤がとった方法は？",o:["投手には直接伝えず、捕手主導で伝えさせた","全体ミーティングで一斉に通達した","投手にだけ先に詳しく伝えた","作戦はあえて誰にも伝えなかった"],a:0,e:"「監督が何をしたいか」ではなく捕手主導になることで、投手は集中して打者と勝負できる。",p:"p.50"},
{b:"工藤",c:"工藤｜扇の要",q:"捕手が「扇の要」と言われる最大の要素は？",o:["試合が始まれば「助監督」にならなければいけないこと","グラウンド全体の守備位置を見渡せること","投手より道具と装備がはるかに多いこと","ただ一人ファウルゾーンに構えること"],a:0,e:"タイムを取り、投手に助言し、ベンチでは投手交代の進言もする。捕手の助言は試合を左右する。",p:"p.54-55"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤が城島・甲斐に厳しく接し続けた理由は？",o:["自分で考え抑える術を身につけさせるため","チームの規律と上下関係を叩き込むため","他の捕手との競争心をかき立てるため","本人が厳しい指導を強く望んだため"],a:0,e:"捕手の迷いは不安として投手に伝わり敗戦につながる。「厳しく接することこそ唯一の方法」。",p:"p.55-56"},
{b:"工藤",c:"工藤｜扇の要",q:"捕手育成でバッテリーコーチが最初に取り組むのは？",o:["守備能力（キャッチング→スロー→ブロッキング）","試合で目立ちやすい打撃力の強化から","走塁とバント処理などの基礎の反復から","複雑なサイン体系の暗記と徹底から"],a:0,e:"投げる球が捕れなければ話にならない。打撃の育成は最後。",p:"p.59-62"},
{b:"工藤",c:"工藤｜扇の要",q:"現代の捕手の「ブロッキング」とは？",o:["投じられた球を後ろに逸らさない技術","走者を体で止めるブロック技術","打者を威圧する構えの技術","バント処理の足さばきの技術"],a:0,e:"落ちる決め球が多い現代は特に重要。足捌きなど下半身の使い方が要求される。",p:"p.61"},
{b:"工藤",c:"工藤｜扇の要",q:"甲斐拓也の二塁送球の速さは？",o:["捕ってから2秒を切り、速いときは1.9秒を切る","平均するとおよそ3秒前後かかる","どんなに速くても2.5秒前後が限界","速すぎて正確な計測ができない"],a:0,e:"普通の捕手は2秒を超えることが多い。送球の精度もずば抜けており、走者にとって走りにくい捕手。",p:"p.60,82"},
{b:"工藤",c:"工藤｜扇の要",q:"古田や城島が打撃でも成績を残せた理由として工藤が挙げるのは？",o:["相手捕手の配球を逆手に取った読みを打撃に活かした","恵まれた体格と腕力でとにかく振り回した","人一倍の打撃練習量で技術面をカバーした","投手との対戦経験の多さだけで打っていた"],a:0,e:"捕手独特の視点や能力は打撃にも活かせる。",p:"p.62"},
{b:"工藤",c:"工藤｜扇の要",q:"投手にとって「安心して投げられる捕手」の第一条件は？",o:["どんな球でも止めてくれること","打撃でも援護してくれること","大きな声でリードしてくれること","経験豊富な年上であること"],a:0,e:"そのうえでコミュニケーションが取れ、「俺に任せろ」という姿を見せ、チームを勝たせてくれること。",p:"p.63"},
{b:"工藤",c:"工藤｜扇の要",q:"先発投手が1シーズン25〜30試合で「本当に調子が良い」のは何試合？",o:["2〜3試合ほど","20試合以上","半分ほど","毎試合"],a:0,e:"残りは何かが上手くいかない。その投手を配球とリードで勝利まで持っていくのが捕手の仕事。",p:"p.63,74"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤いわく「合わない捕手はいない」。合わないとしたら何か？",o:["野球観（打者に対しての考え方）","性格（気が合うかどうか）","年齢（世代の差があるか）","出身地（言葉が通じるか）"],a:0,e:"野球観を合わせるために共に学び、会話を重ねる。伊東勤の凄さに気づいたことが配球を学ぶ原点になった。",p:"p.65-67"},
{b:"工藤",c:"工藤｜扇の要",q:"投手が何度も首を振る場面で多い原因は？",o:["投げたい球と投げてもらいたい球のわずかなずれ","捕手への隠しきれない不満と反抗の表れ","考えをまとめる間を取るための時間稼ぎ","複雑なサインの単純な見間違いがほとんど"],a:0,e:"考え方の違いや打者の見え方の違いから起こる。首を振ること自体は悪いことではない。",p:"p.68"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤が古田との対戦で何度も首を振り続けた本当の狙いは？",o:["打者を惑わせるための根拠のない首振り","本当に最後までサインが合わなかった","投げる直前に肩の調子を確かめていた","時間を稼いで走者を油断させようとした"],a:0,e:"奇策。打者は打席で頭で考えながらバットを振れない。頭が整理できないところに外のストレートで見逃し三振。",p:"p.68-69"},
{b:"工藤",c:"工藤｜扇の要",q:"打者の好不調を知る基本の5要素に含まれるのは？",o:["直近の結果・内容・相性・イン後の反応・落ちる球への反応","身長・体重・年齢・出身・打順などの基本情報","道具・天気・球場・観客・審判などの外的要素","シーズン打率と本塁打数の2つの数字だけ"],a:0,e:"さらに打球方向や強弱、どんな打ち方だったかまで把握する。",p:"p.70-71"},
{b:"工藤",c:"工藤｜扇の要",q:"どれだけ好調な打者に対しても持つべき前提は？",o:["必ず対応できない配球がある","好調時は歩かせる以外に打つ手がない","真っ向からの力勝負で上回るしか方法はない","当たっている間は運が去るのを待つしかない"],a:0,e:"球種・コース・緩急。最初から歩かせ前提や「開き直って行け」ではいけない。投手ごとに打者が対応できない球を知っておく。",p:"p.71"},
{b:"工藤",c:"工藤｜扇の要",q:"前日にシミュレーションをしない捕手に起こりがちなことは？",o:["試合で思考停止しパニックになり大量失点につながる","先入観がない分かえって新鮮な感覚で臨める","経験豊富な投手がカバーするので問題ない","勘が冴えて思い切りの良いリードができる"],a:0,e:"捕手が冷静で配球の引き出しを多く持つことで勝敗が決まるケースは多い。",p:"p.73"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤の試合前シミュレーションのやり方は？",o:["走者なしで1巡、走者ありでもう1巡、ピンチも想定する","良い場面だけをイメージして自信をつける","結果のスコアだけをイメージする","直前の映像確認だけで十分とする"],a:0,e:"ピンチを想定内にしておけば、失点しても冷静に切り替えられる。ネガティブではなく「想定内」。",p:"p.88-89"},
{b:"工藤",c:"工藤｜扇の要",q:"2打席目にインサイドの見せ球で「続けて来るかも」と思わせるための条件は？",o:["同じコースへ続けた実績があるか、打者がインに敏感なこと","見せ球にする球の球速が十分に速く鋭いこと","捕手の構えが最後の最後まで打者に見えないこと","特別な条件は何もなくどんな打者にも必ず効く"],a:0,e:"打者の心理に働きかけるには裏付けが要る。",p:"p.78"},
{b:"工藤",c:"工藤｜扇の要",q:"球数が増え球威が衰えた試合後半の配球は？",o:["全球種を使い、緩急・高低・左右の変化で打ち取る","球威が落ちてもストレートで押し切る","一番信頼できる決め球だけで勝負する","考えるより腕を振ることに集中する"],a:0,e:"打者は球威や制球の変化に気づいている。『野村ノート』のリリーフ全球種論とも通じる。",p:"p.78"},
{b:"工藤",c:"工藤｜扇の要",q:"「投手の良いところを引き出す」を工藤は一言で何と言う？",o:["技術と精神を理解して覚悟を決めさせてあげること","できるだけ球数を減らして楽をさせてあげること","結果が良いときだけをしっかり褒め続けること","打たれた責任を捕手がすべて背負ってあげること"],a:0,e:"投手の良い時・悪い時・普通の時を知り、何ができて何ができないのかを理解することから始まる。",p:"p.79"},
{b:"工藤",c:"工藤｜走者と心理",q:"俊足の一塁走者がいるとき、バッテリーが考えておく4つのことは？",o:["走者の足・投手のクイックと牽制・捕手の送球・相手の作戦","球場の広さ・天気・風向き・気温などの条件","打者の打順・打率・長打力・選球眼のデータ","走者のことは打者に集中するため特に考えない"],a:0,e:"どれか1つでも欠けると盗塁を許しやすくなる。",p:"p.80-83"},
{b:"工藤",c:"工藤｜走者と心理",q:"俊足走者がいると外角への投球が多くなる理由は？",o:["素早く二塁へ送球したいから","外角の方が単純に長打を打たれにくいから","走者の位置から球種が見えにくくなるから","昔からの習慣でなんとなくそうしているだけ"],a:0,e:"イン構えは送球が遅れる。ただし外角一辺倒にならないよう、クイックや送球を日々磨いて偏りをなくす。",p:"p.81-83"},
{b:"工藤",c:"工藤｜走者と心理",q:"人間が冷静に判断しながら同時に考えられることは、せいぜいいくつ？",o:["2つまで（3つ以上はどれかが疎かになる）","訓練すれば5つまで同時に考えられる","集中すれば数に制限はなくなる","そもそも1つのことしか考えられない"],a:0,e:"だから守備側の思考を増やす俊足走者は脅威そのもの。プレッシャーは配球に表れる。",p:"p.82"},
{b:"工藤",c:"工藤｜走者と心理",q:"「自信がない捕手」のサインに表れる特徴は？",o:["投手にお伺いを立てるようなサインを出す","強気のサインばかりを続けて出す","サインの動きが速くなりすぎる","サインの種類が極端に減る"],a:0,e:"バッテリーは共同作業であり上下はない。話し合い、納得してサインを出すこと。",p:"p.84-85"},
{b:"工藤",c:"工藤｜走者と心理",q:"工藤の座右の言葉「停滞は◯◯の始まり」。◯◯は？",o:["後退","成長","安定","成功"],a:0,e:"「これで一人前」と思うと努力・探求心・向上心をなくす。だから甲斐をほとんど褒めなかった。",p:"p.85"},
{b:"工藤",c:"工藤｜走者と心理",q:"現役時代の工藤が捕手に絶対譲れないとした技術は？",o:["キャッチング","盗塁を刺す強肩と送球","援護できる打撃の力","体を張ったブロッキング"],a:0,e:"フレーミング。ストライクをボールと判定されると配球の組み立てが全く変わってしまうから。",p:"p.88"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"若き工藤を7回2失点に導いた大先輩捕手・黒田の声かけは？",o:["「1人ずつ全力で来い」「俺のミットだけを見て投げろ」","「多少打たれてもいいから思い切っていけ」","「勝ち星がかかっているから丁寧にいこう」","「今日は球数をできるだけ抑えて流していこう」"],a:0,e:"若い投手はイニング・得点・勝ちを意識して崩れる。捕手の一言が集中を作る。",p:"p.92-94"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"プロの世界でメンタルを崩す最大の要因を工藤は何と言う？",o:["不安","怒り","慢心","嫉妬"],a:0,e:"打たれる恐怖も突き詰めればコントロールができないから。対処は「立ち向かう勇気」＝打者を知ることに尽きる。",p:"p.97-99"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"凡打の映像を見るときのポジティブな見方とは？",o:["「あの変化に弱い」と凡打の前の球や変化に着目する","「もう少し甘ければ打たれていた」と反省する","悪い記憶が残るのでできるだけ見ないでおく","結果の数字だけをノートに記録して終える"],a:0,e:"同じ映像でも見方でイメージが変わる。ネガティブなイメージのままサインを出せばその通りの結果になる。",p:"p.99"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"配球・リードが良くなる唯一の方法を工藤は何と言う？",o:["目で見て、書いて覚え、実戦で試すことの繰り返し","生まれ持った野球センスをひたすら磨くこと","経験年数を重ねながらただじっと待つこと","何よりも先に強い体と強い肩を作り上げること"],a:0,e:"3割の一流打者でも7割は失敗する、と考えればネガティブになる必要がない。",p:"p.100"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"ブルペンで調子が悪かった投手が試合で良くなることがある理由は？",o:["調子の悪さを自覚した緊張がアドレナリンを出すから","ブルペンでの計測や感覚が間違っていたから","相手打線が勝手に力んで自滅してくれるから","ごくまれな偶然でありほとんど起こらない"],a:0,e:"捕手は試合が始まったら「調子が変わったか」をもう一度確かめ、シミュレーションをやり直す。",p:"p.103-104"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"「アウトコース低めに投げて打たれたら仕方ない」という言葉の問題点は？",o:["やみくもな外低めの正当化。根拠を持つことが本質","昔からのセオリーとして全く問題ない","外低めはそもそも打者の弱点ではない","考え方が古く今は高めを使うのが主流"],a:0,e:"全ての球に根拠と意味を持たせる。根拠があれば打たれても次の対戦へのヒントになる。",p:"p.108-109"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"打たれた後の投手のコメントに最も多いのは？",o:["「球が高かった」などコントロールについての発言","変化球の曲がりが甘かったという発言","捕手のサインが悪かったという発言","運がなかったという発言"],a:0,e:"本当に困った時、投手はコントロールに頼る。だから最も大切な条件はコントロールの精度。",p:"p.109"},
{b:"工藤",c:"工藤｜観察の技術",q:"打ち取る確率を上げる2本柱は？",o:["打者に考えさせること・インサイドを上手く使うこと","速い球と遅い球をリズムよく交互に使うこと","内野と外野の守備位置を細かく動かす連係","データの蓄積量と捕手の経験年数の掛け算"],a:0,e:"考えさせれば迷いが生じ打ち損じが増える。インは目と身体に近く、思考を変化させる。",p:"p.110-111"},
{b:"工藤",c:"工藤｜観察の技術",q:"打者がインサイドを嫌う本当の理由を工藤はどう見る？",o:["インサイド自体でなく、死球など怪我につながることを嫌う","単純に体の近くで窮屈になり打ちにくいコースだから","詰まったときの嫌な音と手の痺れが残るから","理由はとくになく打者に共通する本能的なもの"],a:0,e:"体をひっくり返された次の球を打ちにいく打者はほとんどいない。インは「見せることで打たれる確率を下げる方法」であり、当てていいコースではない。",p:"p.110-111"},
{b:"工藤",c:"工藤｜観察の技術",q:"「良い四球」の例は？",o:["一塁が空いたピンチで、打者を探った結果の四球","先頭打者に対する慎重すぎる四球","次が4番なのに3番を歩かせる四球","9番投手を歩かせて1番に回す四球"],a:0,e:"好調な強打者より次の不調な打者と勝負した方が失点確率が低い場合など。誤答は全て「悪い四球」の例。",p:"p.112"},
{b:"工藤",c:"工藤｜観察の技術",q:"満塁で「歩かせてでも1点で抑える」と決めたとき、捕手が投手に伝えないのはなぜ？",o:["投手は「勝負したい」性分で、能力の否定と感じるから","歩かせる作戦がサインで相手に漏れるから","投手が意識しすぎて制球を乱してしまうから","作戦を口に出すことが規則で禁じられているから"],a:0,e:"投手のプライドと精神状態を考慮しながら失点を防ぐのも捕手のリード。",p:"p.113"},
{b:"工藤",c:"工藤｜目の錯覚",q:"「上下の錯覚」の使い方は？",o:["顔近くの球は大きく見え、次の低めが小さく見える","高めを続けて見せるほど高めに強くなっていく","低めを続けて見せると低めが大きく見えてくる","人間の目の錯覚は配球にはまったく使えない"],a:0,e:"人間の目の性質を配球に使う。ストライクゾーンの見極めにも表れる。",p:"p.115-116"},
{b:"工藤",c:"工藤｜目の錯覚",q:"「左右の錯覚」で狂わせられるものは？",o:["打者が感覚で把握しているホームベースの幅","球審が持つその日のストライクの判定基準","ホームベースの実際の見た目の大きさ","投手のコントロールの精度そのもの"],a:0,e:"インや目に近い高めで意識をずらすと起こる。ストライクを振らせない・手を出させないのが「究極の配球」。",p:"p.116-117"},
{b:"工藤",c:"工藤｜目の錯覚",q:"チェンジアップが効く根本的な理由は？",o:["打者は投手の最も速い球にタイミングを合わせているから","単純に球速が遅くて当てにくいから","回転の少なさで球が沈んで見えるから","比較的新しい球種で打者が慣れていないから"],a:0,e:"同じフォーム・腕の振りなら「ストレートだ」と思う。カーブに対応できる打者よりチェンジアップに対応できる打者は圧倒的に少ない。",p:"p.117-118"},
{b:"工藤",c:"工藤｜観察の技術",q:"ネクストバッターズサークルで工藤が見ていたのは？",o:["1巡目と2巡目の素振りの違い","打者の表情と気合の入り方の変化だけ","使うバットの種類と長さの微妙な変化","待ち時間の過ごし方に出る性格の癖"],a:0,e:"狙いを意識したスイングか。カーブに合わせた素振りからカーブ待ちを見抜き、誘い球で確認して直球で見逃し三振に取った実例も。",p:"p.119-120"},
{b:"工藤",c:"工藤｜観察の技術",q:"テイクバックでバットを身体の近くに引き付ける打者の傾向は？",o:["インサイドにバットが出にくく詰まりやすい","アウトコースへの対応が全くできない","低めの変化球にはめっぽう強くなる","構えからは特徴を読み取れない"],a:0,e:"対処でポイントを前にすると動き出しが早くなり、イン狙いがバレやすくなる。そこで外角へ。",p:"p.121-122"},
{b:"工藤",c:"工藤｜観察の技術",q:"打者の「投げられて嫌がる反応」の2タイプは？",o:["目に近い球を嫌うタイプと軸足を動かされるのを嫌うタイプ","内角を嫌うタイプと外角を嫌うタイプの2つ","速球を嫌うタイプと変化球を嫌うタイプの2つ","高めを嫌うタイプと低めを嫌うタイプの2つ"],a:0,e:"どちらのタイプかを見極めれば崩し方が決まる。",p:"p.123"},
{b:"工藤",c:"工藤｜観察の技術",q:"バットを立てて高く構える打者（長距離型に多い）の特徴は？",o:["アッパー気味でインローに素直に出て、外角高めは長打","ダウンスイングで高めに強く低めに弱い","レベルスイングで小技と流し打ちが得意","打球が上がらず長打はほとんどない"],a:0,e:"レベル構え＝中距離（甘め得意）、担ぐ低グリップ＝アベレージ型（高め得意で、得意コースの近くが弱点）。構えで得意・苦手が予測できる。",p:"p.124-126"},
{b:"工藤",c:"工藤｜観察の技術",q:"打者の「好きなコース」の近くに存在するものは？",o:["空振りゾーン・ファウルゾーン・見逃しゾーン","どうやっても手を出さない安全地帯","得意ゾーンより広いホームランゾーン","何も存在せず境界はいつも曖昧"],a:0,e:"好きなゾーンには多少タイミングがずれても打ちにいくから。そのすぐ外側が仕留めどころになる。",p:"p.127-128"},
{b:"工藤",c:"工藤｜観察の技術",q:"ファウルの4分類のうち「最もやっかい」なのは？",o:["追い込まれてから粘って球数を投げさせるファウル","狙い球でコースも合っていたファウル","狙いと違うのにバットが出たファウル","タイミングが完全にずれたファウル"],a:0,e:"粘りに根負けするとヒット・四球で流れが変わり、球数は投手交代の心配まで生む。",p:"p.133-136"},
{b:"工藤",c:"工藤｜観察の技術",q:"「狙いと違う球にバットが出てファウル」からわかることは？",o:["ボールが見えずタイミングも取れていない＝調子が悪い","狙いが完璧に合っている絶好調のサイン","次の1球で必ず仕留めにくる予兆","ファウルから読み取れることは何もない"],a:0,e:"ファウルの種類を直近の試合と比較すれば打者の状態が把握できる。",p:"p.134"},
{b:"工藤",c:"工藤｜観察の技術",q:"ハーフスイングが多い打者から読み取れることは？",o:["見極めや自信のなさ、狙いを決めかねている状態","選球眼が研ぎ澄まされた絶好調の証拠","次の球は必ず振ってくるという合図","単なる癖であって意味は特にない"],a:0,e:"ストレート待ちで変化球に途中で止めるケースが典型。",p:"p.136"},
{b:"工藤",c:"工藤｜観察の技術",q:"逆方向を狙っている打者に一番投げてはいけない球は？",o:["インサイドの甘めの球","外角低めのボール気味の変化球で誘う球","高めいっぱいに浮かせた釣り球","ワンバウンドで空振りを狙う落ちる球"],a:0,e:"詰まっても逆方向に打てる。インを使うなら詰まってもゴロになる低めのボール気味に。外は変化球で低めを突く。",p:"p.137-138"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤が突然勝てなくなった本当の原因は？",o:["投げる回数が増えるほど球種・軌道・傾向を読まれていた","年齢を重ねたことによる球速の衰えだった","周囲に隠していた故障が悪化していた","運と対戦の巡り合わせが悪かっただけ"],a:0,e:"東尾の「いつまでもストレートとカーブだけで勝てると思うな」の意味。同じボールと軌道は長く通用しない。",p:"p.140-142"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤の登板日ルーティン「トイレでの20〜30分」でやっていたことは？",o:["1番から9番まで走者なし→ありで打ち取るシミュレーション","集中力を高めるための静かな場所での20分の仮眠","入念なストレッチと下半身を中心とした柔軟体操","対戦相手のデータの数字の最終確認と暗記"],a:0,e:"良いイメージが早く鮮明にできた日ほど実際の投球も良かった。",p:"p.143-145"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"「考えすぎると良くないので自分の球を信じて投げます」という若手への工藤の考えは？",o:["考えすぎるぐらい考え、やり尽くしてから試合に入るべき","その通りで自分の感覚を信じるのが一番","考え方は人それぞれで正解は一つではない","若手のうちは深く考えず感覚で十分"],a:0,e:"ネガティブになる原因は自分の理解不足と情報不足。学び尽くした先にリラックスがある。",p:"p.146-147"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"すべての調子が悪い日に工藤がとった投球は？",o:["とにかく「低め、低め」に投げ、打ち損じを待つ","開き直って真ん中に集めて勝負する","全球変化球で誤魔化して逃げる","早めの降板をベンチに申し出る"],a:0,e:"調子が悪い日の方が多いからこそ、備えの引き出しを持つ。",p:"p.152"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤による「配球」の定義は？",o:["打ち取る確率を上げるための考え方","必ず抑えられる必勝の方程式","捕手の経験と勘の集大成","投手が気持ちよく投げる段取り"],a:0,e:"絶対がないからこそ学び続けなければならない。",p:"p.153"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤が「配球の師」とした人物は？",o:["野村克也（著書を繰り返し読み込んだ）","東尾修（同じ西武で学んだ）","広岡達朗（管理野球を学んだ）","王貞治（ソフトバンクで学んだ）"],a:0,e:"映像を見直しても答えが出ないとき野村の本を読み返し、頭がクリアになった。野村の捕手論が日本の配球文化を作った。",p:"p.155-158"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"「リード」と「配球」の違いは？",o:["配球は球種とコースのサイン、リードは精神面と試合全体への指示","配球が試合全体のことで、リードがサインのこと","リードは打者を挑発する駆け引きだけを指す","同じものを場面によって呼び分けているだけ"],a:0,e:"守備位置の指示やセーフティ警戒の注意喚起もリード。捕手は助監督である。",p:"p.159-161"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"投手が持つ「性（さが）」と捕手の役割は？",o:["投手は勝負したがる。捕手が「待った」をかけ確率の高い投球へ導く","投手は本来逃げたがる。捕手が勝負させて強気にさせる","捕手も同じく勝負したがるので最後は監督が止める","性は投手それぞれで違いひとくくりにはできない"],a:0,e:"だから捕手は守りが最も評価される唯一のポジション。",p:"p.161"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"「裏をかく」の正体は？",o:["予測と違う球が来ると身体が硬くなり動けなくなること","誰も思いつかないような魔法のような配球","ルールの盲点を突いた頭脳的なプレー","偶然がいくつも重なって生まれる幸運"],a:0,e:"リリースからミット到達まで約0.4秒弱、打つか打たないかの判断はわずか0.2秒以内。考えてから反応する時間はない。",p:"p.168-169"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"「配球を読んで打てる打者」についての工藤の結論は？",o:["本当に限られた一部の選手だけ","プロの一軍打者なら全員できて当然のこと","どんなレベルの選手にも本当はできない","経験の浅い若手ほど先入観がなくよく読める"],a:0,e:"読める頃には身体が衰える。経験＝データの蓄積が必要だが、多くの打者は自分の技術習得で精一杯。",p:"p.170-171"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"「配球にセオリーは存在するのか」への工藤の答えは？",o:["基礎としてはYes。ただし「予定通り」の意味では通用しない","完全にYesでありマニュアル通りに投げれば勝てる","完全にNoでありセオリーは幻想にすぎない","一流投手に限ってはYesと言い切れる"],a:0,e:"見せ球・誘い球・意識させたい球を組み入れ、凡打の確率が高い球を探して打ち取るのが配球のセオリー。",p:"p.172-173"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"捕手の配球に出やすい「無意識のパターン」の例は？",o:["困った時は外・イン見せ後は外・ファウル後は球種変更など","パターンは意識して訓練すれば完全に消し去れる","パターンは捕手本人がいちばんよく自覚している","良いバッテリーほどパターンがはっきりしている"],a:0,e:"捕手本人が自覚していることは非常に少なく、投手やコーチの指摘で気づく。良いバッテリーにはパターンがない。",p:"p.174-175"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"現代野球で先発投手が「役割を果たした」と言える目安は？",o:["6回（打順が2回りした辺りで交代を考える）","9回（最後まで完投してこそ先発の役割）","3回（相手打順がちょうど1回りするまで）","7回（球数がおよそ100球に達する目安）"],a:0,e:"6回以降は投手が代わることで配球も変わり、打ち取る確率が上がる。",p:"p.176-177"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"複数捕手制の最大のデメリットは？",o:["扇の要が育たず、経験値が減って危険察知が身につかない","チーム全体の年俸と契約の総額が増えてしまうこと","サイン体系が複雑になって混乱を招きやすいこと","複数制に大きなデメリットは特に存在しない"],a:0,e:"捕手の経験値は「この球は危ない」という勘＝危機察知能力になる。工藤は捕手ごとに役割を与えて運用した。",p:"p.178-180"},
{b:"工藤",c:"工藤｜メンタルの4領域",q:"捕手が弱気・パニックになったときのサインは？",o:["外一辺倒の配球、ボールゾーンばかりの構え、小さくなる構え","声が大きくなって細かい指示がどんどん増えていく","サインの出し方がせわしなくどんどん速くなっていく","強気の内角への要求がかえって増えていってしまう"],a:0,e:"捕手として大事なのは自分の心の中を人に見せないこと。見せれば相手チームにも見透かされる。",p:"p.181-182"},
{b:"工藤",c:"工藤｜メンタルの4領域",q:"投手のメンタル維持のために工藤が最も大切にしたのは？",o:["登板から次の登板までの1週間のルーティン","試合の直前に気合を入れ直す独自の儀式","若い頃から続けてきた験担ぎのこだわり","徹夜で相手打線を研究し尽くす習慣"],a:0,e:"良い時も悪い時も「明日からの1週間の過ごし方」が大事。反省し研究し、次の試合で試す。",p:"p.183-184"},
{b:"工藤",c:"工藤｜メンタルの4領域",q:"「バッテリーは常に攻め手」と言えない理由は？",o:["「シングルヒットはOK」と割り切る守りの配球もあるから","常に攻め続けなければ勝負には勝てないから","捕手というポジションが受け身の性格だから","攻め続けることはルール上の制約があるから"],a:0,e:"見せ球や誘い球がある理由も、確信がなく相手の様子を見たい時の球が必要だから。",p:"p.184-185"},
{b:"工藤",c:"工藤｜メンタルの4領域",q:"「意識させる球」が打者のメンタルに与える連鎖は？",o:["意識→力み→フォームの崩れ→打ち損じの連鎖","強く意識はしても結果にはほとんど影響しない","かえって打席での集中力を高めてしまう危険","沈んだ調子を上げるきっかけを与えてしまう"],a:0,e:"「調子が良い時のフォームで打たせない」ことが目的。打者を知るほど崩し方が見える。",p:"p.186-187"},
{b:"工藤",c:"工藤｜メンタルの4領域",q:"ベンチが投手交代を見極める材料として工藤が挙げるのは？",o:["ボールの変化・コントロールの乱れ・フォームの変化","積み上がった球数だけで機械的に判断する","打たれた安打の本数だけを見て判断する","ベンチの雰囲気とその場の直感で判断する"],a:0,e:"「フォームのここの動きが悪くなったら交代」と決めておき、捕手の感じ方と擦り合わせる。『野村ノート』の継投判断とも通じる。",p:"p.188-189"},

/* ===== キャッチャーの科学（川村卓監修・洋泉社MOOK） ===== */
{b:"科学",c:"科学｜タイプ別攻略",q:"トップの位置でグリップが肩より上にくる「グリップが高い打者」の基本傾向は？",o:["高目が得意で、低目が苦手","低目が得意で、高目全般が苦手","内角全般が苦手で外角が得意","高低より内外の好みがはっきり出る"],a:0,e:"特に外角低目。グリップが高いと高目にバットが出やすい。外角低目に落ちる球はグリップから一番離れており、相当バットを回さないと届かない。青木・坂本らがこのタイプ。",p:"p.8-9"},
{b:"科学",c:"科学｜タイプ別攻略",q:"構えのグリップの高さを見るとき、本当にチェックすべきなのは？",o:["トップの位置でグリップがどこに来ているか","構えた瞬間のグリップの高さだけ","バットの長さとヘッドの重さのバランス","ヘルメットの位置と目線の高さ"],a:0,e:"構えは高くても打つ時にグリップが下がる逆パターンも結構多い。トップの時に肩より上にあるかで判断する。",p:"p.8"},
{b:"科学",c:"科学｜タイプ別攻略",q:"高目の伸びるストレートを持つ投手が「グリップが高い打者」と対戦。有効な使い方は？",o:["2ストライクからのボール球の高目で誘う","高目は危険なので絶対に投げない","低目のボール球だけで攻め続ける","真ん中に集めて打たせて取る"],a:0,e:"高目は得意コースだから、少々のボール球でも「しめた」と手を出してくる。得意コースの周辺に実は苦手なコースが存在する。",p:"p.9"},
{b:"科学",c:"科学｜タイプ別攻略",q:"トップが肩のラインより低くなる「グリップが低い打者」が得意なのは？",o:["低目全般（ヘッドが自然に下がるため）","高目全般（バットが立つため）","内角高目の速い球","外角低目の速い球のみ"],a:0,e:"低い位置から体に沿って水平にバットを出すため、ヘッドの重さで先が下がり低目は全般的に得意になる。",p:"p.10"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「グリップが低い打者」に特に有効なボールは？",o:["ワンバウンドになるような低目の変化球","真ん中低めのゆるいストレート","外角のボールゾーンのスライダー","緩いカーブを続ける緩急"],a:0,e:"低目にはボール球でも手を出す傾向があるため、ワンバウンドになる変化球が有効。高目（特に内角高目）はバットを立てられず窮屈で苦手。オルティス・中田翔ら大型パワーヒッターに多い。",p:"p.10-11"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「グリップが体の内側に入る打者」（金属バットの高校生長距離打者に多い）が内角を打てない理由は？",o:["後ろ側のひじが前に出てこないため","目が内角の球を追えないため","ステップが外に逃げてしまうため","バットが長すぎて振り遅れるため"],a:0,e:"この構えでは後ろのひじが前に出ずバットを出せないため、内角はとても難しい。肩甲骨の柔軟性が高いメジャー選手は例外的に対応できる。",p:"p.12-13"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「グリップが体の内側に入る打者」が一番得意なコースは？",o:["低目以外の外角","内角高目（体の回転で叩ける）","真ん中低目（すくい上げられる）","高目全般（金属バットの反発）"],a:0,e:"腕が伸びる場所。低目以外の外角は腕が伸びた場所になるため一番得意。逆に高目の威力ある球や外角低目に落ちる変化球には手を出しやすく苦手。",p:"p.12"},
{b:"科学",c:"科学｜タイプ別攻略",q:"ベースの近くに立つ打者への攻めの基本は？",o:["内角中心（投げさせないための立ち位置だから）","外角中心（遠くて届かないから）","高目中心（目線を上げさせるため）","真ん中勝負（動じないため）"],a:0,e:"内角が苦手だから投げさせないようにベース近くに立つ選手が多い。だから攻めは当然内角が中心になる。",p:"p.14"},
{b:"科学",c:"科学｜タイプ別攻略",q:"ベース近くに立つ打者に内角を投げる前に確認すべき「罠」は？",o:["アウトステップして打つタイプは内角を待っている","スタンスの広さで狙いが変わっている","バットの重さで振り遅れている","ヘルメットの向きで内外がわかる"],a:0,e:"投球後にアウトステップして打つタイプは、内角を投げさせようとしてベース近くに立つ場合がある。待ち構えている格好のコースに投げてしまう。落合博満がこの動きの代表格。",p:"p.14"},
{b:"科学",c:"科学｜タイプ別攻略",q:"ベース近くに立つ打者は外角も得意とは言えない。その理由は？",o:["体がベース上にかぶって下がり、外角に届きにくい","外角は見えすぎて力んでしまうから","審判が外角を取らないと知っているから","外角は全打者共通の苦手だから"],a:0,e:"体がホームベース上にかぶるとボールに当たる危険があるため体が下がり、甘い外角以外は打ち損じが多い。特に外角低目は見えにくく、ボール球でも安易に手を出す。",p:"p.14-15"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「当て逃げタイプ」の左打者（俊足の1・2番に多い）に初球で有効なのは？",o:["カーブ（ストレートにタイミングを合わせているから）","高目の速いストレートで力ずくで押す","外角低めのストレートで丁寧に勝負","ボール球から入ってじっくり様子を見る"],a:0,e:"基本的にストレートにタイミングを合わせているので初球のカーブが効果的。カットボールなど速い変化球も捉えにくい。セーフティーバントの警戒も必要。",p:"p.16-17"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「当て逃げタイプ」の左打者が全く打てないことが多いコースは？",o:["一番レフト方向に近い外角","体に最も近い内角","ベルト付近の真ん中","高目のストライクゾーン"],a:0,e:"内角から真ん中を逆方向へ運ぶ技術に優れる反面、外角は当てながら走り出すためクリーンヒットしにくく、低目は捨てている傾向がある。",p:"p.16"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「振りが大きい打者」（体格の良い長距離型）への対策として本書が挙げるのは？",o:["カーブで緩急、シュートで食い込ませ詰まらせる","ストレートの力押しで空振りを狙う","外角低めだけに集めて我慢比べ","スローボールだけで的を外し続ける"],a:0,e:"揺さぶりをかけると体のコントロールが利かなくなるタイプ。カットボール系は力で運ばれるが、緩急には慣性が働いて体が崩れる。ストレートとカーブの組み合わせで翻弄する。",p:"p.18-19"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「振りが大きい打者」に対してコントロールに細心の注意が必要な理由は？",o:["低目の変化球も苦手だが、甘く入れば高確率で仕留めるから","どのコースに投げてもほぼ均等に打たれてしまうから","変化球にはまったくバットを出してこないから","ボール球には何があっても絶対に手を出さないから"],a:0,e:"すくい上げるスイングで高目は苦手、低目の変化球も得意ではないが、甘く入れば一発で仕留められる。",p:"p.18"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「振りが大きい構え」の打者について、プロレベルで注意すべき駆け引きは？",o:["高目が得意なのに苦手と思わせて狙い打つ選手がいる","構えを試合中に変えることは決してない","プロは駆け引きをせず力勝負を好む","必ず初球は見逃すと決めている"],a:0,e:"あえてこの構えから入り、高目を苦手と思わせて狙い打つ駆け引き上手も多い。打者の思惑に引っかからないよう注意深く観察する。",p:"p.19"},
{b:"科学",c:"科学｜タイプ別攻略",q:"スタンスが狭い打者（イチロー型）の傾向は？",o:["内角が得意で、外角の逃げていくボールに弱い","外角が得意で、内角の速い球に弱い","高目だけを得意にしている","低目だけを得意にしている"],a:0,e:"トップを長くキープし体をコンパクトに回転できるため内角に対応。体から遠ざかる（目から離れる）ボールは見えづらく、攻めるなら外角が有効。",p:"p.20-21"},
{b:"科学",c:"科学｜タイプ別攻略",q:"スタンスの狭い打者を見極めるとき、注意すべきポイントは？",o:["ステップした時のスタンス","構えた時のスタンスだけで判断してよい","グリップの高さを併せて見るだけ","足のサイズと歩幅で見る"],a:0,e:"打つ時に広がる打者がいる。構えでは狭くても打つ時にスタンスが広くなる打者もいるため、ステップ時のスタンスで見極める。",p:"p.20"},
{b:"科学",c:"科学｜タイプ別攻略",q:"前かがみに構える打者（小柄でしぶといタイプに多い）の得意・苦手は？",o:["やや外寄り・やや低目が得意で、内角全般が苦手","内角全般が得意で、外角全般が苦手","高目全般が得意で、低目全般が苦手","得意も苦手もはっきりしないタイプ"],a:0,e:"腕が一番伸びるポイントで打ちたい構え。内角低目に落ちる変化球はスイング軌道と合わず効果的で、高目の球威あるストレートも捉えられない傾向。井端・ペドロイアら。",p:"p.22-23"},
{b:"科学",c:"科学｜タイプ別攻略",q:"制球に難がある投手が前かがみの打者と対戦するとき、捕手がまずやるべきことは？",o:["投手を落ち着かせてから苦手な高目を突く","間を置かずすぐ敬遠に切り替える","内角だけを要求してぶつけ覚悟で攻める","打者を無視して淡々と外角に投げさせる"],a:0,e:"この構えには投手を心理的に揺さぶる目的の場合もある。制球難の投手は内角を攻めづらい心理になるため、捕手が場を落ち着かせた上で威力あるストレートで高目を突く。",p:"p.22-23"},
{b:"科学",c:"科学｜タイプ別攻略",q:"1993年日本シリーズ第4戦、川崎憲次郎（ヤクルト）が強力な西武打線を1失点に抑えた配球の鍵は？",o:["強風を把握しストレート主体で外野フライを打たせた","全球変化球にして最後まで的を絞らせなかった","敬遠を多用して強打者との勝負を避けた","内角だけを執拗に突いて詰まらせ続けた"],a:0,e:"野村監督が試合前に強風を把握し古田にストレート主体を指示。大きな当たりも風に押し戻され、この試合の外野フライは9つ。環境まで配球に織り込んだ好例。",p:"p.24"},
{b:"科学",c:"科学｜タイプ別攻略",q:"1995年日本シリーズでヤクルトがイチロー封じに使った攻めは？",o:["「内角高目に弱い」分析に基づく内角高目ストレート中心","外角低目一辺倒で逃げ続ける徹底した攻め","全打席歩かせ気味にする勝負回避の作戦","スローカーブを主体にした緩急の勝負"],a:0,e:"野村監督は「イチローは内角高目に弱い」とコメント。第1戦は内角高目ストレートで打ち取り、第4打席はインとアウトを広く使って空振り三振。シリーズはヤクルトが制した。",p:"p.25"},
{b:"科学",c:"科学｜タイプ別攻略",q:"「グリップが体から離れる打者」（ジーター型）の特徴と弱点は？",o:["外角高目をおっつけて二塁打。弱点は外角低目と内角高目","内角しか打てず外角にはまったく届かない","外角に強い代わりに内角は全く打てない","穴がなくどのコースも同じように打てる"],a:0,e:"懐が広く内角甘めもひじを畳んで引っ張れる。外角高目はライン際への二塁打が多い。攻めるなら外角低目・内角高目。",p:"p.65"},
{b:"科学",c:"科学｜タイプ別攻略",q:"ベースから離れて立つ打者（踏み込んでくるタイプ）が投手にとって嫌な理由は？",o:["ライン付近に投げられず、真ん中へ吸い込まれやすい","踏み込まれると外角がまったく見えなくなる","バントやセーフティの構えを隠しやすいから","足が速く内野安打がどんどん増えるから"],a:0,e:"踏み込んでくるため厳しいコースを投げる練習ができておらず、スーッと甘い球を投げがち。対策はボール球や四隅でゾーンを広く見せ、落ちるボールで誘う。A・ロッド、長野ら。",p:"p.66"},
{b:"科学",c:"科学｜タイプ別攻略",q:"スタンスが広い打者（長打力のある大型選手に多い）に一番避けたいボールは？",o:["コースも甘く変化もしない中途半端なボール","低目いっぱいのボールゾーンの変化球","大きな緩急のカーブとストレート","高目のボールゾーンの釣り球"],a:0,e:"甘い球を仕留めるのが得意なタイプ。高目や四隅の配球は苦手で、低目はストライクだと危険なのでボール球を有効に使う。ストレートとカーブの大きな緩急も効果的。T-岡田・森友哉・プホルスら。",p:"p.67"},
{b:"科学",c:"科学｜タイプ別攻略",q:"直立して構える打者（福留・イチロー型）に一番効果がある配球は？",o:["内角のボール球で開かせて外角勝負、左右を広く使う","高目のボール球だけを執拗に突き続ける","真ん中付近に集めて打たせて取り続ける","同じコースへ続けて的をあえて絞らせる"],a:0,e:"体の回転がしやすく内角高目寄りが得意。一番遠い外角低目に落ちる変化球にバットが回りやすい。",p:"p.68"},
{b:"科学",c:"科学｜タイプ別攻略",q:"バッターボックスの前方に立つ打者（アマチュアに多い）の意図と対策は？",o:["変化球が落ち切る前に打つ意図。高低の揺さぶりで打ち取る","ストレート狙いなので緩急を使う必要はない","内角が得意なので外角だけで勝負する","バント狙いなので前進守備で構えておく"],a:0,e:"変化球が苦手で低目のボール球に手を出しやすいタイプ。甘めの変化球を拾いに来ているので真ん中付近は禁物。高低にストレートを投げ分ける攻めも有効。",p:"p.69"},
{b:"科学",c:"科学｜タイプ別攻略",q:"ボックスの一番後方（捕手側）に立つ打者への基本の攻めは？",o:["低目でカウントを取り、対角線で揺さぶる","高目だけで攻めて目線を上げさせる","低目は見切られるので絶対に投げない","真ん中のストレートで力勝負する"],a:0,e:"低目の変化球を見極めたい意図の立ち位置。後ろに立つほど変化球は落ちるので、低目をしっかり投げればあまり手を出さずカウントが取りやすい。落ち切らない中途半端な変化球は要注意。",p:"p.70"},
{b:"科学",c:"科学｜タイプ別攻略",q:"バットを寝かせて構える打者（ミート重視）の狙いと攻め方は？",o:["ストレート狙いでやや高目が得意。低目でカウントを稼ぐ","変化球狙いで低目が得意。高目の速球で勝負","初球には絶対に手を出さないミート型","内角高目を誰よりも得意にしている"],a:0,e:"高目にバットを出しやすい構え。ただし内角高目・外角高目の両端と低目は苦手。体を突っ込ませてバットに引っ掛けさせる配球を狙う。",p:"p.71"},
{b:"科学",c:"科学｜基本技術",q:"本書が「配球の土台」と位置づけるキャッチャーの6つの基本技術とは？",o:["捕球・難球処理・スローイング・フライ・タッグ・バント処理","構え・声出し・打撃・走塁・牽制・中継の6つ","サイン・観察・記録・分析・準備・反省の6つ","捕球・送球・打撃・走塁・指示・応援の6つ"],a:0,e:"配球を覚える以前に、まずこの6つの基本技術の習得が必要不可欠というのが本書の立場。",p:"p.28"},
{b:"科学",c:"科学｜基本技術",q:"高校生レベルの二塁送球タイム（捕球から到達まで）の目安は？",o:["2.1秒ぐらいなら速く、2.2秒以上だと遅い","1.5秒を切らなければ遅いと言われる","2.5秒以内に投げられれば十分に速い","3秒以内が高校生の合格ラインとされる"],a:0,e:"投手がいくらクイックで投げても、捕手のスローイング技術が低ければ盗塁阻止の意味がない。",p:"p.28-29"},
{b:"科学",c:"科学｜基本技術",q:"ボールの握り替えのコツとして本書が紹介する感覚は？",o:["ミットから投げる手へ「トス」するように移す","ミットの中のボールを深くつかみにいく","ミットを振ってボールを浮かせて取る","両手で挟んだまま送球体勢に入る"],a:0,e:"元プロ捕手の話。つかむイメージより、キャッチしたらパッとトスする感覚の方が素早く移せて理に適っている。",p:"p.29"},
{b:"科学",c:"科学｜基本技術",q:"フレーミングの3つのポイントは？",o:["ミットを動かさない・手と球が垂直・親指の切り替え","強く捕る・大きく構える・素早く立ち上がる","音を鳴らす・体を寄せる・できるだけ低く構える","片手で捕る・引いて捕る・流れに乗せて捕る"],a:0,e:"この3つが捕球技術（フレーミング）の柱。ミットは投手の「的」なので動かすと的がブレる。",p:"p.88-89"},
{b:"科学",c:"科学｜基本技術",q:"右打者のとき、真ん中から内側のボールを楽に捕るコツは？",o:["苦しくなる手前で親指を立てて捕球する","親指を下に向けたまま我慢して捕る","ミットを下から出して掬い上げる","体ごと内側に寄せて正面で捕る"],a:0,e:"真ん中から外側は親指を下に向けて捕るが、内側は親指が下のままだと苦しい。ツーシームなど動く球の増加で親指を立てるタイミングはさらに重要になっている。",p:"p.30-31"},
{b:"科学",c:"科学｜基本技術",q:"ミット側（捕手の左側）で捕球した場合、投げ手側での捕球と比べてスローイングはどうなる？",o:["0.1秒遅くなる","0.1秒速くなる（体の流れを使えるから）","ほとんど変わらない（誤差の範囲）","0.5秒以上も大きく遅れてしまう"],a:0,e:"切り替えが上手い捕手でも。実験結果。ミットが流れると握り替えが遅れ、送球も遅れる。切り替えが下手ならさらに遅くなる。",p:"p.31"},
{b:"科学",c:"科学｜基本技術",q:"構えるとき、ヒジをヒザにつけてはいけない理由は？",o:["腕の可動範囲が狭くなるから","疲れて構えが低くなるから","審判から捕球が見えなくなるから","投手から的が見えにくくなるから"],a:0,e:"ヒジはヒザから浮かせて（離して）構える習慣をつける。小学生には辛い姿勢だが重要。",p:"p.31"},
{b:"科学",c:"科学｜基本技術",q:"キャッチャーが腕を伸ばして捕球する理由は？",o:["審判から捕球位置を見えやすくするため","肩とひじへの負担を減らすため","打者に威圧感を与えるため","ワンバウンドに備えるため"],a:0,e:"捕手特有の動き。その分ボールの勢いを吸収しにくいので、手とボールが垂直になる構えで軽く抑えるような捕球が有効になる。",p:"p.89"},
{b:"科学",c:"科学｜基本技術",q:"難球処理について、アメリカの捕手に浸透している原則は？",o:["ワイルドピッチも捕手の責任で「すべて止める」","ワイルドピッチは投手の責任と割り切る","難球は体に当てず捌くのが基本","難球処理の練習は週1回で十分"],a:0,e:"難球処理は米国で「ダート」と呼ばれ、日本人選手以上に練習している。",p:"p.32"},
{b:"科学",c:"科学｜基本技術",q:"難球処理の理想の形は？",o:["前に出ず、その場でお椀状に丸めて真ん中に集める","自分から前に出てボールに当たりにいく","胸を張って強く弾き返して勢いを殺す","横に飛んでミットだけで止めにいく"],a:0,e:"前に出て当たりに行くと大きく弾いて即座に処理できない。前に出ると胸を張った姿勢になり、どこへ転がるか予想もつかない。",p:"p.32-33"},
{b:"科学",c:"科学｜基本技術",q:"難球処理が下手な捕手が投手に与える悪影響は？",o:["全力で投げられなくなり、落ちる球種も使えなくなる","球速が上がりすぎてかえって制球が乱れる","牽制の回数が増えて打者への集中が切れる","投手の打撃にまで悪影響が出てしまう"],a:0,e:"どんなボールでも受け止めてくれる安心感が信頼関係の土台。捕手の技術の未熟さが味方投手の球種を制限してしまう。",p:"p.33,96"},
{b:"科学",c:"科学｜基本技術",q:"捕手がボールを弾いてランナーが1塁から2塁へ進むと、得点の確率はどうなる？",o:["約20%高まる","ほとんど変わらない","約5%だけ下がる","2倍以上に跳ね上がる"],a:0,e:"調査データ。ランナーを置いた場面で難球処理ができないと、得点の可能性が一気に高まる。",p:"p.33"},
{b:"科学",c:"科学｜基本技術",q:"「目をつぶらずにボールを追う」ための裏技として本書が紹介するのは？",o:["口をあけると目を閉じにくいという筋肉の特性を使う","まばたきを限界まで我慢する訓練をする","目を細めて衝撃に備える癖をつける","視線をボールの少し上に置いて追う"],a:0,e:"目の前で手を叩かれても「パッ」と声を出して口をあけると目を閉じずにいられる。マスクにボールを当てて恐怖心を薄れさせる練習とセットで紹介。",p:"p.99"},
{b:"科学",c:"科学｜基本技術",q:"素早いスローイングに必要な3つの動きは？",o:["素早い握り替え・素早く軸足に体重・上下半身の回転","大きなステップ・強い腕力・速いボールの3つ","前進しての捕球・ジャンプスロー・片手捕り","低い姿勢・強い遠投力・速い足の3つ"],a:0,e:"前方向に体が突っ込むと腕だけの送球になり、下半身のパワーが使えない。",p:"p.103"},
{b:"科学",c:"科学｜基本技術",q:"送球のコントロール精度を上げるための時間の使い方は？",o:["捕球から接地までを短く、狙いを定める時間を長く","すべての動作をとにかく均等に速くする","捕球から接地までをじっくり長く取る","狙いは定めず反射のスピードだけで投げる"],a:0,e:"ピッチャーが軸足に体重を乗せて狙いを定めるのと同じ理屈。下半身の回転も使えるため狙いが定まりやすくなる。",p:"p.34,103"},
{b:"科学",c:"科学｜基本技術",q:"捕球後、コントロールを乱さずスムーズに送球モーションに入るコツは？",o:["ミットと投げ手を下に向けるとヒジがスムーズに回る","捕ったらすぐにヒジを頭より高く上げる","ミットを胸の前に高く構え直してから投げる","体を大きく反らせて反動を最大限に使う"],a:0,e:"早くヒジを上げようとするとリリース時にヒジが前に出ずコントロールが乱れる選手がいる。",p:"p.34-35"},
{b:"科学",c:"科学｜基本技術",q:"測定で「超一流」とわかった谷繁元信のスローイングの特徴は？",o:["重心移動が小さく下胴の回転で1.83秒・5球全部ストライク","誰よりも大きくステップして剛速球を投げ込んでいた","上半身の力だけで最速の送球を繰り出していた","ジャンプしながら投げる新しい技術を使っていた"],a:0,e:"大きいステップは球速が出るが精度が低い。谷繁は体をほとんど前に出さず上下半身の回転で投げ、時間も精度も圧倒的だった。",p:"p.26,36"},
{b:"科学",c:"科学｜基本技術",q:"ポージーら一流捕手が素早く前足へ体重移動するために使う動きは？",o:["左ヒザを下げて前足に体重を移す","高くジャンプして送球に勢いをつける","右足を大きく前に踏み出して距離を稼ぐ","上体を反らせて投げるためのタメを作る"],a:0,e:"立ち上がらない。多くの選手は立ち上がって体重移動するが、左ヒザを下げれば捕球から右足接地が速くなり、右足→左足の時間で力と正確さを得られる。",p:"p.36-37,104"},
{b:"科学",c:"科学｜基本技術",q:"左バッターが打席にいるときの1塁送球で必要になる動きは？",o:["バッターを避けるため少し大きくステップする","構わずまっすぐ最短距離で投げる","必ず山なりの送球で頭を越す","目線を大きく動かして確認してから投げる"],a:0,e:"右バッターがいる時の3塁送球も同様に大きく後ろにステップしてから投げる。目線を動かさず送球する技術が大切。",p:"p.35,107"},
{b:"科学",c:"科学｜基本技術",q:"バント処理の捕球で理想的な位置は？",o:["体の真ん中でミットと手を挟むように捕る","体のできるだけ前で素早くつかむ","体の後ろ側で引きつけて捕る","素手だけで片手キャッチする"],a:0,e:"前で捕ると体が突っ込み、後ろだと体が上を向いて送球体勢が遅れる。素手で捕ろうとすると正確性を欠く（人工芝では特に回転で捕り逃す）。",p:"p.38-39"},
{b:"科学",c:"科学｜基本技術",q:"著者がスローイング安定の目的でバント処理練習をよくやらせる理由は？",o:["頭が動かず目線が安定した送球の基本が身につくから","肩そのものの強さがどんどん鍛えられるから","足腰が鍛えられて走力まで上がっていくから","自分がバントを打つ技術も上手くなるから"],a:0,e:"ステップワークと真ん中での捕球を覚えると、しっかりした軸で投げられるようになる。投手や一・三塁手が処理する時は捕るべき選手と送球先を大声で指示するのも捕手の役目。",p:"p.39"},
{b:"科学",c:"科学｜基本技術",q:"現代のホームタッグプレーのルールと技術は？",o:["ブロック禁止。本塁を空けて待ち、片手で払うようにタッチ","体を張って本塁を完全にふさいで待ち構える","両手でがっちり捕球してから抱え込んで守る","走者より先に本塁ベースを踏めばアウトになる"],a:0,e:"メジャーは2014年から禁止、日本も送球を待つ際に本塁をふさいではならない。実はルールブックには元々本塁を空けるよう書かれていた。片手タッチはガッチリ置くより払う方がアウトにしやすい。",p:"p.40-41"},
{b:"科学",c:"科学｜基本技術",q:"キャッチャーフライを原則「顔よりも上の位置」で捕る理由は？",o:["強烈な回転で、地面に近づくほど軌道がブレるから","太陽や照明の光が視界に入りやすくなるから","低い位置で捕ろうとすると審判と交錯するから","低い位置ではミットが閉じにくくなるから"],a:0,e:"顔の下で捕ろうとすると落下点が微妙に変わる。軌道は本塁へ戻る小文字のLを描くため、周り込んで捕球する。ミットの進化で今は片手捕球が新常識。",p:"p.42-43"},
{b:"科学",c:"科学｜基本技術",q:"キャッチャーフライを追うとき、外したマスクはどうする？",o:["踏まないよう意図的に遠くへ投げる","すぐ足元に落として身軽になる","かぶったまま最後まで追いかける","ベンチ方向へ転がしておく"],a:0,e:"自分のそばに落とすとフライを追う際に踏む可能性がある。フェンス際はケガ防止のためスライディングしながら捕球する技術も覚える。",p:"p.113-114"},
{b:"科学",c:"科学｜基本技術",q:"サインを出すときの基本は？",o:["左手の付け根付近で、ひざをやや閉じ腕を体に付けて出す","できるだけ高い位置で大きくはっきり出す","足の外側で素早く小さく出す","声とジェスチャーを組み合わせて伝える"],a:0,e:"手を深く入れると横から見える。腕が体から離れるとひじの動きでサインの特徴が出る。鏡で確認し、投手からはっきり見えるかも把握しておく。",p:"p.44-45"},
{b:"科学",c:"科学｜基本技術",q:"投手への「低く、低く」という大きなゼスチャーについて、調査でわかったことは？",o:["逆効果（かえって高く浮きワンバウンドが増える）","低目にビタッと決まる確率が確実に上がる","投手の気合が入って球速と球威が増す","変化球の曲がりがひと回り大きくなる"],a:0,e:"低目を意識しすぎるとかえってコントロールできない。余計なゼスチャーはしない。",p:"p.45"},
{b:"科学",c:"科学｜基本技術",q:"バントシフトなどフォーメーションプレーのサインの出し方は？",o:["大きく、ゆっくりとキーとなる部位を触って伝える","小さく素早く出して盗まれないようにする","出さずに目配せだけで伝える","攻撃中に前もって全部決めておく"],a:0,e:"小さく早く出すと野手に伝わらず、サイン違いを起こす可能性がある。",p:"p.44"},
{b:"科学",c:"科学｜基本技術",q:"試合中に相手ベンチを見る捕手の役割として本書が挙げるのは？",o:["サインを出す部位の変化から「何かある」と予測する","相手ベンチの悪口や弱音を聞き取っておく","間を取って味方投手を少し休ませておく","相手監督の機嫌と采配の傾向を観察する"],a:0,e:"冷静に判断できる捕手には「相手ベンチを見ろ」と指導。触る部位が変わったら要注意。監督の立場では「察知されているのでは」と嫌な気持ちになる。",p:"p.45"},
{b:"科学",c:"科学｜配球の考え方",q:"本書の定義では、配球とは何か？",o:["バッテリーがどう打ち取るかを選択する「戦略」","投手が投げたい球を並べる「感覚」","捕手の経験がすべての「職人技」","データ通りに決める「計算」"],a:0,e:"チーム全体の守りを前提として、どうピッチングを組み立てて投げるかが配球の基本。",p:"p.50"},
{b:"科学",c:"科学｜配球の考え方",q:"配球に対する日本とアメリカの発想の違いは？",o:["米国は苦手球をどんどん、日本は一球ごとに意図で翻弄","米国は変化球中心で、日本は直球中心の文化","米国は捕手主導で、日本は投手主導の文化","実は日米で考え方に違いはほとんどない"],a:0,e:"日本ではカウントが変わるごとに投球の意図が変化し、配球の妙味が細分化されている。",p:"p.50"},
{b:"科学",c:"科学｜配球の考え方",q:"野球のゲーム構造から導かれる守りの鉄則は？",o:["本塁から近い塁にはできるだけランナーを進めない","ランナーはどの塁にいても危険度は変わらない","1塁までは自由に進ませてもまったく問題ない","得点は放たれたヒットの数だけで決まっていく"],a:0,e:"野球はボールでなく人（ランナー）が得点源。走者の塁が本塁に近いほど得点確率は上がる。一方「3塁まで進めても本塁を踏ませず3アウト」という考え方も存在し、捕手はその両方を持つ。",p:"p.51"},
{b:"科学",c:"科学｜配球の考え方",q:"相手打線の二回り目・三回り目について本書が指摘するのは？",o:["同じ対応を続けると大方失敗し、三回り目は読まれる","決めた同じ攻めを最後まで貫き通すのが基本","二回り目からは配球を深く考える必要はない","三回り目がいちばん抑えやすくなっていく"],a:0,e:"回り目ごとに方向性を変える必要がある。試合展開を予測する能力が捕手に求められる。",p:"p.51"},
{b:"科学",c:"科学｜配球の考え方",q:"「名捕手は◯◯」と言われる。◯◯に入るのは？",o:["人をよく見ている","肩が誰よりも強い","声でチームを動かす","記録を細かくつける"],a:0,e:"1球目を投げた時の表情やしぐさで2球目以降の組み立てを変えられる。日常から人を観察するタイプは良い捕手になる素養がある。",p:"p.51"},
{b:"科学",c:"科学｜配球の考え方",q:"配球の基本となる2つの軸は？",o:["左右と高低","速球と変化球","内角と真ん中","強気と弱気"],a:0,e:"内角高目と外角低目のような対角線の揺さぶりが欠かせない。コースだけでなく球種も組み合わせる。",p:"p.46"},
{b:"科学",c:"科学｜配球の考え方",q:"近年の高校野球でとくに効果的とわかってきた揺さぶりは？",o:["高低の揺さぶり","左右の揺さぶりだけを磨くこと","クイックと牽制の多用","同じ球を続ける度胸"],a:0,e:"縦の揺さぶり。下からすくい上げるように打つバッターが増え、スピンの利いた伸びのある高目は上から捉えにくい。意外と高低の揺さぶりを忘れているバッテリーが多い。",p:"p.46"},
{b:"科学",c:"科学｜配球の考え方",q:"「高目は危険」という通説について本書の見解は？",o:["危険なのは抜けた高目。スピンの利いた高目は攻めにくい","高目はどんな球であっても常に危険なコース","高目はどんな球であってもむしろ安全なコース","高目を多用すると審判の心証が悪くなるだけ"],a:0,e:"力のある高目にうまくかぶせて打てるバッターは少なくなっている。",p:"p.46"},
{b:"科学",c:"科学｜配球の考え方",q:"サイドスローやアンダースローの投手について本書の提言は？",o:["高目に伸びる球と落ちる球で高低をうまく使うべき","とにかく左右の揺さぶりに徹するべき","高目は浮くので絶対に使わない方がよい","変化球を捨てて速球だけで押すべき"],a:0,e:"コースは厳しくなくてもよいので、高低のコンビネーションを使えばかなり有効な投球になる。",p:"p.47"},
{b:"科学",c:"科学｜配球の考え方",q:"トーナメントの高校野球で非常に有効な「組み立ての準備」とは？",o:["通常セオリーと裏セオリーの2通りの組み立てを持つ","1つの得意パターンだけを極限まで磨き続ける","相手に合わせて毎試合ゼロから組み立て直す","セオリーをすべて捨てて感覚だけで勝負する"],a:0,e:"組み立てが2つあるだけでバッターは迷う。投手の良いところを引き出すパターン作りも大事。",p:"p.47"},
{b:"科学",c:"科学｜配球の考え方",q:"「ピッチング基本の3原則」として本書が挙げる3つの変化は？",o:["投球コースの変化・球種の変化・スピードの変化","高さ・強さ・速さの三段階","ストレート・カーブ・フォークの三本柱","構え・握り・腕の振りの三要素"],a:0,e:"①高低・内外・対角線などコースの変化 ②外角速球直後に同じ球道からスライダー、プレートの踏み位置の使い分けなど ③ゆったりしたフォームやクイック気味のフォームも含めたスピードの変化。",p:"p.47"},
{b:"科学",c:"科学｜配球の考え方",q:"ピンチや打たせてはいけない場面で、初球にあえてボール球で入る意味は？",o:["バッターの反応やしぐさを見て2球目以降に活かせる","投手がひと呼吸置けてリズムが良くなる","球審のその日のゾーンを確認しておける","走者の飛び出しを誘ってアウトにできる"],a:0,e:"一見消極的に見えるが、狙いや様子を見る大事な1球。見送った時の反応や表情が大きな情報になる。",p:"p.54,60"},
{b:"科学",c:"科学｜配球の考え方",q:"2ストライクに追い込んだ後の「誘い球」として有効なボール球の例は？",o:["外角低目のストレート、落ちる変化球、高目の力ある球","タイミングを外す真ん中のゆるいスローボール","意表を突くど真ん中への全力ストレート","ボール球を誘いに使うことはそもそもない"],a:0,e:"打者心理を利用してボール球に意味を持たせる。ボール球はマイナスではなく配球の武器になる。",p:"p.60"},
{b:"科学",c:"科学｜配球の考え方",q:"盗塁を察知したときにウエストボールが有効な理由は？",o:["普通の投球よりウエストの方が送球動作が素早くなるから","打者が驚いて必ず空振りしてくれるから","投げ損の1球で投手の肩を休ませられるから","盗塁警戒を審判にアピールできるから"],a:0,e:"ランナーの足と捕手の肩を比べて明らかに捕手が上なら積極的に阻止を選択。ヒットエンドラン対策にも有効。",p:"p.60"},
{b:"科学",c:"科学｜配球の考え方",q:"3塁ランナーのリードが急に小さくなったり、何もしなくなったら？",o:["スクイズを疑って要注意。外せば三本間で刺せる","警戒を解いて目の前の打者に集中してよい","もう牽制はいっさいしなくてよいという合図","盗塁の仕掛けはもうないと考えてよい場面"],a:0,e:"ウエストしてスクイズを外せればピンチ脱出でムードも一気に傾く。バッターの様子やしぐさにも気をつける。",p:"p.61"},
{b:"科学",c:"科学｜配球の考え方",q:"敬遠について本書の考えは？",o:["「逃げ」に見えても、きわめて有効な作戦","卑怯なので使わないのが正しい","プロだけに許された特別な作戦","ルール上推奨されない作戦"],a:0,e:"手のつけられない強打者や、1塁が空いている得点圏の場面で有効。ウエストも敬遠も暴投の危険があるため普段から練習しておく。",p:"p.61"},
{b:"科学",c:"科学｜配球の考え方",q:"甲子園データで送りバント成功率が90%を超えるため特に警戒が必要なカウントは？",o:["2ボール0ストライク・1ボール1ストライク・2ボール1ストライク","0ボール2ストライクと1ボール2ストライクの場面","3ボール2ストライクのフルカウントだけ","初球の0ボール0ストライクの場面だけ"],a:0,e:"バント有利の浅い・ボール先行カウントでは成功率が9割を超える。スクイズも成功率75%超のカウントでは勇気を持ったボール球（外し）が大きなポイント。",p:"p.61"},
{b:"科学",c:"科学｜カウント別",q:"初球のバッターの基本的な狙いは？",o:["「最初のストライクは直球で来る」と考えて打ちに来る","どんな場合でも必ず1球は見逃してくる","変化球だけに的を絞って待ち構えてくる","狙いを持たずに来た球へ反応して打ってくる"],a:0,e:"様子見で見逃すこともあるが、基本は最初のストライクを打ちに来ている。",p:"p.52"},
{b:"科学",c:"科学｜カウント別",q:"ヒットが続いたりエラーが出た直後など、攻撃側が押している状況の打者は？",o:["イケイケの状態で初球から積極的に振ってくる","流れとは逆に慎重になって見逃しが増えてくる","バントで手堅く確実に走者を進めようとする","三振を恐れて当てにいく打撃になってくれる"],a:0,e:"流れが来ている時は初球からのスイングを警戒する。",p:"p.52"},
{b:"科学",c:"科学｜カウント別",q:"四死球の直後・投手交代直後・投手が疲れている時、打者はどう考えている？",o:["「ストライクを取りに来る」と考えて狙っている","「ボールが続く」と考えて待っている","「敬遠されるかも」と考えている","特に何も考えずに立っている"],a:0,e:"ストライクが欲しい場面では、打者は取りに来る球を思い切り振ってくる。",p:"p.52"},
{b:"科学",c:"科学｜カウント別",q:"甲子園3年分の調査で打率が高かったのはどんなカウント？",o:["1-0・2-1などボールが1つ先行しているカウント","0-2などストライクが先行したカウント","フルカウントまでもつれたときだけ","初球を打ちにいったときだけ"],a:0,e:"ボール先行時は投手がストライクを欲しがり、打者がその球を狙って思い切り振るため。攻撃側のヒッティングチャンス。",p:"p.53-54"},
{b:"科学",c:"科学｜カウント別",q:"0ボール1ストライクの打者心理は？",o:["追い込まれるのが嫌で、少々のボール球でも振ってくる","まだ余裕があるので甘い球だけをじっと待ってくる","早くも四球狙いに完全に切り替えて振らなくなる","次の球では必ずバントの構えを見せてくる"],a:0,e:"0-1をうまく作れると投手に「ボール球を投げられる」余裕が生まれる。ストレート狙いと分かればスッと抜くボールでゴロを打ち取るパターンも生まれやすい。",p:"p.52,54"},
{b:"科学",c:"科学｜カウント別",q:"1-1は何を狙うカウントと覚えるべき？",o:["ファールを打たせるカウント","敬遠を考え始めるカウント","ウエストして様子を見るカウント","何も仕掛けない中間のカウント"],a:0,e:"スイング軌道を見て「このスイングならこの方向にしか飛ばない」と察知しファールを打たせて1-2にすると、すごく楽になる。",p:"p.55"},
{b:"科学",c:"科学｜カウント別",q:"著者が長年の野球経験から「一番危ない」と言うのは？",o:["良いボールでも同じコースに続けること","ボール球ばかりで慎重に入りすぎること","変化球で安易にカウントを取りにいくこと","高目の釣り球を早いカウントで見せること"],a:0,e:"2球目は甘くなる。決め球でストライクを取った後は、1球外すか違うボールを投げる選択をすべき。",p:"p.55"},
{b:"科学",c:"科学｜カウント別",q:"2-0からの投手へのアドバイスとして著者がよく言うのは？",o:["「追い込まれないように」でなく余裕を持ってどんどん勝負","四球を覚悟してボールゾーンだけを使い続ける","真ん中に置きにいくストレートで確実にストライク","打者のタイミングに合わせた緩い球だけで様子見"],a:0,e:"ボール球で遊ぶと勝負球を厳しくしないと打ち取れなくなる。ストレートと変化球をしっかり投げ分けて攻める。",p:"p.56"},
{b:"科学",c:"科学｜カウント別",q:"0-2からの攻めについて、現代の高校野球で著者が勧める考え方は？",o:["1球外すより、どんどん勝負していく","昔ながらのセオリー通り必ず1球大きく外す","どんな相手でも敬遠気味に慎重に外していく","必ず一度ウエストして走者の動きを確認する"],a:0,e:"あと4球ある。金属バットの性能が上がった現代は0-2からどんどん攻める風潮。ただし手強い打者との対戦では一呼吸置くための1球外しは有効。4球すべて勝負球の気持ちで。",p:"p.56"},
{b:"科学",c:"科学｜カウント別",q:"1-2の配球で大事な視点は？",o:["どういう過程で1-2になったかで次の球を変える","カウントが同じなら配球も毎回同じでよい","必ずウエストしてから勝負する","直前と同じ球を続けるのが基本"],a:0,e:"0-2→1-2なら、いかにウイニングショット（勝負球）を投げ込めるかが重要。1-1から良い球でストライクを取った後なら同じボールを続けない。",p:"p.56"},
{b:"科学",c:"科学｜カウント別",q:"球速が遅い投手がクイックでストレートを投げて差し込んだ後、有効な攻めは？",o:["「遅れまい」と早く準備した打者に、今度は遅い球で外す","成功した同じクイックのストレートを続けて押す","思い切って敬遠に切り替え次の打者と勝負する","牽制を何度も続けて走者の集中を削いでいく"],a:0,e:"うまくタイミングを外せばバッターはなかなか振りにこられない。緩急は球速だけでなく「間」でも作れる。",p:"p.56"},
{b:"科学",c:"科学｜カウント別",q:"2-2のバッター心理は？",o:["「あと1球でフルカウント」の欲で際どい球にも積極的に来る","完全に受け身になって見送りがどんどん増える","四球狙いに切り替えてバットを振らなくなる","初球とまったく同じ心理状態に戻っていく"],a:0,e:"このカウントまでスイングしていない打者はボール球にも手を出す傾向が強い。バッテリーはタイミングを外すボールを要求したい。",p:"p.53,57"},
{b:"科学",c:"科学｜カウント別",q:"「頭の良いキャッチャー」がわざと3-0を作ることがある理由は？",o:["3-0からの1球目はほぼ振らないので、戻して仕掛けられる","わざと待たせて打者を苛立たせ集中力を切らすため","投手の肩と気持ちをひと呼吸休ませる間を作るため","申告敬遠への切り替えの判断をしやすくするため"],a:0,e:"3-0では四球狙いでよほど甘くない限り手を出さない打者が大半。3-1からしっかり投げ込めれば、後はボール球を振らせる仕掛けができる。",p:"p.53,58"},
{b:"科学",c:"科学｜カウント別",q:"3-1からできる限りストレートでカウントを取りたい理由は？",o:["変化球だと次にストレートを狙われ、3-2が苦しくなるから","3-1からの変化球はルール上投げられないから","ストレートが一番速くて安全な球種だから","3-1では打者が必ず見逃してくれるから"],a:0,e:"3-1でストレートが来ると打者は迷う。不用意な変化球は自分の首を絞める。",p:"p.58"},
{b:"科学",c:"科学｜カウント別",q:"3-2（フルカウント）について本書が指摘する意外な事実は？",o:["意外とボール球で空振りが取れるカウント","絶対にストライクを投げるしかない場面","打者は必ずバットを止めてくる場面","バントの警戒が最優先の場面"],a:0,e:"打者は開き直って積極的になりゾーンを広げている。ストレートでファールを取れれば次の変化球が効く。甲子園の好投手は3-2からわざとボール球で空振りを取れる投手が多い。",p:"p.53,58"},
{b:"科学",c:"科学｜カウント別",q:"甲子園データで「見逃しストライク」を取る球種・コースの傾向は？",o:["外角のストレートが圧倒的に多い","内角のカーブが最も多い","真ん中のフォークが最も多い","高目のシュートが最も多い"],a:0,e:"どの対戦の組み合わせでもストレートの比重が高く（多くは65%以上）、コースは外角が圧倒的。",p:"p.57"},
{b:"科学",c:"科学｜カウント別",q:"甲子園データで「空振りストライク」を取る球種の傾向は？",o:["スライダー","力のあるストレートだけで取っている","大きく割れるカーブが圧倒的に多い","シュートとシンカーの内寄りが大半"],a:0,e:"特に右対右・左対左で比率最高。見逃しはストレート・空振りはスライダー、と傾向が分かれる。135km/hのストレートと120km/hのスライダーがあれば空振りが取れる。",p:"p.57"},
{b:"科学",c:"科学｜観察眼と弱点",q:"高校生バッターの観察で特に大きな手がかりになるのは？",o:["表情（喜怒哀楽がよく顔に出るため）","背番号と打順の並びの規則性","バットの色と長さのこだわり","スパイクの汚れ方と手入れ"],a:0,e:"打席内のバッターを観察すると、どうすれば打ち取れるかのヒントが見えてくる。",p:"p.62"},
{b:"科学",c:"科学｜観察眼と弱点",q:"見逃した後に「やっちゃった」という表情が出たバッターは何を意味する？",o:["狙っていた絶好球を見逃して後悔している可能性が高い","次の球では必ずバントをしてくるという合図","完全に打つ気をなくしてしまったという証拠","バッテリーを揺さぶるための挑発のパフォーマンス"],a:0,e:"狙い球が分かる大きなヒント。ただし、わざとそう振る舞ってバッテリーをかく乱するバッターもいるので念のため注意。",p:"p.62"},
{b:"科学",c:"科学｜観察眼と弱点",q:"初球にギリギリのコースへ投げたとき、狙い球を見抜くポイントは？",o:["悠然と見送るか、バットがピクッと動くか","見送るときの打者の声と息づかい","相手ベンチからの声援の大きさの変化","次の構えに入るまでの時間の長さ"],a:0,e:"バットが反応したかどうかで、どのボールに狙いを絞っているかが見える。",p:"p.62"},
{b:"科学",c:"科学｜観察眼と弱点",q:"ネクストバッターズサークルの素振りから読み取れることは？",o:["苦手箇所の矯正が多い","得意コースを最終確認している素振り","素振りから読み取れる意味はほとんどない","ベンチと打者の間のサインになっている"],a:0,e:"高目を振れば高目を意識。素振りには特徴がよく出る。ブンブン振っていたら初球からストレートを狙っている傾向が強い。",p:"p.62-63"},
{b:"科学",c:"科学｜観察眼と弱点",q:"ファールが真後ろに飛んだときの意味は？",o:["タイミングが合っているサイン。次のボールは警戒","タイミングがまったく合っていないという証拠","打者の集中と体力が切れてきているという合図","狙い球を完全に外しているという良い兆候"],a:0,e:"しっかりしたスイングでミートポイントで捉えた時にファールは真後ろに飛ぶ。",p:"p.63"},
{b:"科学",c:"科学｜観察眼と弱点",q:"逆方向にファールが飛んだ打者に効果的なボールは？",o:["高目の力のあるストレート","低目へ大きく割れるカーブで揺さぶる","外角のスローボールでじっくり泳がせる","真ん中のチェンジアップでタイミングを外す"],a:0,e:"ヘッドが下がっているタイプは高目が苦手。引っ張ったファールならヘッドが回っているのでスライダーなど変化するボールが打ち取りやすい。",p:"p.63"},
{b:"科学",c:"科学｜観察眼と弱点",q:"インコースのボールを異常に避けようとするバッターは？",o:["インコースが弱点だと見てよい","インコースが得意な構えである","死球の経験がない初々しさ","外角も同じように苦手なはず"],a:0,e:"何気ない動作から弱点が見える代表例。",p:"p.78"},
{b:"科学",c:"科学｜観察眼と弱点",q:"タイミングの取り方による攻め分けの鉄則は？",o:["遅い打者は緩急で、早い打者は手元で曲がる速い変化球で","早い打者に緩急、遅い打者に速い変化球で","全打者に大きな緩急だけで攻める","全打者に速い変化球だけで攻める"],a:0,e:"遅く取る打者は対応力があるが崩しやすい。一本足打法など早く形を作る打者は実は緩急に対応できるため、カットボールなど手元で動く速い球が有効。",p:"p.78"},
