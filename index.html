<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b3d2e">
<title>配球クイズ ⚾</title>
<style>
  :root{
    --bg:#0b3d2e; --bg2:#0f5740; --card:#ffffff; --ink:#1a2a26;
    --muted:#6b7d77; --line:#e3eae7; --accent:#2e8b57; --accent2:#1f6b41;
    --gold:#e8b53b; --ok:#1f9d55; --okbg:#e8f7ee; --ng:#d8473b; --ngbg:#fdecea;
    --shadow:0 8px 30px rgba(0,0,0,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    min-height:100vh; min-height:100dvh;
    display:flex; justify-content:center;
    padding:env(safe-area-inset-top) 12px calc(env(safe-area-inset-bottom) + 12px);
  }
  .app{width:100%; max-width:560px; margin:auto 0;}
  .wrap{padding:18px 0 8px;}

  /* header */
  .brand{text-align:center; color:#fff; margin:14px 0 18px;}
  .brand .ball{font-size:40px; line-height:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));}
  .brand h1{font-size:26px; margin:6px 0 2px; letter-spacing:.04em;}
  .brand p{margin:0; font-size:13px; opacity:.85;}

  .card{background:var(--card); border-radius:20px; box-shadow:var(--shadow); padding:20px; }

  h2.sec{font-size:15px; margin:2px 0 12px; color:var(--accent2); display:flex; align-items:center; gap:8px;}
  h2.sec::before{content:""; width:5px; height:18px; background:var(--gold); border-radius:3px;}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    border:1.5px solid var(--line); background:#fff; color:var(--ink);
    border-radius:999px; padding:8px 14px; font-size:13px; cursor:pointer;
    transition:.15s; user-select:none; font-weight:600;
  }
  .chip small{font-weight:400; color:var(--muted); margin-left:4px;}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff;}
  .chip.on small{color:rgba(255,255,255,.8);}
  .chip.book{border-color:var(--accent2); color:var(--accent2);}
  .chip.book.on{background:var(--accent2); color:#fff;}
  .catgroup{margin-bottom:14px;}
  .catgroup:last-child{margin-bottom:0;}
  .cathead{font-size:12.5px; font-weight:800; color:var(--accent2); margin:0 0 7px 2px; display:flex; align-items:center; gap:6px;}
  .cathead::before{content:""; width:8px; height:8px; border-radius:2px; background:var(--gold);}
  /* 進捗ダッシュボード */
  .goal{font-size:12.5px; color:var(--muted); margin:8px 2px 10px; line-height:1.6;}
  .drow{display:flex; align-items:center; gap:8px; font-size:12.5px; margin-bottom:7px;}
  .drow .nm{width:9.5em; font-weight:700; line-height:1.3;}
  .dbarw{flex:1; height:9px; background:#eef2f0; border-radius:99px; overflow:hidden;}
  .dbar{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width .4s;}
  .drow .pc{width:7.5em; text-align:right; color:var(--muted); font-weight:700; font-size:11.5px;}
  .btn.review{background:linear-gradient(135deg,#b7791f,#e8b53b); box-shadow:0 6px 16px rgba(184,121,31,.35); font-size:15px; padding:13px;}

  .row{display:flex; gap:8px; margin-top:8px;}
  .ghost{background:transparent;border:1.5px solid var(--line);color:var(--muted);border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer;}

  .opts{display:flex; gap:8px; flex-wrap:wrap;}
  .opt-num{flex:1; min-width:64px;}
  .seg{display:flex; border:1.5px solid var(--line); border-radius:12px; overflow:hidden;}
  .seg button{flex:1; border:0; background:#fff; padding:10px 4px; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer;}
  .seg button.on{background:var(--accent); color:#fff;}

  .btn{
    display:block; width:100%; border:0; border-radius:14px; cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
    font-size:18px; font-weight:800; padding:16px; margin-top:16px; letter-spacing:.05em;
    box-shadow:0 6px 16px rgba(31,107,65,.4); transition:.12s;
  }
  .btn:active{transform:translateY(1px); box-shadow:0 3px 8px rgba(31,107,65,.4);}
  .btn.lite{background:#fff;color:var(--accent2);border:2px solid var(--accent);box-shadow:none;}

  /* quiz */
  .topbar{display:flex; align-items:center; justify-content:space-between; color:#fff; margin:6px 2px 12px; font-size:13px;}
  .topbar .quit{background:rgba(255,255,255,.15); border:0; color:#fff; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer;}
  .pbar{height:8px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden; margin:0 2px 14px;}
  .pbar i{display:block; height:100%; background:var(--gold); width:0; transition:width .3s;}

  .qmeta{font-size:12px; color:var(--muted); margin-bottom:6px; display:flex; gap:8px; flex-wrap:wrap;}
  .tag{background:#eef5f1; color:var(--accent2); border-radius:6px; padding:2px 8px; font-weight:700;}
  .qtext{font-size:19px; font-weight:700; line-height:1.5; margin:4px 0 16px;}

  .answers{display:flex; flex-direction:column; gap:10px;}
  .ans{
    text-align:left; border:2px solid var(--line); background:#fff; color:var(--ink);
    border-radius:14px; padding:14px 14px 14px 46px; font-size:15.5px; line-height:1.45;
    cursor:pointer; position:relative; transition:.12s; font-weight:600;
  }
  .ans .mk{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:24px;height:24px;border-radius:50%;
    border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--muted); font-weight:800;}
  .ans:active{border-color:var(--accent);}
  .ans.correct{background:var(--okbg); border-color:var(--ok);}
  .ans.correct .mk{background:var(--ok); border-color:var(--ok); color:#fff;}
  .ans.wrong{background:var(--ngbg); border-color:var(--ng);}
  .ans.wrong .mk{background:var(--ng); border-color:var(--ng); color:#fff;}
  .ans.dim{opacity:.55;}
  .ans[disabled]{cursor:default;}

  .explain{margin-top:14px; background:#f6faf8; border:1px solid var(--line); border-left:5px solid var(--accent); border-radius:10px; padding:12px 14px; font-size:14px; line-height:1.6; display:none;}
  .explain.show{display:block; animation:fade .25s;}
  .explain b{color:var(--accent2);}
  .explain .src{display:block; margin-top:6px; font-size:11.5px; color:var(--muted);}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

  /* result */
  .result{text-align:center;}
  .score-ring{width:160px;height:160px;margin:6px auto 10px; position:relative;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .score-ring .num b{font-size:42px; line-height:1; color:var(--accent2);}
  .score-ring .num span{font-size:13px; color:var(--muted);}
  .rmsg{font-size:18px; font-weight:800; margin:4px 0 2px;}
  .rsub{font-size:13px; color:var(--muted); margin-bottom:10px;}
  .review{text-align:left; margin-top:16px;}
  .review h3{font-size:14px; color:var(--accent2); margin:0 0 8px;}
  .rev-item{border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; font-size:13.5px; line-height:1.5;}
  .rev-item .q{font-weight:700; margin-bottom:6px;}
  .rev-item .a{color:var(--ok); font-weight:700;}
  .rev-item .y{color:var(--ng); font-weight:700;}
  .foot{text-align:center; color:rgba(255,255,255,.6); font-size:11px; margin:16px 0 4px; line-height:1.6;}
  #timerWrap{margin:0 0 12px;}
  .tbar{height:10px;background:#eef2f0;border-radius:99px;overflow:hidden;}
  .tbar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#1f9d55,#e8b53b);transition:width .1s linear;}
  .tnum{text-align:right;font-size:12px;color:var(--muted);margin-top:3px;font-weight:800;}
  .tbar.low i{background:var(--ng);}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app">
  <div class="wrap">
    <div class="brand">
      <div class="ball">⚾</div>
      <h1>配球クイズ</h1>
      <p>『配球の極意』『配球学・リード術』『野村ノート』で学ぶ</p>
    </div>

    <!-- ========== START ========== -->
    <div id="start" class="card">
      <h2 class="sec">プレイヤーと進捗</h2>
      <div class="chips" id="profChips"></div>
      <div class="goal" id="goalNote"></div>
      <div id="dash"></div>
      <button class="btn review hidden" id="reviewBtn"></button>
      <button class="btn lite hidden" id="starBtn" style="font-size:15px;padding:13px;margin-top:10px;"></button>
      <button class="btn hidden" id="voiceBtn" style="font-size:15px;padding:13px;margin-top:10px;">🎤 言語化に挑戦（声に出して説明）</button>

      <h2 class="sec" style="margin-top:18px;">本をえらぶ</h2>
      <div class="chips" id="bookChips"></div>
      <h2 class="sec" style="margin-top:18px;">分野（章）</h2>
      <div id="catChips"></div>
      <div class="row">
        <button class="ghost" id="selAll">すべて選択</button>
        <button class="ghost" id="selNone">すべて解除</button>
      </div>

      <button class="btn" id="startBtn">スタート ▶（選んだ章をぜんぶ出題）</button>
      <p id="poolInfo" style="text-align:center;color:var(--muted);font-size:12px;margin:12px 0 0;"></p>
    </div>

    <!-- ========== QUIZ ========== -->
    <div id="quiz" class="hidden">
      <div class="topbar">
        <button class="quit" id="quitBtn">✕ やめる</button>
        <div><span id="qpos">1</span> / <span id="qtotal">10</span></div>
        <div>正解 <b id="scoreNow">0</b></div>
      </div>
      <div class="pbar"><i id="pbarFill"></i></div>
      <div class="card">
        <div id="timerWrap" class="hidden"><div class="tbar"><i id="tFill"></i></div><div id="tNum" class="tnum"></div></div>
        <div class="qmeta" id="qmeta"></div>
        <div class="qtext" id="qtext"></div>
        <div class="answers" id="answers"></div>
        <div class="explain" id="explain"></div>
        <button class="btn hidden" id="nextBtn">次の問題 ▶</button>
      </div>
    </div>

    <!-- ========== RESULT ========== -->
    <div id="result" class="hidden">
      <div class="card result">
        <div class="score-ring">
          <svg width="160" height="160">
            <circle cx="80" cy="80" r="70" fill="none" stroke="#e3eae7" stroke-width="14"/>
            <circle id="ring" cx="80" cy="80" r="70" fill="none" stroke="#2e8b57" stroke-width="14" stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="439.8"/>
          </svg>
          <div class="num"><b id="rPct">0%</b><span id="rFrac">0 / 0</span></div>
        </div>
        <div class="rmsg" id="rMsg"></div>
        <div class="rsub" id="rSub"></div>
        <button class="btn" id="againBtn">もう一度（同じ範囲）</button>
        <button class="btn lite" id="homeBtn">範囲を選びなおす</button>

        <div class="review" id="review"></div>
      </div>
      <div class="foot">
        個人学習用 ⚾ 「実戦シナリオ」「応用」は各書の配球原則を状況に応用した問題です<br>出典：『配球の極意』(実業之日本社)／『配球学・リード術』(野村克也・克則／旬報社)<br>『野村ノート』(野村克也／小学館文庫)
      </div>
    </div>

  </div>
</div>

<script>
/* ============================================================
   問題バンク
   b = 書籍 ("極意" | "リード術")  / c = 章カテゴリ
   q = 問題 / o = 選択肢 / a = 正解index(シャッフル前) / e = 解説 / p = 出典ページ
   ============================================================ */
const BANK = [
/* ===== 実戦シナリオ（両書の配球原則を状況に応用） ===== */
// 実戦｜打者タイプで攻める
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"ドアスイング（バットが体から遠回りする）の打者。最も安全に攻めたいコース・球種は？",o:["インコース低め（ひざ元）の速球・シュート系","アウトコース低めのカーブ","高めの真っ直ぐ","ど真ん中のスライダー"],a:0,e:"ドアスイングは内角が詰まる。インコース高めはファウルになりやすく、ひざ元（低め）が安全ゾーン。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"アッパースイングの強打者を振り遅れさせたい。要求すべきは？",o:["高めのインコースへ速いストレート","低めの落ちる球","外角の緩いカーブ","真ん中のチェンジアップ"],a:0,e:"バットが下から出るため高めの速球に振り遅れる。ただし甘い高め・抜け球は長打に注意。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"基本に忠実なスクエアスタンスのアベレージヒッター。攻めの軸は？",o:["アウトコース低めのストレート・変化球＋緩急","内角高めの速球一辺倒","真ん中で力勝負","ボール球で歩かせる"],a:0,e:"基本に忠実な打者には外角低めを軸に、緩急を加えてタイミングを外す。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"長距離砲（パワーヒッター）。2ストライクまで追い込んだ後の勝負球は？",o:["思い切ってインコース低め・ひざ元","外角高めの甘いストレート","真ん中のスライダー","高めのボール球で釣る"],a:0,e:"長く持つ打者・パワーヒッターは追い込んでからインロー・ひざ元へ。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"右投手 対 左打者。食い込ませて詰まらせる「クロスファイア」のコースは？",o:["左打者のインコース（内角）へ食い込ませる","外角低めへ逃がす","高めのボール球","真ん中の変化球"],a:0,e:"左投手→右打者、右投手→左打者へズバッと食い込ませる内角が有効。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"C型（器用型・配球を読んでくる）打者。最も避けたいのは？",o:["単調で読まれやすい“三拍子”のリード","内角を1球見せること","緩急を多用すること","初球から変化球"],a:0,e:"器用な打者には単調なリードは禁物。三拍子のような型は読まれて危険信号。",p:"『リード術』上級編 打者4分類"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"D型（不器用型・真っ直ぐか変化球どちらか狙い）打者への基本方針は？",o:["狙っていない方の球種で打ち取る","必ず真っ直ぐで押す","必ず変化球で攻める","全球を内角に集める"],a:0,e:"狙いがどちらかに偏るため、逆の球種で打ち取る。",p:"『リード術』上級編 打者4分類"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"打者のタイプ（A〜D）は遅くともいつまでに見極めたい？",o:["2打席目まで","初球で","3打席目以降で","試合終盤で"],a:0,e:"右目で球、左目で打者の反応を見て、遅くとも2打席目までにタイプを掴む。",p:"『リード術』上級編 打者4分類"},

// 実戦｜カウントで組み立てる
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"カウント3ボール0ストライク（投手不利）。打者の狙いを踏まえた無難な配球は？",o:["変化球でストライクを取る","内角高めの速球","ど真ん中のストレート","ボール球で誘う"],a:0,e:"不利カウントで打者はほぼストレート狙い。置きにいける変化球でストライクを取るのが無難。",p:"『極意』第2章／『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"1ボール1ストライク（バッテリー有利）。打ち気の打者をどう誘う？",o:["低めのゴロゾーン（ボールになる落ちる球）で誘う","ど真ん中で勝負","高めの釣り球で歩かせる","必ずストライクを取りにいく"],a:0,e:"打者は追い込まれたくなく早めに手を出す→低めの誘い球でゴロを打たせる。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"2ストライクと追い込んだ。やってはいけないのは？",o:["1球を大きく外しすぎる／甘い球を置きにいく","高めの釣り球を見せる","内角を厳しく突く","落ちる球で空振りを狙う"],a:0,e:"球数に余裕があるので急がない。大きく外さず、高めや内角で次に生かす。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"初球。カウントを有利に運ぶ考え方として適切なのは？",o:["ストライクから入り、早めに追い込む","必ずボールから入る","初球は必ず変化球","初球は捨て球にする"],a:0,e:"早めに追い込み、安全ゾーンで勝負する形に持っていく。",p:"『極意』第2章"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"ストライクを“稼ぐ”ためのカウント球。無難なコースは？",o:["外角","内角ぎりぎり","高め","真ん中"],a:0,e:"カウント球は外角が無難。打者を“仕留める”勝負球と使い分ける。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"フルカウント（3-2）。最も避けたい結果は？",o:["四球","ファウル","内野ゴロ","空振り三振"],a:0,e:"四球だけは避ける。最低2球先まで考え、テンポよく。",p:"『リード術』上級編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"追い込む前のカウントで絶対に避けたいのは？",o:["甘い「危険ゾーン」へ置きにいく","際どいボール球","内角を見せる","緩急をつける"],a:0,e:"追い込む前に甘い危険ゾーンへ置きにいかない。安全ゾーンで勝負する。",p:"『極意』第2章"},

// 実戦｜走者・アウトの状況
{b:"実戦",c:"実戦｜走者・アウトの状況",q:"1アウト三塁・同点。犠牲フライを絶対に防ぎたい。狙う打球は？",o:["内野フライ・ゴロ・三振（外野へ飛ばさせない）","浅い外野フライ","ライナー","どんな打球でもよい"],a:0,e:"三塁走者・サヨナラ場面では犠飛厳禁。外野に運ばせない組み立てにする。",p:"『極意』第5章"},
{b:"実戦",c:"実戦｜走者・アウトの状況",q:"1アウト三塁。犠飛を防ぐために有効な球は？",o:["内角高めの速球／低めの落ちる変化球","外角高めの甘い球","真ん中のスライダー","高めのボール球"],a:0,e:"詰まらせて内野フライ・ゴロ・三振を狙う。ストライクからボールへ落ちる球も有効。",p:"『極意』第5章"},
{b:"実戦",c:"実戦｜走者・アウトの状況",q:"ランナー一・二塁、送りバントの場面。配球で特に阻止したいのは？",o:["二塁走者の三塁への進塁","打者の出塁","一塁走者の盗塁","投手のボーク"],a:0,e:"フィールディングと併せ、打たせどころをコントロールして三塁進塁を防ぐ。",p:"『極意』第5章"},

const BOOKS = ["実戦","極意","リード術","野村ノート","OX"];
const BOOK_LABEL = {"実戦":"実戦シナリオ","極意":"配球の極意","リード術":"配球学・リード術","野村ノート":"野村ノート","OX":"○×クイズ"};
const BOOK_AUTHOR = {"実戦":"各書の原則を応用","極意":"全国野球技術研究会","リード術":"野村克也・野村克則","野村ノート":"野村克也","OX":"正誤で総チェック"};
// ○×は「○×クイズ」という選択グループとして全問一覧に合流（出題時は⭕/❌の2択）
const OXITEMS = OXBANK.map(x=>({b:"OX",c:"○×クイズ",q:x.q,t:x.t,e:x.e,p:x.p,ox:true}));
const ALLBANK = BANK.concat(OXITEMS);
// 言語化は「全部の章🏆（定着80%）」を達成したプレイヤーにだけボタンが出現する
// カテゴリ一覧（出現順）
const CATS = [];
ALLBANK.forEach(x=>{ if(!CATS.some(c=>c.b===x.b&&c.c===x.c)) CATS.push({b:x.b,c:x.c}); });

const $ = id=>document.getElementById(id);

/* ---- プレイヤー（記録の分離）と習得記録 ---- */
const PROFILES=["莉映","父"];
const GOAL_PCT=80;
function hashQ(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))|0; } return (h>>>0).toString(36); }
let profile = localStorage.getItem("haikyu_profile")||"";
function mkey(){ return "haikyu_m_"+profile; }
function loadM(){ try{ return JSON.parse(localStorage.getItem(mkey()))||{}; }catch(e){ return {}; } }
function saveM(m){ try{ localStorage.setItem(mkey(),JSON.stringify(m)); }catch(e){} }
function recordAnswer(qid,ok,countMastery){
  if(!profile||!qid) return;
  if(countMastery===undefined) countMastery=true;
  const m=loadM(); const r=m[qid]||{c:0,w:0,ok:false,s:0};
  if(r.s===undefined) r.s=(r.ok?1:0);
  if(ok){ r.c++; r.ok=true; if(countMastery) r.s++; }
  else { r.w++; r.ok=false; r.s=0; }
  m[qid]=r; saveM(m);
}
function mcId(x){ return "mc:"+hashQ(x.q); }
function oxId(x){ return "ox:"+hashQ(x.q); }
function qidOf(x){ return x.ox ? oxId(x) : mcId(x); }
function mkItem(x){ return x.ox ? mkOxItem(x) : mkMcItem(x,false); }
// 記録の状態: seen=挑戦済み / ok=直近正解 / s=連続正解数（2以上=🟢定着）
function stOf(m,qid){
  const r=m[qid]; if(!r) return {seen:false,ok:false,s:0};
  const s=(r.s!==undefined)?r.s:(r.ok?1:0);
  return {seen:true,ok:r.ok,s};
}
function isMastered(m,qid){ return stOf(m,qid).s>=2; }
function isStar(m,qid){ const st=stOf(m,qid); return st.ok&&st.s===1; }
function voiceUnlocked(){ return profile && localStorage.getItem("haikyu_voiceok_"+profile)==="1"; }

function renderDash(){
  const pc=$("profChips"); pc.innerHTML="";
  PROFILES.forEach(p=>{
    const el=document.createElement("div");
    el.className="chip book"+(p===profile?" on":"");
    el.innerHTML="👤 "+p;
    el.onclick=()=>{ profile=p; localStorage.setItem("haikyu_profile",p); renderStart(); };
    pc.appendChild(el);
  });
  const goal=$("goalNote"), d=$("dash"), rb=$("reviewBtn");
  if(!profile){
    goal.textContent="👤 だれがプレイするか選んでね（記録は別々に保存されます）";
    d.innerHTML=""; rb.classList.add("hidden"); $("starBtn").classList.add("hidden"); $("voiceBtn").classList.add("hidden");
    return;
  }
  goal.textContent="🎯 目標：8/2(日)までに、全部の本の全部の章で🟢定着"+GOAL_PCT+"%（🏆）！ 定着＝2回連続正解（まぐれは通用しない）。下の本・章のチップに🟢と🏆が出るよ。全部の章をコンプすると…🎤言語化ボタンが出現！";
  const m=loadM();
  const rows=BOOKS.map(b=>{
    const qs=ALLBANK.filter(x=>x.b===b);
    return {nm:((b==="実戦"||b==="OX")?BOOK_LABEL[b]:"『"+BOOK_LABEL[b]+"』"), tot:qs.length,
      mast:qs.filter(x=>isMastered(m,qidOf(x))).length};
  });
  const allIds=ALLBANK.map(x=>qidOf(x));
  const nSeen=allIds.filter(id=>stOf(m,id).seen).length;
  const nStar=allIds.filter(id=>isStar(m,id)).length;
  const nMast=allIds.filter(id=>isMastered(m,id)).length;
  d.innerHTML='<div class="goal" style="margin:0 2px 8px;">ぜんたい：挑戦 '+nSeen+'/'+allIds.length+'　⭐正解 '+nStar+'　🟢定着 '+nMast+'</div>'
    + rows.map(r=>{
    const pct=r.tot?Math.round(r.mast/r.tot*100):0;
    const badge=pct>=GOAL_PCT?" 🏆":"";
    return '<div class="drow"><div class="nm">'+r.nm+badge+'</div><div class="dbarw"><i class="dbar" style="width:'+pct+'%"></i></div><div class="pc">'+r.mast+'/'+r.tot+'（'+pct+'%）</div></div>';
  }).join("");
  // 全部の章🏆（○×クイズ含む）→ 言語化ボタンを解放（一度解放されたら戻らない）
  const allChaptersCleared = CATS.every(c=>{
    const qs=ALLBANK.filter(x=>x.b===c.b&&x.c===c.c);
    const mast=qs.filter(x=>isMastered(m,qidOf(x))).length;
    return qs.length>0 && Math.round(mast/qs.length*100)>=GOAL_PCT;
  });
  if(allChaptersCleared){
    localStorage.setItem("haikyu_voiceok_"+profile,"1");
  }
  $("voiceBtn").classList.toggle("hidden", !voiceUnlocked());
  const nWrong=wrongCount(m);
  if(nWrong>0){ rb.textContent="🔁 まちがえた問題だけ復習する（"+nWrong+"問）"; rb.classList.remove("hidden"); }
  else rb.classList.add("hidden");
  const sb=$("starBtn");
  const nStarBtn=ALLBANK.filter(x=>isStar(m,qidOf(x))).length;
  if(nStarBtn>0){ sb.textContent="🎯 定着チャレンジ：⭐をもう一度正解して🟢に（"+nStarBtn+"問）"; sb.classList.remove("hidden"); }
  else sb.classList.add("hidden");
}
function wrongCount(m){
  return ALLBANK.filter(x=>{ const r=m[qidOf(x)]; return r&&!r.ok; }).length;
}

let selectedCats = new Set(); // デフォルトは未選択：本を選ぶ→章を選ぶ、の順
let session = null;
let qTimer = null;
const TSPEED = 12; // 2択スピードの制限秒

/* ---- 描画：開始画面 ---- */
function renderStart(){
  renderDash();
  const m = profile ? loadM() : null;
  // 書籍チップ（🟢定着と🏆を表示）
  const bc = $("bookChips"); bc.innerHTML="";
  BOOKS.forEach(b=>{
    const qs=ALLBANK.filter(x=>x.b===b);
    const total=qs.length;
    const mast=m ? qs.filter(x=>isMastered(m,qidOf(x))).length : 0;
    const pct=total?Math.round(mast/total*100):0;
    const el=document.createElement("div");
    el.className="chip book"+(isBookOn(b)?" on":"");
    const title=((b==="実戦"||b==="OX") ? BOOK_LABEL[b] : "『"+BOOK_LABEL[b]+"』")+((m&&pct>=GOAL_PCT)?" 🏆":"");
    const sub=m ? (BOOK_AUTHOR[b]+"・🟢"+mast+"/"+total) : (BOOK_AUTHOR[b]+"・"+total+"問");
    el.innerHTML=title+"<br><small>"+sub+"</small>";
    el.onclick=()=>{ toggleBook(b); renderStart(); };
    bc.appendChild(el);
  });
  // カテゴリチップ（本ごとにグループ表示・章単位の🟢と🏆を表示）
  const cc=$("catChips"); cc.innerHTML="";
  BOOKS.forEach(b=>{
    const cats=CATS.filter(c=>c.b===b);
    if(!cats.length) return;
    const g=document.createElement("div"); g.className="catgroup";
    const h=document.createElement("div"); h.className="cathead";
    h.textContent=(b==="実戦"||b==="OX") ? BOOK_LABEL[b] : "『"+BOOK_LABEL[b]+"』";
    g.appendChild(h);
    const row=document.createElement("div"); row.className="chips";
    cats.forEach(c=>{
      const key=c.b+"|"+c.c;
      const qs=ALLBANK.filter(x=>x.b===c.b&&x.c===c.c);
      const total=qs.length;
      const mast=m ? qs.filter(x=>isMastered(m,qidOf(x))).length : 0;
      const pct=total?Math.round(mast/total*100):0;
      const label=(c.c.includes("｜") ? c.c.slice(c.c.indexOf("｜")+1) : c.c)+((m&&pct>=GOAL_PCT)?" 🏆":"");
      const el=document.createElement("div");
      el.className="chip"+(selectedCats.has(key)?" on":"");
      el.innerHTML=label+"<small>"+(m?("🟢"+mast+"/"+total):total)+"</small>";
      el.onclick=()=>{ selectedCats.has(key)?selectedCats.delete(key):selectedCats.add(key); renderStart(); };
      row.appendChild(el);
    });
    g.appendChild(row);
    cc.appendChild(g);
  });
  updatePool();
}
function isBookOn(b){ return CATS.filter(c=>c.b===b).every(c=>selectedCats.has(c.b+"|"+c.c)); }
function toggleBook(b){
  const keys=CATS.filter(c=>c.b===b).map(c=>c.b+"|"+c.c);
  const allOn=keys.every(k=>selectedCats.has(k));
  keys.forEach(k=> allOn?selectedCats.delete(k):selectedCats.add(k));
}
function pool(){ return ALLBANK.filter(x=>selectedCats.has(x.b+"|"+x.c)); }
function updatePool(){
  if(!profile){ $("poolInfo").textContent="👤 まず上でプレイヤーを選んでね"; $("startBtn").style.opacity=.5; return; }
  const n=pool().length;
  if(n===0){ $("poolInfo").textContent="📚 本をタップして選ぼう（章だけ選んでもOK。🏆がまだ付いていない所がおすすめ）"; $("startBtn").style.opacity=.5; return; }
  $("poolInfo").textContent = "選択中 "+n+"問 → ぜんぶ出題（4択・○×は⭕❌で解答）";
  $("startBtn").style.opacity = 1;
}

$("selAll").onclick=()=>{ selectedCats=new Set(CATS.map(c=>c.b+"|"+c.c)); renderStart(); };
$("selNone").onclick=()=>{ selectedCats=new Set(); renderStart(); };

/* ---- シャッフル ---- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---- 出題アイテム生成 ---- */
function mkOxItem(x){
  const opts=[{t:"⭕ 正しい",correct:x.t===true},{t:"❌ 誤り",correct:x.t===false}];
  return {b:"OX",c:"○×クイズ",q:x.q,e:x.e,p:x.p,opts,ans:(x.t?0:1),speed:false,qid:oxId(x)};
}
function mkMcItem(x,speed){
  if(speed){
    const correct={t:x.o[x.a],correct:true};
    const others=x.o.filter((t,i)=>i!==x.a);
    const dis={t:others[Math.floor(Math.random()*others.length)],correct:false};
    const so=shuffle([correct,dis]);
    return {b:x.b,c:x.c,q:x.q,e:x.e,p:x.p,opts:so,ans:so.findIndex(o=>o.correct),speed:true,qid:mcId(x)};
  }
  const opts=x.o.map((t,i)=>({t,correct:i===x.a}));
  const so=shuffle(opts);
  return {b:x.b,c:x.c,q:x.q,e:x.e,p:x.p,opts:so,ans:so.findIndex(o=>o.correct),speed:false,qid:mcId(x)};
}

/* ---- スタート（選んだ章をぜんぶ出題） ---- */
$("startBtn").onclick=()=>{
  if(!profile) return;
  const p=pool(); if(p.length===0) return;
  const qs=shuffle(p).map(x=>mkItem(x));
  session={qs,idx:0,score:0,answers:[],mode:"mc"};
  show("quiz"); renderQ();
};

/* ---- 言語化（全章🏆で解放） ---- */
$("voiceBtn").onclick=()=>{
  if(!profile||!voiceUnlocked()) return;
  const qs=shuffle(VBANK).map(x=>({b:x.b,c:x.c,q:x.q,model:x.model,p:x.p,voice:true,speed:false,qid:"v:"+hashQ(x.q)}));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"voice"};
  show("quiz"); renderQ();
};

/* ---- 復習（まちがえた問題だけ） ---- */
$("reviewBtn").onclick=()=>{
  if(!profile) return;
  const m=loadM();
  const qs=shuffle(ALLBANK.filter(x=>{ const r=m[qidOf(x)]; return r&&!r.ok; }).map(x=>mkItem(x)));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"review"};
  show("quiz"); renderQ();
};

/* ---- 定着チャレンジ（⭐→🟢） ---- */
$("starBtn").onclick=()=>{
  if(!profile) return;
  const m=loadM();
  const qs=shuffle(ALLBANK.filter(x=>isStar(m,qidOf(x))).map(x=>mkItem(x)));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"consolidate"};
  show("quiz"); renderQ();
};

/* ---- タイマー（2択スピード） ---- */
function clearTimer(){ if(qTimer){ clearInterval(qTimer); qTimer=null; } }
function startTimer(){
  const wrap=$("timerWrap"), bar=wrap.querySelector(".tbar");
  wrap.classList.remove("hidden"); bar.classList.remove("low");
  const dur=TSPEED*1000, t0=performance.now();
  $("tFill").style.width="100%"; $("tNum").textContent=TSPEED.toFixed(1);
  qTimer=setInterval(()=>{
    const left=dur-(performance.now()-t0);
    if(left<=0){ $("tFill").style.width="0%"; $("tNum").textContent="0.0"; clearTimer(); choose(-1,null); return; }
    const r=left/dur; $("tFill").style.width=(r*100)+"%"; $("tNum").textContent=(left/1000).toFixed(1);
    if(r<0.34) bar.classList.add("low");
  },100);
}

function show(which){
  ["start","quiz","result"].forEach(id=>$(id).classList.toggle("hidden",id!==which));
  window.scrollTo(0,0);
}

/* ---- 問題描画 ---- */
function renderQ(){
  clearTimer();
  const s=session, q=s.qs[s.idx];
  $("qtotal").textContent=s.qs.length;
  $("qpos").textContent=s.idx+1;
  $("scoreNow").textContent=s.score;
  $("pbarFill").style.width=((s.idx)/s.qs.length*100)+"%";
  $("qmeta").innerHTML='<span class="tag">'+BOOK_LABEL[q.b]+'</span><span>'+q.c+'</span>';
  $("qtext").textContent=q.q;
  const A=$("answers"); A.innerHTML="";
  if(q.voice){
    const hint=document.createElement("div");
    hint.style.cssText="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:4px;";
    hint.textContent="🎤 まず自分の言葉で、声に出して説明しよう。言えたらタップ。";
    A.appendChild(hint);
    const b=document.createElement("button");
    b.className="ans";
    b.innerHTML='<span class="mk">💬</span>模範解答を見る';
    b.onclick=()=>revealModel(b);
    A.appendChild(b);
  } else {
    const letters=(q.b==="OX")?["○","×"]:["A","B","C","D","E"];
    q.opts.forEach((o,i)=>{
      const b=document.createElement("button");
      b.className="ans";
      b.innerHTML='<span class="mk">'+letters[i]+'</span>'+o.t;
      b.onclick=()=>choose(i,b);
      A.appendChild(b);
    });
  }
  const ex=$("explain"); ex.className="explain"; ex.innerHTML="";
  $("nextBtn").classList.add("hidden");
  if(q.speed){ startTimer(); } else { $("timerWrap").classList.add("hidden"); }
}

/* ---- 言語化：模範解答と自己採点 ---- */
function revealModel(btn){
  const s=session, q=s.qs[s.idx];
  btn.disabled=true; btn.classList.add("dim");
  const ex=$("explain");
  ex.innerHTML="💬 <b>模範解答</b><br>"+q.model
    +'<span class="src">出典の目安：'+BOOK_LABEL[q.b]+" "+q.p+"</span>"
    +'<div style="margin-top:12px;display:flex;gap:8px;">'
    +'<button class="btn" style="margin-top:0;padding:12px;font-size:15px;" id="sgOk">⭕ 言えた</button>'
    +'<button class="btn lite" style="margin-top:0;padding:12px;font-size:15px;" id="sgNg">❌ まだ</button>'
    +'</div>';
  ex.classList.add("show");
  $("sgOk").onclick=()=>gradeSelf(true);
  $("sgNg").onclick=()=>gradeSelf(false);
}
function gradeSelf(ok){
  const s=session, q=s.qs[s.idx];
  if(ok) s.score++;
  recordAnswer(q.qid, ok);
  s.answers.push({q:q.q, your: ok?"⭕ 言えた（自己採点）":"❌ まだ（自己採点）", correct:q.model, ok, e:"", p:q.p, book:q.b, c:q.c});
  $("scoreNow").textContent=s.score;
  $("sgOk").disabled=true; $("sgNg").disabled=true;
  const nb=$("nextBtn");
  nb.classList.remove("hidden");
  nb.textContent = (s.idx===s.qs.length-1)?"結果を見る ▶":"次の問題 ▶";
}

/* ---- 回答 ---- */
function choose(i,btn){
  clearTimer();
  $("timerWrap").classList.add("hidden");
  const s=session, q=s.qs[s.idx];
  const btns=[...$("answers").children];
  btns.forEach((b,j)=>{
    b.disabled=true;
    if(j===q.ans) b.classList.add("correct");
    if(i>=0 && j===i && i!==q.ans) b.classList.add("wrong");
    if(j!==q.ans && j!==i) b.classList.add("dim");
  });
  const ok=(i===q.ans);
  if(ok) s.score++;
  // 2択スピードの正解はマスター判定に入れない（腕試し用）。ミスは復習プールへ。
  if(!(q.speed && ok)) recordAnswer(q.qid, ok, !q.speed);
  const yourText = (i<0) ? "（時間切れ）" : q.opts[i].t;
  s.answers.push({q:q.q, your:yourText, correct:q.opts[q.ans].t, ok, e:q.e, p:q.p, book:q.b, c:q.c});
  $("scoreNow").textContent=s.score;
  const ex=$("explain");
  const srcLabel=(q.b==="実戦")?("応用問題｜根拠："+q.p)
    :(q.b==="OX")?("正誤クイズ｜根拠："+q.p)
    :("出典の目安："+BOOK_LABEL[q.b]+" "+q.p);
  const head = ok ? "⭕ <b>正解！</b>" : (i<0 ? "⏱ <b>時間切れ</b>　正解は「"+q.opts[q.ans].t+"」" : "❌ <b>不正解</b>　正解は「"+q.opts[q.ans].t+"」");
  ex.innerHTML=head+"<br>"+q.e+'<span class="src">'+srcLabel+"</span>";
  ex.classList.add("show");
  const nb=$("nextBtn");
  nb.classList.remove("hidden");
  nb.textContent = (s.idx===s.qs.length-1)?"結果を見る ▶":"次の問題 ▶";
}

$("nextBtn").onclick=()=>{
  const s=session;
  if(s.idx===s.qs.length-1){ finish(); }
  else { s.idx++; renderQ(); }
};
$("quitBtn").onclick=()=>{ if(confirm("クイズをやめて範囲選択にもどりますか？")){ clearTimer(); show("start"); } };

/* ---- 結果 ---- */
function finish(){
  clearTimer();
  $("timerWrap").classList.add("hidden");
  const s=session;
  const total=s.qs.length, sc=s.score, pct=Math.round(sc/total*100);
  $("pbarFill").style.width="100%";
  $("rPct").textContent=pct+"%";
  $("rFrac").textContent=sc+" / "+total;
  // リング
  const C=2*Math.PI*70;
  const ring=$("ring");
  ring.style.strokeDasharray=C;
  ring.style.strokeDashoffset=C;
  ring.style.stroke = pct>=80?"#1f9d55":pct>=50?"#e8b53b":"#d8473b";
  setTimeout(()=>{ ring.style.transition="stroke-dashoffset 1s ease"; ring.style.strokeDashoffset=C*(1-sc/total); },60);
  let msg,sub;
  if(pct===100){msg="満点！配球マスター ⚾👑";sub="文句なし。実戦でも根拠ある1球を。";}
  else if(pct>=80){msg="お見事！正捕手級 🧤";sub="ほぼ理解できています。間違えた所だけ復習を。";}
  else if(pct>=50){msg="いい調子！あと一歩 💪";sub="苦手な章を選んで反復しよう。";}
  else {msg="ここから伸びる！🌱";sub="解説を読みながらもう一周がおすすめ。";}
  if(profile){
    const nWrong=wrongCount(loadM());
    sub += nWrong>0 ? "　🔁 復習プール："+nWrong+"問" : "　🔁 復習プールはゼロ！🎉";
  }
  $("rMsg").textContent=msg; $("rSub").textContent=sub;
  // 復習（間違いのみ）
  const wrong=s.answers.filter(a=>!a.ok);
  const R=$("review");
  if(wrong.length){
    R.innerHTML="<h3>復習（まちがえた "+wrong.length+" 問）</h3>"+wrong.map(a=>
      '<div class="rev-item"><div class="q">Q. '+a.q+'</div>'
      +'<div>あなた：<span class="y">'+a.your+'</span></div>'
      +'<div>正解：<span class="a">'+a.correct+'</span></div>'
      +'<div style="margin-top:6px;color:#445;">'+a.e+'</div></div>').join("");
  } else {
    R.innerHTML='<h3>全問正解！復習はありません 🎉</h3>';
  }
  show("result");
}
$("againBtn").onclick=()=>{ $("startBtn").click(); };
$("homeBtn").onclick=()=>{ show("start"); };

/* 初期化 */
renderStart();
</script>
</body>
</html>
