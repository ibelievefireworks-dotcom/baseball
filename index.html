{b:"科学",c:"科学｜観察眼と弱点",q:"「本当の弱点」はどこにあると本書は言う？",o:["得意なコースのすぐ近く","得意コースとは正反対のゾーンだけにある","真ん中のベルト付近の高さに集中している","本当の弱点は打者によっては存在しない"],a:0,e:"打ちやすいゾーンの周辺。低目が得意な打者が思わずワンバウンドに手を出すのが良い例。ただしそこへの投球は一歩間違えば打たれるリスクの高い選択でもある。",p:"p.79"},
{b:"科学",c:"科学｜観察眼と弱点",q:"弱点攻めのリスクを避ける「次の選択肢」と、その判断基準は？",o:["リスクの少ない反対コース主体。投手の制球力で捕手が判断","どんな場面でも弱点だけを攻め続けるのが正解","リスクを承知で常に真ん中の力勝負が正解","打者の反応は見ずデータだけで決めるのが正解"],a:0,e:"得意コース周辺の弱点を突くか、リスクの少ないコースを主体にするか。投手にしっかりしたコントロールがあるかどうかで捕手がパターンを選ぶ。",p:"p.79"},
{b:"科学",c:"科学｜観察眼と弱点",q:"緩急の実験（130・120・110km/hをランダムに投球）でわかったことは？",o:["約20km/hの差で重心が崩れる。10km/h差ではほぼ効果なし","わずか5km/hの球速差でも十分すぎる効果がある","緩急には科学的に確かな効果は認められなかった","速い球を続けて見せるほど重心は崩れていく"],a:0,e:"速球と中速では重心の動きがほとんど変わらず、泳がせる効果は得られない。大きな球速差が必要。",p:"p.80-81"},
{b:"科学",c:"科学｜観察眼と弱点",q:"長距離打者・強打者への緩急について本書の注意点は？",o:["球速差のない中途半端な変化球には強く、一発で仕留められる","どんな変化球を投げても比較的簡単に抑えられる","緩急という武器がまったく通用しない特別な相手","力のある速球を続ければ簡単に詰まらせられる"],a:0,e:"好打者になるほど緩急をつけないと打ち取れない。中途半端なボールは投手に大きなダメージとなる一発を招く。",p:"p.80"},
{b:"科学",c:"科学｜観察眼と弱点",q:"バットコントロールに優れた中距離打者に有効なのは？",o:["カットボールなど手元で動く速い変化球で打ち損じを狙う","大きなカーブとの緩急だけで揺さぶり続ける","力のあるストレートの押し一辺倒で攻める","超スローボールで根気よく外し続ける"],a:0,e:"手前から変化するボールには対処されてしまうことがあるため、手元で動かす。",p:"p.80"},
{b:"科学",c:"科学｜観察眼と弱点",q:"重心移動が大きい打者（イチロー型）と、ノーステップ打者への攻め分けは？",o:["移動の大きい打者は小さな速度変化で、ノーステップは緩い球","タイプを問わずどの打者にも大きな緩急だけが有効","タイプを問わずどの打者も速球で押し込めばよい","重心移動の大きさと緩急への強さは関係がない"],a:0,e:"ノーステップ打者は元々体が前に突っ込みやすいから動かさない構えにしているという理由が隠れている。",p:"p.81"},
{b:"科学",c:"科学｜観察眼と弱点",q:"バッターがタイミングを取りにくい投手の動作は？",o:["体を沈める動作を長くしたり短くしたりする","毎回まったく同じリズムで正確に投げ込む","足をまったく上げないフォームで投げる","投げる前に必ず首を振ってから投げる癖"],a:0,e:"バッターは投手が沈み始めるところでタイミングを取るケースが多い。ここに変化をつけられるとかなり厄介。",p:"p.79"},
{b:"科学",c:"科学｜データ分析",q:"本書が紹介する投球チャート表の作り方は？",o:["5×5の25マスに球種ごとの色・図形で記録する","従来どおり3×3の9マスに丸印だけで記録する","文章の形で1球ずつ細かく書き残していく","試合の動画を撮ってあとで全部見返すだけ"],a:0,e:"捕手側からの視点で、どのコースにどのボールを投げたかを記録。ストライクは白抜き・ボールは塗りつぶし、何球目かの数字も書き込む。",p:"p.74-75"},
{b:"科学",c:"科学｜データ分析",q:"チャート表を集計・分析するとわかることは？",o:["投手の勝負球・決まるコース・初球の傾向などのクセ","投手の性格と普段の生活習慣の傾向まで","球審のその日の判定の傾向と癖だけ","天候や球場との相性のデータだけ"],a:0,e:"球種割合表や、初球・平行カウント・ボール先行・2ストライク時など状況別の傾向表に落とし込むと「この投手の勝負球はこれ」が見えてくる。",p:"p.74-76"},
{b:"科学",c:"科学｜データ分析",q:"バッターチャート表で結果を分類する3つの区分は？",o:["安打・凡打／ファール・空振り／見逃し","ホームランと三振の2つだけ","内野打球と外野打球の2つだけ","初球とそれ以降の2つだけ"],a:0,e:"それぞれのチャートと打球方向図を作ると、打球方向の傾向やファールの多く飛ぶ方向が見えてくる。カウント別成績はストレート／変化球別も出すとなお良い。",p:"p.76-77"},
{b:"科学",c:"科学｜データ分析",q:"「打率3割3分3厘」というデータを見るときに確認すべきことは？",o:["どういう内容で出た数字か","打率の数字そのものだけ見れば十分","選手の名前と背番号と学年の情報","身長と体重と遠投距離の身体データ"],a:0,e:"固め打ちか、相手投手の力は。データを過剰に見てやたらと警戒し過ぎるケースが案外多い。エース級相手の数字でなければ必要以上の警戒はいらない。",p:"p.77"},
{b:"科学",c:"科学｜データ分析",q:"データについて本書の戒めの言葉は？",o:["数字の見方を間違えると、データは薬にも毒にもなる","データは常に正しいものなので素直に従うべき","データは現場ではすべて無意味なただの飾り","データより現場の勘のほうが常に上回るもの"],a:0,e:"先入観に注意。「良いバッターだ」と思っていたら大したことがない、その逆もある。",p:"p.77"},
{b:"科学",c:"科学｜投手を知る・連携",q:"投手アンケートでわかった「投げやすいキャッチャー」の3つの条件は？",o:["ミットが落ちない・任せられる・投手の責任にしない","声が大きい・足が速い・打撃が良い","背が高い・肩が強い・経験が長い","サインが多い・構えが低い・返球が強い"],a:0,e:"逆に投げにくいのは、構えがはっきりしない・意図のわからない独りよがりなリード・責任転嫁する捕手。",p:"p.72-73"},
{b:"科学",c:"科学｜投手を知る・連携",q:"監督に配球を問い詰められたとき、投手の信頼を得る捕手の答えは？",o:["「サインを出した自分の責任です」と投手をかばう","「投げた投手の責任です」と説明する","黙って何も言わずにやり過ごす","「監督の采配の問題です」とかわす"],a:0,e:"本当は投手に原因があっても、盾になってくれた捕手のために投手は「頑張らなきゃ」と意気に感じる。責任転嫁は捕手失格。",p:"p.72-73"},
{b:"科学",c:"科学｜投手を知る・連携",q:"高校野球のエース級投手の「構えたところへの命中率」は？",o:["普段は60〜70%、ピンチになると30〜50%に低下する","レベルを問わず常に90%以上で安定している","プロを含めて常に10%程度しか決まらない","ピンチの集中力でかえって上がっていく"],a:0,e:"意外にもプロよりも高校エースの方が命中率は高い。ただしピンチで劇的に落ちる（多くはほぼ30%）。この傾向を捕手が把握しておく。",p:"p.82-83"},
{b:"科学",c:"科学｜投手を知る・連携",q:"試合を自分たちのペースで運ぶための投手指標として本書が挙げる数字は？",o:["初球ストライク率60%以上、振らせる確率30%以上","三振を毎試合10個以上奪えていること","球速が常に140km/hを超えていること","牽制でアウトを毎試合1つ取れること"],a:0,e:"ボールを振らせる確率30%以上だとさらに有利に展開できる。岩隈久志はこの数字が抜群に高かった。",p:"p.83"},
{b:"科学",c:"科学｜投手を知る・連携",q:"完投の基準となる球数の目安は？",o:["約119球","約60球あれば9回まで投げ切れる","約200球までは問題なく投げられる","約80球が完投できるかの目安になる"],a:0,e:"1イニング平均13.2球×9回。分析結果より。1回の投球数が13.2球より多いと「球数が多い」、少ないと「省エネ投球」という目安として覚えておく。",p:"p.83"},
{b:"科学",c:"科学｜投手を知る・連携",q:"試合前のブルペンの調子について注意すべきことは？",o:["ブルペンがダメでもマウンドで見違える投手がいる","ブルペンの調子がその日のすべてを決める","ブルペンさえ良ければ必ず試合も勝てる","ブルペンの様子は捕手が見る必要はない"],a:0,e:"調子がそのまま出る投手と全く違う投手がいる。それも含めて捕手は自分の投手を知っておく。",p:"p.83"},
{b:"科学",c:"科学｜投手を知る・連携",q:"投球中の投手の「要注意サイン」として本書が挙げるのは？",o:["抜けた球が増える・マウンドでいろいろ触り出す","帽子を目深にかぶり直して集中し始める","声が大きくなって気合が前面に出てくる","投球間隔がテンポよくどんどん速くなる"],a:0,e:"何気ないしぐさに調子の良し悪しが出る。交代のタイミングか、乗り切れるかを判断して監督に進言するのも捕手の大事な務め。",p:"p.83"},
{b:"科学",c:"科学｜投手を知る・連携",q:"力量では明らかに投手が上なのに、心理的に押されている場面では？",o:["攻めれば打たれる確率が高い。心理を掴んだリードが必要","力量通りに攻めれば必ず抑えられるはず","心理は結果に影響しないので無視してよい","迷わず敬遠して次の打者と仕切り直すべき"],a:0,e:"投手の心理は状況やカウントで刻々と変わる。「このバッターは攻めるべきか、逃げるべきか」を試合の流れの中で考える。",p:"p.83"},
{b:"科学",c:"科学｜投手を知る・連携",q:"ランナー2塁で打者が右方向を狙っているとき、捕手がやるべきことは？",o:["左方向に打たせる配球と、臨機応変な守備位置の指示","右方向へ打たせて狙い通り併殺を取る","配球は変えずに外野の位置だけ深くする","先に歩かせて満塁策に切り替えておく"],a:0,e:"「先の塁に進ませない」意識を野手と共有するのが前提。守備位置の指示も捕手の役目。",p:"p.84"},
{b:"科学",c:"科学｜投手を知る・連携",q:"回の先頭打者を打ち取ることが重要な理由は？",o:["先頭を出すとアウトが増えても進塁され、得点確率が上がる","回の先頭には強打者が置かれることが多いから","先頭打者を抑えると個人の記録になるから","先頭さえ抑えれば後は必ず楽になるから"],a:0,e:"無死一塁に留めれば得点率は半分以下に下がるというデータもある。まず回の初めに気をつける。",p:"p.84-85"},
{b:"科学",c:"科学｜投手を知る・連携",q:"2アウトを取った後の3人目のバッターへの心構えは？",o:["先頭打者を打ち取るのと同じ気持ちで臨む","2アウト後は気楽に投げてよい","多少打たれても問題ない場面","歩かせて次の回に備えてよい"],a:0,e:"攻撃側は「0点でもいいからランナーだけは出して次につなげたい」と考えて攻めてくる。3者凡退で仕留めると攻撃にリズムが生まれる。",p:"p.85"},
{b:"科学",c:"科学｜投手を知る・連携",q:"味方がミスで走者を出したとき、捕手がやるべきことは？",o:["責めずに切り替えの声かけ。雰囲気が悪ければタイムで一呼吸","その場ですぐにミスを指摘して直させておく","あえて気づかないふりをしてそのまま流し続ける","間を置かずにベンチへ交代を要求しにいく"],a:0,e:"守備のテンポが悪いと感じたら一呼吸置くことも大事。",p:"p.85"},
{b:"科学",c:"科学｜投手を知る・連携",q:"1試合にピンチ（走者得点圏）は平均何回訪れる？",o:["最低3回、平均5回","多くても1回だけ","10回を超えるのが普通","0回の試合が半分ある"],a:0,e:"だからランナーが出ている想定のゲームノックを練習で繰り返しておく。ピンチをしのいで良い流れを攻撃につなげる。",p:"p.85"},
{b:"科学",c:"科学｜投手を知る・連携",q:"「投手が崩れる3つの局面」とは？",o:["グラウンド整備直後・3連打された時・ニューボールの時","初回・5回・9回という決まった回に訪れる","雨の日・風の日・暑い日という悪条件の日","満塁・無死二塁・一死三塁の場面と決まっている"],a:0,e:"捕手ならぜひ覚えておきたい3局面。あらかじめ先を見て準備しておく。",p:"p.86"},
{b:"科学",c:"科学｜投手を知る・連携",q:"グラウンド整備直後の6回が投手にとって難しい理由は？",o:["打順3回り目＋70球超の疲れで狙い球を絞られるから","夕方の照明で球の見え方が変わるから","整備でマウンドの土が柔らかくなるから","終盤に向けて観客の応援が大きくなるから"],a:0,e:"このときバッテリーは新たな配球パターンを準備しなければならない。",p:"p.86"},
{b:"科学",c:"科学｜投手を知る・連携",q:"3連打を浴びたときにバッテリーが考えるべきことは？",o:["クセ・配球・パターンが読まれたと考え、ガラリと変える","打球運の偶然が重なっただけなので変えない","とにかく球速を上げることだけを考える","内外野の守備位置だけ変えて様子を見る"],a:0,e:"同じ相手と何度も対戦するリーグ戦では特に、連打には必ず理由があると理解すべき。",p:"p.86"},
{b:"科学",c:"科学｜投手を知る・連携",q:"ニューボールを渡された直後の投球の傾向は？",o:["手に馴染まず変化球が曲がりにくく、ストレート系が増える","新品のボールの方が変化球はよく曲がるようになる","表面が滑ってボール球が必ず続いてしまう","ボールが替わっても投球にはまったく影響がない"],a:0,e:"投手はニューボールが嫌な時がある。この傾向は相手も読める。",p:"p.86"},
{b:"科学",c:"科学｜投手を知る・連携",q:"相手に察知される投手のクセの例と、捕手の務めは？",o:["投球練習の苦手球・首振り後の傾向などを捕手が先に見抜く","クセは相手チームにいくら見られても影響がない","クセは本人にしか直せないので黙って放っておく","クセの発見と分析はスコアラーの仕事で捕手は不要"],a:0,e:"クレメンスは「1回・4回・7回・9回で投球パターンをしっかり変えるのが大事」と語っていた。",p:"p.86"},
{b:"科学",c:"科学｜実戦Q&A",q:"「投げやすいキャッチャー」の第一条件としてQ&Aで挙げられたのは？",o:["構えがしっかりして「投げてほしいところ」がはっきり見える","ミットの音を大きく鳴らして返球が強くて速いこと","グラウンドの誰よりも声が大きくベンチまで通ること","体が大きくて的としてどっしり構えて頼もしいこと"],a:0,e:"的を目がけて投げる投手にとって、体やミットがフラフラしていては良いボールを投げられない。捕球する前にミットが大きく落ちる捕手も投げにくい。",p:"p.116"},
{b:"科学",c:"科学｜実戦Q&A",q:"構えるタイミングについての注意は？",o:["早く構えすぎると打者に見える。投げるタイミングで構える","少しでも早く構えてあげるほど投手に親切で良い","投球モーションが始まった後に構えても間に合う","裏をかくために構えの位置を毎回細かく変える"],a:0,e:"テンポ良くボールを返すことも投げやすさにつながる。逆に打者の間合いで待たれて投手が投げにくそうな時は、捕手がわざと間隔を空ける場合もある。",p:"p.116"},
{b:"科学",c:"科学｜実戦Q&A",q:"「0-2から1球遊ぶ」ことについて著者の考えは？",o:["基本的に遊ぶ必要はない。どんどん打ち取れる球を","昔からのセオリー通り必ず1球大きく外す","低めに2球外して反応を見てから勝負に入る","高めの釣り球を見せてから決め球に入る"],a:0,e:"最近の打者は三振したくないから当てに来て際どいコースは見逃す。カウントが悪くなれば甘いコースで勝負するしかなくなる。それなら0-2からどんどん攻める。",p:"p.117"},
{b:"科学",c:"科学｜実戦Q&A",q:"コントロールに難がある投手をリードするコツは？",o:["どの分割なら投げ分けられるか見極める","制球が悪い日はリードを諦めて投手に任せる","全球ど真ん中に構えて入ることを祈る","変化球を禁止してストレートだけにする"],a:0,e:"外内か上下か。その程度の投げ分けでも、かなりの確率で打ち取れるリードの方法がある。捕手はそれを頭に入れておく。",p:"p.118"},
{b:"科学",c:"科学｜実戦Q&A",q:"リーグ戦特有のリードの考え方は？",o:["同じ攻めは通用しない。データよりその時のしぐさ・状況優先","開幕から最終戦までひとつの攻めを貫くのが正解","積み上げてきた過去のデータを最優先で信じ切る","相手打者は見ずに味方投手の調子だけを見ておく"],a:0,e:"対応力のある打者は狙い球を変えてくる。詰まったヒットで調子を上げるラッキーボーイ型の打者にも注意。",p:"p.119"},
{b:"科学",c:"科学｜実戦Q&A",q:"リーグ戦でキーマンとなる強打者への対策は？",o:["「ランナーなし」「2アウト」で打席に立たせる工夫","逃げずに毎打席必ず真っ向勝負を挑みにいく","毎打席ためらうことなく申告敬遠で歩かせる","初球の入りにだけ気をつければそれで十分"],a:0,e:"ランナーを置いて対峙する状況に追い込まれたら、無理に勝負しない選択も作戦のうち。",p:"p.119"},
{b:"科学",c:"科学｜実戦Q&A",q:"トーナメント戦（初対戦相手）特有の戦い方は？",o:["データがないので自分たちの良いところをどんどん出す","限られた時間で相手の分析に全力を注ぐ","前半は様子見に徹して終盤に勝負をかける","決め球を隠しておいて次の試合に備える"],a:0,e:"「この打者は力が上」と判断したら、エサをまくようにボール球を投げる戦略も必要。自分たちの良さを出しながら相手の出方も見る。",p:"p.120"},
{b:"科学",c:"科学｜実戦Q&A",q:"単調な配球にならないために、対バッターで著者がポイントに挙げるカウントは？",o:["2-1と2-2","0-0と0-1","3-0と3-1","1-0と1-1"],a:0,e:"バッター有利の2-1でカウントを取れるボールがどれだけあるかが、単調にならない大事な要素。2-2では得意球だけでなくストレートで押す選択や、同じコースへの変化球も有効な武器になる。",p:"p.121"},
{b:"科学",c:"科学｜実戦Q&A",q:"球種が少なくても投球の幅を広げる方法は？",o:["ベースとバッターボックス前ラインの間に投げる練習をする","オフの間に新しい球種を短期間で覚えてしまう","全球ストライクを取るための制球練習だけをする","牽制とクイックを磨いて走者対策の面で補う"],a:0,e:"ここに投げられれば空振りを誘うボールにもなり、その後同じコースに変化球を投げれば有効な武器になる。",p:"p.121"},
{b:"科学",c:"科学｜実戦Q&A",q:"投手交代直後のリードで著者が勧めるのは？",o:["カウントや配球を考えすぎず、良いボールをどんどん投げさせる","前の投手とまったく同じ配球を続けて安心させる","様子見のボール球からじっくり時間をかけて入る","初球から裏をかいた変化球で大胆に意表を突く"],a:0,e:"代わった投手がまず持ち味を出せるようにする。相手打者の力量を見て「投手が有利になるボールがあるか」を確認する。",p:"p.122"},
{b:"科学",c:"科学｜実戦Q&A",q:"「試合の山場」への現実的な備えは？",o:["一番当たっている打者の前にランナーを出さないこと","山場が来る回をあらかじめ完全に予言すること","山場と感じたらすべて敬遠でかわすこと","山場は考えず流れに任せるしかないこと"],a:0,e:"スコアの予感は当たっても、山場がいつ来るかの予想は難しい（2〜3回先までは予測可能）。プロでは相手に9番から次の回を始めさせる攻防もよく見られる。",p:"p.123"},
{b:"科学",c:"科学｜実戦Q&A",q:"「どの程度のケースを想定しておくか」への答えは？",o:["最悪の事態を常に想定し、逆算して配球を組み立てる","良い結果だけを強くイメージして臨む","先のことは想定せず目の前の1球に集中する","想定はベンチに任せて指示に従うだけ"],a:0,e:"実例：2点差満塁で捕手が長打の確率が高いインコースを要求→「それは危険」。アウトコースなら最悪でも同点で済む。最悪を考えれば大きな間違いは犯さない。",p:"p.124"},
{b:"科学",c:"科学｜実戦Q&A",q:"バッテリーの「阿吽の呼吸」を作るために必要なことは？",o:["普段からの意思疎通。ブルペンで本気で話し合い行動も共にする","サインの種類を増やして誤解をなくしておくこと","試合中のマウンドでの会話だけでも十分に作れる","監督とコーチが間に入って細かく調整するもの"],a:0,e:"例えば「ボール球を」というサインでも、目一杯投げてほしいのかコントロール重視かで力の入れ具合が変わる。その意図を読み取れる関係が阿吽の呼吸を生む。",p:"p.125"},

/* ===== 落合博満 バッティングの理屈（ダイヤモンド社）配球逆算パス ===== */
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"一流打者でも10打席で6〜7回打ち取られる最大の要因として落合が挙げるのは？",o:["目の錯覚（マウンドの高さによるヘッドアップ）","下半身の筋力とスイング速度の不足","重すぎるバットと道具の選び方","その日の運と巡り合わせの悪さ"],a:0,e:"変化球は実際には緩やかな放物線。マウンドの高さ等が錯覚を生み「鋭い変化球」になる。高い投手ほど打者は顔を上げて（ヘッドアップして）ボールを迎えることになる。",p:"p.36-41"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合が投球を見るために使った方法は？",o:["投手のモーションから軌道までを「一枚の景色」として記憶","リリースされたボールだけを最後まで目で追い続ける","映像資料で投げ方のクセを徹底的に暗記する","相手投手の目線と表情の変化を読み取る"],a:0,e:"振りかぶるとグラブがスコアボードの点数を隠す、など球場ごとの景色をコマ送り写真のように記憶。ストレートとカーブで背後の広告の見え方が違う投手はそれを利用した。",p:"p.37-39"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合が相手投手のクセの映像研究を一切使わなかった理由のひとつは？",o:["クセを信じて踏み込むと内角高めが来たとき危険だから","ビデオを見る時間がもったいなかったから","クセなど存在しないと考えていたから","球団のルールで禁止されていたから"],a:0,e:"投手はクセがあれば直そうとするし、ベテランはクセを逆手にとって勝負してくる。配球側から見れば「バレたクセは逆に武器になる」ということでもある。",p:"p.38"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"カーブのとき左肩がグッと上がる稲葉光雄について、本人が語ったことは？",o:["「オチにバレても、残りの打者は抑えられるからいい」","指摘を受けてすぐにその動きを直したと答えた","ショックを受けて引退まで考えたと明かした","カーブを封印して別の球種に切り替えた"],a:0,e:"クセではなく「動きの違い」は指摘されても簡単に直せない。見抜ける打者が1人いても勝負は成り立つという割り切りも学べる。",p:"p.39"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合が打席の足場に徹底的にこだわった（ラインを踏み消し、時間をかけて土をならした）理由は？",o:["数センチの傾きでも錯覚が増し、打率1分・本塁打5〜6本違うから","試合前の縁起担ぎとして長年続けていた習慣だから","マウンドの投手への無言の威嚇になっていたから","時間をたっぷり使って相手を焦らせたいから"],a:0,e:"前の打者が掘った穴に足を入れて打つなどもってのほか。体が捕手寄りに傾けば錯覚の度合いは大きくなるばかり。足場を熱心にならす打者は細心のタイプと読める。",p:"p.39-40"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合の佐々木主浩（大魔神）攻略法は？",o:["フォークは頭から捨て、ストレートに絞って見極める","決め球のフォークだけに山を張って待ち続ける","初球からすべての球をフルスイングしていく","バントの構えを見せて揺さぶりをかけ続ける"],a:0,e:"球種が2つしかないから的を絞りやすい。フォークで三振したら「すみません」と帰ればいい。結果は36打数16安打・打率.444。配球側の教訓：球種が少ない投手は「捨てる」戦略で丸裸にされる。",p:"p.41-42"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合の言う本当の「コンパクトなスイング」とは？",o:["トップは深く、バットは一直線に、フォロースルーは大きく","体のできるだけ近くで小さく鋭く振り抜くこと","バットを短く持って確実に当てにいくこと","とにかく速く強く最後まで振り抜くこと"],a:0,e:"深いトップで振り出せば投球を長く見られるので、ストレートと思って始動してもフォークと分かった瞬間に止められる。体の近くで小さく振る誤解されたコンパクトでは止まらない。",p:"p.42-44"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"速球投手への対応について落合の結論は？",o:["「速いから急ぐ」のではなく、始動を早くする","スイングそのものをもっと速くする","バットを軽いものに替えて対応する","力を抜いて当てるだけに徹する"],a:0,e:"急ごうとするほどスイングの大切な部分が省略される。始動の遅い中村紀洋は速球に差し込まれアウトステップし、外のスライダーに空振りしていた。始動を早めた2001年以降は打率も上昇。",p:"p.43"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合が打席で照準（目付け）を合わせていたコースは？",o:["インハイのストレート","アウトローの変化球","真ん中のストレート","外角高めの速球"],a:0,e:"スイングの中で最も短時間で対処しなければならないのがインハイ。イン→アウト、高め→低めの順に時間の余裕が生まれる。最も時間のない所に意識を置くのが理屈。",p:"p.46-47"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"アウトコースに照準を合わせている打者に起きることは？",o:["インハイの速球に間に合わず、ドアスイングのクセがつく","内角への対応力が練習しなくても上がっていく","三振がぐっと減って四球がどんどん増えていく","とくに目立った欠点は生まれることはない"],a:0,e:"配球側から見れば、外に目付けしている打者はインハイの速球で崩せるということ。逆にイン優先の打者は外のボール球に手を広げすぎる失敗に注意と落合は言う。",p:"p.48"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"アウトローが「最も打たれにくいコース」である本当の理由は？",o:["打者のパワーが最も必要で、ボールの力を利用できないから","単純にバットが物理的に届きにくいからというだけ","審判がいちばん広くストライクを取ってくれるから","打者の目からいちばん見えにくいからというだけ"],a:0,e:"インハイのストレートは反発力を利用でき打者のパワーは不要（だから飛ぶ）。アウトローのスライダーはその正反対で、スタンドまで運ぶのは至難の業。",p:"p.48-49"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"「左腕はインコースをほとんど突いてこないから、左投手のときだけ照準を外に変える」という考えへの落合の答えは？",o:["ノー。不確実な要素で大前提を変えてはいけない","イエス。相手によって毎回変えるべき","投手のタイプを見てから決めるべきこと","捕手の構え方を見てから決めるべきこと"],a:0,e:"身に付けた技術と考え方はどんな相手でも変えない。インに照準を置いておけばどんなタイプが来ても対処できる。",p:"p.50-51"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"プロ野球の通算記録上位の打者に共通することは？",o:["ボール球を打たない","どんな球にも食らいつく積極性","初球は必ず打ちにいく思い切り","四球を選ばず打って決める強さ"],a:0,e:"好球必打。打ってもヒットにならないボールには手を出さず、打てるボールを確実に打つ。",p:"p.51"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"ストライクゾーンの運用が変わった年に安定した成績を残したのはどんな打者？",o:["ゾーンが変わる感覚を持たず、自分のゾーンを確立していた打者","球審ごとの判定に合わせて毎試合ゾーンを変えた打者","広くなった高めをすべて積極的に振りにいった打者","納得がいくまで判定に抗議し続けた気の強い打者"],a:0,e:"「高めを取られた」と神経質になった打者ほど深みにはまった。投手も練習していないコースに急にコントロールできないから、現実には野球は変わらない。",p:"p.53"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合が右のサイドハンド・アンダーハンド投手に強かった理由は？",o:["「背中に来るように見える球が実はストライク」と知り待った","力とパワーで強引にコースごと押し返す打撃をしていた","変則投手というものへの苦手意識がもともとなかった","目をつぶるつもりで思い切りよく振り抜いていた"],a:0,e:"ゾーンに向かってくるように見える球は外いっぱいか外れていく。背中に来る球に腰を引けば投手の思うツボ。サイド・アンダーの球はすっぽ抜けても頭には当たらないから思い切れた。変則投手の錯覚は配球側の武器にもなる。",p:"p.53"},
{b:"落合",c:"落合｜目の錯覚と打者の見方",q:"落合が打者の基本として頭に叩き込んでおけと言うことは？",o:["打てるボールは、すべてホームベースの上を通過していく","打てるボールは必ず体の近くにやって来るもの","ボール球でも技術さえあれば必ず打てるもの","ストライクならばどんな球でも打てるはず"],a:0,e:"ストライクに見える球になんでも食らいつく考え方では打率も本塁打も増えない。佐々木のフォークのように同じボールでいつまでも打ち取られる。",p:"p.54"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"落合が感じていたバッターボックスの立ち位置の傾向は？",o:["ベース寄り=内角好き、離れる=外角好き、どっちつかず=両方不得意","ベース寄り=外角好き、離れる=内角好きという逆の傾向","立ち位置とコースの好き嫌いにはほぼ関係がない","プロの打者はみなほぼ同じ位置に立っている"],a:0,e:"ベース寄りは松中信彦・稲葉篤紀・王貞治・辻発彦ら、離れて立つ代表は清原和博。『キャッチャーの科学』の立ち位置分析と同じ結論を打者側の落合も述べている。",p:"p.84-85"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"内角好きだった落合が、球界で「内角に弱い」と誤解され続けた理由は？",o:["内角のボール球の長打を、スコアラーが「甘いコース」と記録したから","わざと内角を空振りして相手の目を騙していたから","実際のところ内角はキャリアを通じて苦手だったから","他球団が落合をほとんど研究していなかったから"],a:0,e:"「内角のボール球がライトスタンドに入るわけがない」という思い込みが誤データを生み、「もっと内角を突け」という分析になって好きなコースが来続けた。配球記録は印象でなく実際のコースを書くべきという教訓。",p:"p.84-85"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"内角得意の辻発彦を追い込んでから「右打ち封じ」で内角攻めした結果と、落合の考える正解は？",o:["あっさり右方向へ運ばれた。正解は徹底したアウトコース攻め","狙いどおり内角攻めが成功して右打ちを完全に封じた","歩かせて次の打者と勝負するのが唯一の正解だった","高めの釣り球で面白いように空振りが取れていた"],a:0,e:"内角が得意な打者は厳しい内角への対応にも自信があり反応もいい。実際、辻は若いカウントで外のスライダーを引っかけてショートゴロが多かった。得意コースで封じようとするのは逆効果。",p:"p.85-86"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"前後の立ち位置について落合の持論は？",o:["できるだけ捕手寄りに立ち、時間を有効に使う","できるだけ投手寄りに立って前で叩く","真ん中に立って両方に備えておく","相手投手によって毎打席変えていく"],a:0,e:"ソフトボールが投球距離を延ばした改革を挙げ、野球で投手板を1m下げたら平均打率は2分は上がると言う。距離＝時間の価値。前寄りに立つ打者は変化球を落ちる前に打ちたい意図（科学と同じ読み）。",p:"p.86-87"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"立ち位置を変えた打者に起こりがちなことは？",o:["ボールへのジャッジメントが狂う","数打席もすればすぐ慣れて何も起きない","飛距離がやや落ちるだけで問題はない","スイングがかえって自然と速くなる"],a:0,e:"内角ボール球に手が出る等。落合自身、年齢を考えてベースから少し離れたら経験で培った見極めが狂った。配球側から見れば、立ち位置を変えた直後の打者は判断が乱れている可能性が高い。",p:"p.87"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"オープンスタンスの最大のメリットは？",o:["両目で投球を捕捉でき、目の錯覚を解消できる","下半身の力が伝わって飛距離が伸びる","バントや小技が格段にやりやすくなる","内角の速い球にめっぽう強くなる"],a:0,e:"はしりの八重樫幸雄は捕手。守りで常に両目で投球を見ていた確実性をバッティングに生かした発想と落合は分析。捕手寄りの腕のヒジの抜けも良く、意外と広角に打てる。",p:"p.116-117"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"落合が投手なら、オープンスタンスの打者に立ち遅れを感じ取ったときの勝負球は？",o:["外角のスライダーなど","内角のストレートで詰まらせにいく","真ん中の緩いカーブで大きく泳がせる","高めの釣り球で空振りを狙いにいく"],a:0,e:"高い確率で打ち取れる。開いた肩と足を閉じる動作に時間がかかるため、クイックなどで時間を奪われると立ち遅れる。よく見えるはずの外角ほど、慌てた手打ちのフォームになる。",p:"p.119-120"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"軸足のつま先の向きと打球方向の関係（山内一弘直伝）は？",o:["左中間から右方向","レフトへ思い切って引っ張り込む方向","センター返しだけに徹する方向","流し打ちは捨ててよい方向"],a:0,e:"引っ張り込みは危険。右打者がライトへ進塁打を打ちたいときは軸足のつま先をやや捕手寄りに向ければいい。配球側から見れば、軸足の置き方で打者の狙い（進塁打・引っ張り）が読める。",p:"p.121-122"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"クローズドスタンスの打者の特徴は？",o:["捕手寄り=右方向、投手寄り=左方向、垂直=センター中心","捕手寄り=左方向、投手寄り=右方向という逆の関係","つま先の向きと打球方向にはほとんど関係がない","つま先は常に投手へ真っ直ぐ向けるのが正解"],a:0,e:"本塁打王バーフィールドは「インでもアウトでも右中間へ。インコースの変化球だけは左中間へ」と語った。イン厳しく外に広いメジャーのゾーンに適した選択。",p:"p.126-127"},
{b:"落合",c:"落合｜立ち位置とスタンスの読み",q:"オープンスタンスの打者に必要な考え方として落合が挙げるのは？",o:["初めから体が閉じ、ターゲットは右方向。レフトへの視界はほぼない","引っ張り専門になって右方向へはまったく打てない","内角がいちばん得意になる欠点のない万能の構え","どのコースへの視界も広くなる理想的な構え"],a:0,e:"投手寄りの肩を動かすフォームなのでスイングに角度的な誤差が生じやすい。引っ張りたいからオープンにするのは危険で、ホームランを量産したい打者には勧めないと落合は言う。",p:"p.118-124"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"「カーブの打ち方」について落合の結論は？",o:["絶対に引っ張り込む打ち方をしない","常に思い切って引っ張り込んでいく","外角に来たボールはすべて捨てる","バントと小技を多めに織り交ぜる"],a:0,e:"狙いは左中間から右。150キロも100キロ以下の緩い球も、自分のスイングとミートポイントは変えない。投球が自分のミートポイントに入ってくるまで我慢する。",p:"p.204-206"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"トップが浅く軸足に体重が乗らない打者に、遅いボールが来るとどうなる？",o:["存在しない。同じスイング・同じポイントで我慢して呼び込む","カーブが来たとわかったら専用の打ち方に切り替える","腰を早めに回して体の前でじっくり待ち構える","バットを短く持ち替えて軽く合わせにいく"],a:0,e:"「詰まりたくない」という意識がさらに突っ込みを生む悪循環。配球側から見れば、突っ込み気味の打者には緩いボールが効く。",p:"p.206"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"金属バットの普及が生んだ打者の変化として落合が指摘するのは？",o:["待ちきれず体が突っ込み、詰まった当たりしか出ない","かえってタイミングが合ってよく飛ぶ","落ち着いてじっくり見逃せるようになる","打撃にはとくに影響が出ることはない"],a:0,e:"腕力だけで飛ばせるため万全な準備をする意識が省略され始めた。「正しいスイングを習得すればフォークなど恐れるに足らない」。",p:"p.210"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"ボール球を打たないための「ステップ1」は？",o:["トップが浅いスイングが増え、縦の変化球に弱い打者が増えた","スイングの形が以前よりずっと正確になっていった","縦の変化球への対応が世代全体で上手くなった","打者の技術にはとくに大きな変化はなかった"],a:0,e:"ボールを点で・線で・ゾーンでとらえる感覚の土台。リリース後に準備を始めるのは時間も距離も損。0.30秒を0.31、0.32秒としていく世界。",p:"p.208-210"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"投手がボールを長く持つ・クイックにする・プレートの踏み位置を変える目的を落合はどう説明する？",o:["距離と時間を有利に使う＝リリースの瞬間にトップ完了","動体視力そのものを徹底的に鍛え上げる","バットを重くしてパワーを底上げする","打席のいちばん後ろへ下がって備える"],a:0,e:"だから打者はそうした細工に惑わされない準備（早い始動）をしておく。配球側にとっては「時間を奪う細工」が正当な武器であることの裏付け。",p:"p.210"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"「ステップ2」＝ボールの出所と軌道を空間で記憶する方法の限界は？",o:["打者の持つ時間を少しでも奪い、ズラしたいから","肩や肘の疲れをうまくごまかしたいから","昔からの癖であり深い意味はないから","規則で決められた間合いの取り方だから"],a:0,e:"ビデオや分解写真では蓄積できない。だからプロ向きで、トーナメントの多いアマチュアには応用編になる。",p:"p.211-212"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"落合の初対戦投手への臨み方は？",o:["実際の打席で蓄積するもので、初対戦の投手には使えない","1打席も対戦すれば十分に覚えられるもの","映像さえ見れば打席に立たなくても作れるもの","方法としての弱点らしい弱点はとくにない"],a:0,e:"オールスターの野茂戦では2打席で始動タイミングを合わせ、3打席目に逆転2ラン。初対戦から数打席は情報収集に充て、長い付き合いで攻略する考え方。",p:"p.212-215"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"「初球から打つか、じっくり見るか」への落合の答えは？",o:["タイプ別の対処法を整理し、距離と時間を確保して自分本位で戦う","情報がないぶん初打席から全力で一気に仕留めにいく","打席では何も考えず体の反応だけに任せて振る","毎打席ちがうヤマを張って手探りで攻略していく"],a:0,e:"落合自身は滅多に初球を打たないタイプで、四球のあとの初球狙いすらしなかった。狙いどおりの絶好球に力が入って打ち損じた経験から。",p:"p.216-217"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"コントロールに絶対の自信がある投手を、落合が逆に得意にした理由は？",o:["自分次第。数字的な優劣はなくフィーリングを大切に","初球打ちの方が数字の上でも絶対に正しい","じっくり見る方が数字の上でも明らかに正しい","打者ではなく監督が作戦として決めるべきこと"],a:0,e:"制球派・山内和宏をこの読みで攻略し、86年は16打数13安打(.813)。同じ考えで広島・大野豊も打率.405。攻め方がパターン化した制球派は主軸のカモになるという配球側への警告。",p:"p.218-221"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"2ストライクから勝負するタイプの打者に必要な技術として落合が挙げるのは？",o:["2-2からの勝負球は「ボールでもいい」球より甘くなる確率が高い","球速が全体的に遅くタイミングを合わせやすいから","投球フォームに癖が多くて球種を読みやすいから","対戦数を重ねて球筋にすっかり慣れていたから"],a:0,e:"際どい球はファウルで逃げ、打つべきボールは余分な力を入れず確実に。ただしカット打ちの技術を練習で身に付けようとしてはいけない（自分のバッティングが崩れる）。",p:"p.222-223"},
{b:"落合",c:"落合｜打者の狙いと対処",q:"制球派・山内和宏が落合に打ち込まれ続けた要因として挙げられているのは？",o:["ゾーンを広めに考え「あっ」で手を出し「よし」で力を抜く","ゾーンを普段よりぐっと狭く絞り込んで待つ","どんな球が来てもフルスイングの姿勢を貫く","目をつぶってでも何とかバットに当てにいく"],a:0,e:"類まれな制球力があっても、内角を効果的に使えない投手は主軸との根くらべで押し切られる。「性格はピッチングに出る」は捕手側の分析材料にもなる。",p:"p.221"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"1989年ブライアント4連発について落合の評価は？",o:["内角の使い方がうまくなく、優しい人柄が投球に出ていた","球速がプロの平均よりはっきり遅すぎたから","フォームが乱れて制球を欠く日が多かったから","組んでいた捕手のリードだけが一方的に悪かった"],a:0,e:"4点リードの満塁なら1点あげても歩かせる選択があった。勢いに乗った打者との勝負を避ける判断は「逃げ」ではなく確率の問題。",p:"p.286-288"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"2002年日本シリーズ第1戦、4対0の9回にカブレラへ真っ向勝負した上原への落合の批判は？",o:["2本目以降はバッテリーが招いた「人災」","誰が投げても打たれた不可抗力の一発","ブライアントの実力がすべてだった","球場の狭さと風向きが生んだ偶然"],a:0,e:"それまで3打席無安打でシリーズを通して眠らせておける状態だった4番を、一発で復調させてしまった。誰と勝負し誰を眠らせておくかも配球のうち。",p:"p.288"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"3ボールから清原に簡単にストライクを取りにいって同点弾を浴びた張誌家の場面、落合の指摘は？",o:["寝ている獅子を起こした。歩かせるかシングル止まりの攻めをすべき","エース対4番の真っ向勝負はどんな時も正しい選択だ","球種とコースの選択ミスだけが唯一の敗因だった","捕手が出したサインのミスがすべての原因になった"],a:0,e:"四球やシングルヒットを恐れる必要のない状況を整理すれば、無理なストライクは要らなかった。試合後の「気持ちのいい勝負だった」に落合は憤りすら感じたと言う。",p:"p.288-289"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"落合の言う「投手の冒険心」とは？",o:["走れない清原なら歩かせても怖くない。力勝負は最後の最後だけ","真っ向勝負はどんな場面でも正しい男の選択","敬遠は卑怯なので初めから選べるはずがなかった","結果論であって誰にも責められないプレー"],a:0,e:"実際は投手が攻撃側で打者は受け身。思いどおりに攻撃できる性質が「勝負したがり」を生む。打者はその特徴を逆手にとる——つまり捕手はこの傾向を制御する側にいる。",p:"p.289-290"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"「インコース＝強気の投球、アウトコース＝逃げの投球」という考えを落合はどう見る？",o:["自分から仕掛けられる仕事ゆえ、避けるべき勝負も避けられない","新しい球種に果敢に挑戦したがる向上心のこと","盗塁を積極的に刺しにいこうとする強気の性格","打席に立つと打ちたがってしまう積極性のこと"],a:0,e:"小柄で非力な打者に本塁打が増えたのはバッテリーの攻め方の間違いが原因と分析。パワーのない打者にこそ長打になりにくいアウトコースで攻めるべき。",p:"p.291-294"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"野村克也・伊東勤・古田敦也ら「名捕手」に共通するリードは？",o:["大きな誤解。非力な打者に内角攻めをして体の回転で運ばれている","そのとおりで内角を突くことこそが攻めの投球だ","内角も外角もどちらも結局は逃げの投球になる","コースの選択と強気・弱気はそもそも関係がない"],a:0,e:"ヤマっ気のあるリードで長く活躍した捕手はいない。当たり外れが出るからだ。「内に速く、外に遅く」の鉄則も忠実に守っている。",p:"p.292,298-299,314"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"落合が考える「プロで生き抜ける投手」の最低条件は？",o:["見せ球はインコース、勝負球はアウトコースのオーソドックス","ヤマっ気たっぷりの読みを効かせた大胆な内角勝負","毎打席まったく違う攻めを見せる読めない意外性","真ん中中心に強気で押していく豪快な力勝負"],a:0,e:"キレのいいストレートをアウトローに確実に投げ込まれたら、打者はそれだけでお手上げになると断言。中学生バッテリーにも最重要のメッセージ。",p:"p.292"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"落合が90年代以降、投手より捕手の性格分析を重視するようになった理由は？",o:["どんな状況でもストライクを取れる球1つとアウトローへの制球","打者を力でねじ伏せる150キロ超えのストレート","打者の手元で消えるような魔球レベルのフォーク","恵まれた体格と長いイニングを投げ切る体力"],a:0,e:"最初に集めるデータは「その捕手がカウント球・遊び球・勝負球に何を要求するか」。自分の打席でなくてもベンチから観察できる。裏を返せば捕手は常に観察されている。",p:"p.297"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"捕手の性格・考え方のクセが如実に表れる場面として落合が挙げるのは？",o:["配球の主導権が捕手に移り、捕手は1人で対戦も多く効率的だから","投手のレベルが時代とともに全体的に下がったから","捕手の方が性格が単純で考えを読みやすいから","投手を個別に分析するのは時間の無駄だから"],a:0,e:"さらに「絶好調の打者に3安打され、もう投げる球がない状況で何を要求するか」でも堅実型かヤマっ気型かが分かる。捕手は自分の傾向を客観視しておくべき。",p:"p.298-299"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"「名捕手のリードはアウト中心と分かっているのに、なぜ打者は3割しか打てないのか」への落合の答えは？",o:["逆球になった後、プランを続けるか組み立て直すか","攻撃中のベンチでの時間の過ごし方と表情","試合前のシートノックでの捕球と送球の動き","ブルペンでのキャッチボールの相手の選び方"],a:0,e:"投手と打者のせめぎ合いは、王道セオリーを挟んで表でいくか裏をかくかの一点に尽きる。単純なことほど単純に考えるのが難しい（クイズ王が簡単な問題を勘ぐる例）。",p:"p.299-300"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"プロで最高レベルのコントロールを持つ投手でも、コントロールミスの割合は？",o:["ワンパターンでも「今度こそ裏では」という心理がつきまとうから","名捕手ほど最後の最後の勝負どころで必ず嘘をつくから","打者側の読みの技術がそもそも追いついていないから","当時は配球データの精度がまだまだ低かったから"],a:0,e:"そのミスが打者の絶好球になる。ただし道具を使う打者のほうがミスの頻度は高く、これが「どんな打者も4割は打てない」理由になる。",p:"p.300"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"江夏豊の「初球の入り」の哲学は？",o:["約20%。大部分の投手は30%以上","ほぼ5%以下でミスは滅多に起きない","約50%は狙いとまったく違う球になる","一流投手にコントロールミスはない"],a:0,e:"構えたところへ10球中8球。初球からどんどん振る打者にフォークを投げる最近の傾向を落合は「冒険しすぎ」と批判。変化球はストレートよりコントロールミスの確率が高く、「変化球の投げ間違いは最も怖い」がセオリー。",p:"p.302-303"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"同じコントロールミスでも被害が小さいのは？",o:["簡単にストライクを取りにいかず、危険の少ないアウトローで様子見","初球は必ず一番自信のあるフォークから入っていた","初球は必ずど真ん中へ強気に投げ込んでいた","初球のことはとくに深く考えていなかった"],a:0,e:"江夏がアウトローにこだわった理由のひとつ。すべては確率に裏付けされたセオリー。",p:"p.303,306"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"石井一久・古田バッテリーの「右打者のヒザ元スライダー」の使い方は？",o:["アウトコース狙いのミスの方が、イン狙いのミスより痛打されにくい","インコース狙いのミスの方が実はずっと安全になる","高めを狙ったミスがいちばん被害が少なく済む","どこを狙ったミスでも被害の大きさは同じこと"],a:0,e:"一方、左投手が右打者の外へ投げるカーブ・スライダーは曲がりが悪く体に近づく危険球で、古田は石井に投げさせなかった。落合の対策は「ヒザ元スライダーは見せ球と割り切り頭から外す」。",p:"p.304-305"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"打者・落合がバッテリー攻略の結論として繰り返すのは？",o:["見せ球。「振ってくれたら儲けもの」で厄介さを刷り込む","必ず勝負球として最後まで使い切っていた","危険なので一度も投げさせなかった","カウントを取る球としてだけ使っていた"],a:0,e:"打者とは受け身の存在。見せ球を見送って勝負球を待てば、優秀なバッテリーほど最後はアウトローに来る。だから落合は伊東勤や古田との対戦を「楽」と感じていた。",p:"p.300-306"},
{b:"落合",c:"落合｜バッテリー攻略の視点",q:"確率とセオリーについて落合のまとめは？",o:["すべての球を追いかけず「打てるボールを確実に打ち返す」","来た球すべてに積極的に食らいついていくこと","最後の打席まで自分の読みでヤマを張り通すこと","真っ向からの力勝負に持ち込んで押し切ること"],a:0,e:"古田が戦力で劣るヤクルトを何度も日本一に導けたのは「常に勝つ確率の高い要素を選択する野球」を実践しているからと分析。",p:"p.303-306"},
{b:"落合",c:"落合｜データと確率",q:"コース別のヒット確率表（アウトロー0%）で「6球で打ち取れ」と問われた落合の答えは？",o:["常に確率に裏付けられたセオリーで危険度の低い選択をする","ここぞの場面では大博打を打って流れを引き寄せる","セオリーはすべて無視して感覚だけで勝負する","運の流れを読み切ってここ一番で賭けていく"],a:0,e:"1球勝負でも10球勝負でも答えは同じ。0%と1%の差は「100回戦えば1回負ける」差であり、その1敗がここ一番で出ない保証はない。",p:"p.308-313"},
{b:"落合",c:"落合｜データと確率",q:"打者・落合が現役時代に最も恐れていた攻め方は？",o:["6球すべて0%のアウトローに投げる","打たれる確率の低い順に散らしていく","高めから入って目線を上げさせていく","真ん中で強気に力勝負を挑んでいく"],a:0,e:"「なぜ自分と同じ考え方をする投手がいないのだろう」とほくそ笑みながら20年現役を続けられたと言う。単純で地味な正解を実行できる投手はいなかった。",p:"p.312-314"},
{b:"落合",c:"落合｜データと確率",q:"多くの投手が語る「理想の打ち取り方」と現実のギャップは？",o:["アウトローをひたすら突いてくる攻め方","内角の出し入れで細かく揺さぶる攻め方","大きな緩急でタイミングを崩す攻め方","クイックで間合いを外してくる攻め方"],a:0,e:"「自信のあるボールを投げるか、弱点を突くか」と問えばほとんどの投手が前者と答える。自分に酔いたい性格が多いのも事実、と落合。捕手はこの傾向を知って制御する側。",p:"p.313"},
{b:"落合",c:"落合｜データと確率",q:"落合の言う「相手の嫌がること」の実例は？",o:["「3球同じ球種同じコースで三振」が理想と言いつつ実戦ではやらない","語った理想をそのまま実戦でも貫き通し続けている","本当の理想は変化球を3球続けることだった","本当の理想は先頭打者を歩かせることだった"],a:0,e:"勝負事は相手の嫌がることを実行すれば優位に立てる。配球側も同じで、打者の嫌がることを見つけるのが観察の目的。",p:"p.313-314"},
{b:"落合",c:"落合｜データと確率",q:"「タイミングの合っていないボール」への攻めについて落合の告白は？",o:["リズム型には打席外し・2球種投手はフォーク捨て・守備不安にはバント","大きな声援でチームメイトをひたすら鼓舞し続けること","考える前に早打ちでテンポよくどんどん攻めていくこと","タイムは一切取らずに試合の流れにすべてを任せること"],a:0,e:"合っていない球を軸に攻めることまではしても、ひたすら続けるバッテリーはいなかった。「これで3割3分が3割4分にも5分にもなった」。タイミングの合っていないボールは続けるのが正解。",p:"p.314"},
{b:"落合",c:"落合｜データと確率",q:"稲尾監督の「反省会」から落合が得たものは？",o:["3球続けられるのが最も怖いのに、違う球種で攻めてくれるから楽","同じ球を何球続けられてもまったく平気だった","タイミングの合わない球はキャリアを通じてなかった","怖かったが何が怖いのかはっきり覚えていない"],a:0,e:"投手は打者心理を、打者は投手心理を学ぶべき。投手ミーティングで四番打者に、野手ミーティングでエースに話をさせる方法も提案している。",p:"p.310-311"},
{b:"落合",c:"落合｜データと確率",q:"配球データ表を見ても分からない最も大きなポイントとして落合が挙げるのは？",o:["投手人間の考え方を知り、実戦でのアドバンテージになった","お酒との上手な付き合い方を覚えられただけ","監督への批判で盛り上がるだけの席だった","得られるものはとくに何ひとつなかった"],a:0,e:"データはあくまで補助。「データによると…」とデータに振り回される選手は上達しない。自分の体験・印象を整理した「人間データ」になれ、が落合の結論。",p:"p.321-324"},
{b:"落合",c:"落合｜データと確率",q:"「今季11打数0安打だから松沼雅之が苦手」というテレビの分析に、落合が反論できた根拠は？",o:["その投手の「その日の調子」","球種の割合と得意コースの傾向","カウント別の細かい配球パターン","左右の打者別の攻め方の違い"],a:0,e:"肉体・メンタル・キレ・相手打線。数字は中身を見なければ薬にも毒にもなる。『キャッチャーの科学』の「打率3割3分3厘の中身を見よ」と同じ教訓を打者側から語っている。",p:"p.323-325"},
{b:"落合",c:"落合｜データと確率",q:"若手時代の落合が松沼雅之に3打席3三振を喫した攻めは？",o:["過去2年は.353と.455で、凡退もいい当たりが正面を突いた内容だから","ただの気のせいだと番組が終わるまで言い張り続けたから","自分の記憶とデータの数字が食い違ったままだったから","データというものを現役時代から一切信じない主義だから"],a:0,e:"「アウトローにストレートを投げ続ければ打者は対処できない」という落合の持論はこの原体験から。皮肉にも、松沼が落合を警戒して変化球を交え慎重になった途端に打たれ始めた。",p:"p.323-324"},
{b:"落合",c:"落合｜データと確率",q:"落合がヤマ張りも配球読みもしなかった理由は？",o:["追い込んでからアウトローへのストレート","内角へ食い込むシュートで詰まらせる攻め","緩いカーブの大きな緩急で外す攻め","クイックでタイミングを外し続ける攻め"],a:0,e:"「投手やバッテリーをそこまで信用していなかった」。ただしヤマ張りや配球読み自体は否定せず、結果を残した者の勝ちと言う。",p:"p.326-327"},
{b:"落合",c:"落合｜データと確率",q:"落合が山田久志のシンカーだけは狙えた理由は？",o:["読みが当たっても投手がそこに投げ切れる保証がなく、危険だから","配球を読むための技術と経験がそもそもなかったから","一球ごとにいちいち考えるのが面倒で嫌いだったから","所属していた球団の方針で固く禁止されていたから"],a:0,e:"考え方のクセはフォームのクセと同じで簡単には変えられない。ウイニングショットが決まっている投手は、そこだけ待たれる。",p:"p.313,327-328"},
{b:"落合",c:"落合｜データと確率",q:"ヤマを張る打者について落合が見つけた「不思議」と提案は？",o:["打てないボールにヤマを張りがち。打てる球の確率を数字で出して張れ","ヤマは張れば張るほど不思議とよく当たるようになる","ヤマ張りはすべての打者に禁止させるべき悪い癖である","確率の計算というものは打撃の世界にはまったく不要"],a:0,e:"エンドランのサインが出て「何でも打つしかない」状況になると難しい球を巧みに打ったりする。「内角低めは40%」のような自分データを作り、感覚でなく数字で自分を把握せよ。",p:"p.328-329"}
];

/* ===== 言語化（声に出して説明）問題バンク ===== */
const VBANK = [
{b:"野村ノート",c:"言語化",q:"なぜ野村は「捕手はネガティブでなくてはならない」と言うのか。声に出して説明してみよう。",model:"野球は失敗のスポーツで、最も多いのはコントロールミス。真っ直ぐが真ん中に入る、フォークが落ちないことは必ず起きる。だから多少甘く入っても一発で仕留められない「狙われない配球」を前提に組み立てる必要があるから。",p:"p.61-62"},

/* ---- プレイヤー（記録の分離）と習得記録 ---- */
const PROFILES=["莉映","父"];
const GOAL_PCT=80;
function hashQ(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))|0; } return (h>>>0).toString(36); }
let profile = localStorage.getItem("haikyu_profile")||"";
function mkey(){ return "haikyu_m_"+profile; }
function loadM(){ try{ return JSON.parse(localStorage.getItem(mkey()))||{}; }catch(e){ return {}; } }
function saveM(m){ try{ localStorage.setItem(mkey(),JSON.stringify(m)); }catch(e){} }
function recordAnswer(qid,ok){
  if(!profile||!qid) return;
  const m=loadM(); const r=m[qid]||{c:0,w:0,ok:false};
  if(ok){ r.c++; r.ok=true; }
  else { r.w++; r.ok=false; }
  m[qid]=r; saveM(m);
}
function mcId(x){ return "mc:"+hashQ(x.q); }
function qidOf(x){ return mcId(x); }
function mkItem(x){ return mkMcItem(x,false); }
/* ---- 本ごとの合格管理 ----
   制覇＝①その本の全問を1回解いて正答率80%以上（一次テスト）
        →②間違えた問題だけの「直しテスト」で80%以上
   一次テストが80%未満なら記録をリセットしてもう一周。 */
function bkey(){ return "haikyu_b_"+profile; }
function loadB(){ try{ return JSON.parse(localStorage.getItem(bkey()))||{}; }catch(e){ return {}; } }
function saveB(B){ try{ localStorage.setItem(bkey(),JSON.stringify(B)); }catch(e){} }
function bookState(B,b){ return B[b]||{r1:{},wrongs:null,cleared:false,tries:0}; }
function bookQs(b){ return ALLBANK.filter(x=>x.b===b); }
function r1Progress(st,b){
  const qs=bookQs(b);
  let done=0,okn=0;
  qs.forEach(x=>{ const v=st.r1[qidOf(x)]; if(v!==undefined){ done++; if(v===1) okn++; } });
  return {done,okn,total:qs.length};
}
// 通常出題での「この周の1回目の解答」だけを一次テストに記録する
function recordR1(b,qid,ok){
  const B=loadB(); const st=bookState(B,b);
  if(st.cleared || st.wrongs) return;   // 制覇済み／直しテスト待ちの本は練習扱い
  if(st.r1[qid]!==undefined) return;    // この周ですでに解答済み（解き直しは練習扱い）
  st.r1[qid]= ok?1:0; B[b]=st; saveB(B);
}
// 全問を解き終えた本を判定して、結果メッセージを返す
function evaluateBooks(books){
  const B=loadB(); const msgs=[];
  books.forEach(b=>{
    const st=bookState(B,b);
    if(st.cleared||st.wrongs) return;
    const pr=r1Progress(st,b);
    if(pr.done<pr.total) return; // まだ全問解いていない
    const pct=Math.round(pr.okn/pr.total*100);
    if(pct>=GOAL_PCT){
      const wr=bookQs(b).filter(x=>st.r1[qidOf(x)]===0).map(x=>qidOf(x));
      if(wr.length===0){ st.cleared=true; msgs.push("🏆『"+BOOK_LABEL[b]+"』一次テスト"+pct+"%・間違いゼロで制覇！"); }
      else { st.wrongs=wr; msgs.push("✅『"+BOOK_LABEL[b]+"』一次テスト"+pct+"%で合格！ 次は📝直しテスト（間違えた"+wr.length+"問で80%以上）"); }
    } else {
      st.r1={}; st.tries=(st.tries||0)+1;
      msgs.push("❌『"+BOOK_LABEL[b]+"』一次テスト"+pct+"%…合格は80%から。もう一周挑戦しよう！");
    }
    B[b]=st;
  });
  saveB(B); return msgs;
}
function voiceUnlocked(){ return profile && localStorage.getItem("haikyu_voiceok_"+profile)==="1"; }

  const B=loadB();

    if(st.cleared){ stat="🏆 制覇！"; pct=100; nClear++; }
    else if(st.wrongs){ stat="📝 直しテスト待ち（"+st.wrongs.length+"問）"; pct=90; }

    else { stat="未挑戦（"+pr.total+"問）"; pct=0; }
    const nm=(b==="実戦")?BOOK_LABEL[b]:"『"+BOOK_LABEL[b]+"』";
    return '<div class="drow"><div class="nm">'+nm+'</div><div class="dbarw"><i class="dbar" style="width:'+pct+'%"></i></div><div class="pc">'+stat+'</div></div>';
  }).join("");
  d.innerHTML='<div class="goal" style="margin:0 2px 8px;">制覇 '+nClear+'/'+BOOKS.length+'冊</div>'+rowsHtml;
  // 全冊制覇 → 言語化ボタンを解放（一度解放されたら戻らない）
  if(nClear===BOOKS.length){ localStorage.setItem("haikyu_voiceok_"+profile,"1"); }
  $("voiceBtn").classList.toggle("hidden", !voiceUnlocked());
  // 直しテストボタン（開いている本を優先。なければ待ちの先頭の本）
  const pend=BOOKS.filter(b=>{ const s=bookState(B,b); return !s.cleared && s.wrongs && s.wrongs.length; });
  if(pend.length){
    const b=(activeBook&&pend.includes(activeBook))?activeBook:pend[0];
    rb.textContent="📝 直しテスト：『"+BOOK_LABEL[b]+"』の間違い"+bookState(B,b).wrongs.length+"問（"+GOAL_PCT+"%以上で制覇！）";
    rb.dataset.book=b;
    rb.classList.remove("hidden");
  } else { rb.classList.add("hidden"); rb.dataset.book=""; }
  $("starBtn").classList.add("hidden");
}

let activeBook = null;        // いま開いている本（本を選ぶ→章を選ぶ、の順）
let selectedCats = new Set(); // 選択中の章（開いている本の中だけ）
let session = null;
let qTimer = null;
const TSPEED = 12; // 2択スピードの制限秒

/* ---- 描画：開始画面 ---- */
function renderStart(){
  renderDash();
  const B = profile ? loadB() : null;
  // 書籍チップ（挑戦の進み具合・📝直し待ち・🏆制覇を表示）
  const bc = $("bookChips"); bc.innerHTML="";
  BOOKS.forEach(b=>{
    const qs=ALLBANK.filter(x=>x.b===b);
    const total=qs.length;
    const st=B ? bookState(B,b) : null;
    const pr=st ? r1Progress(st,b) : null;
    const el=document.createElement("div");
    el.className="chip book"+(b===activeBook?" on":"");
    const badge = st ? (st.cleared?" 🏆":(st.wrongs?" 📝":"")) : "";
    const title=((b==="実戦") ? BOOK_LABEL[b] : "『"+BOOK_LABEL[b]+"』")+badge;
    const sub = st
      ? (BOOK_AUTHOR[b]+"・"+(st.cleared?("制覇済み・"+total+"問"):(st.wrongs?("直し"+st.wrongs.length+"問待ち"):("挑戦 "+pr.done+"/"+total))))
      : (BOOK_AUTHOR[b]+"・"+total+"問");
    el.innerHTML=title+"<br><small>"+sub+"</small>";
    el.onclick=()=>{
      if(activeBook===b){ activeBook=null; selectedCats.clear(); }
      else{
        activeBook=b; selectedCats.clear();
        const cs=CATS.filter(c=>c.b===b);
        if(cs.length===1) selectedCats.add(cs[0].b+"|"+cs[0].c); // 章が1つの本は自動選択
      }
      renderStart();
    };
    bc.appendChild(el);
  });
  // カテゴリチップ（開いている本の章だけを表示）
  const cc=$("catChips"); cc.innerHTML="";
  if(!activeBook){
    cc.innerHTML='<div class="goal" style="margin:0 2px;">📖 上で本をタップすると、その本の章がここに出ます。</div>';
  }
  BOOKS.filter(b=>b===activeBook).forEach(b=>{
    const cats=CATS.filter(c=>c.b===b);
    if(!cats.length) return;
    const st=B ? bookState(B,b) : null;
    const g=document.createElement("div"); g.className="catgroup";
    const h=document.createElement("div"); h.className="cathead";
    h.textContent=(b==="実戦") ? BOOK_LABEL[b] : "『"+BOOK_LABEL[b]+"』";
    g.appendChild(h);
    const row=document.createElement("div"); row.className="chips";
    cats.forEach(c=>{
      const key=c.b+"|"+c.c;
      const qs=ALLBANK.filter(x=>x.b===c.b&&x.c===c.c);
      const total=qs.length;
      const done=st ? qs.filter(x=>st.r1[qidOf(x)]!==undefined).length : 0;
      const label=(c.c.includes("｜") ? c.c.slice(c.c.indexOf("｜")+1) : c.c)+((st&&(st.cleared||done===total)&&total>0)?" ✅":"");
      const el=document.createElement("div");
      el.className="chip"+(selectedCats.has(key)?" on":"");
      el.innerHTML=label+"<small>"+(st?("解答 "+done+"/"+total):total)+"</small>";
      el.onclick=()=>{ selectedCats.has(key)?selectedCats.delete(key):selectedCats.add(key); renderStart(); };
      row.appendChild(el);
    });
    g.appendChild(row);
    cc.appendChild(g);
  });
  updatePool();
}
function pool(){ return ALLBANK.filter(x=>selectedCats.has(x.b+"|"+x.c)); }
function updatePool(){
  if(!profile){ $("poolInfo").textContent="👤 まず上でプレイヤーを選んでね"; $("startBtn").style.opacity=.5; return; }
  const n=pool().length;
  if(n===0){
    $("poolInfo").textContent = activeBook
      ? "📖 章をタップして選ぼう（✅がまだ付いていない章がおすすめ）"
      : "📚 本をタップして選ぼう（おすすめは上から順。🏆＝制覇済み）";
    $("startBtn").style.opacity=.5; return;
  }
  $("poolInfo").textContent = "選択中 "+n+"問 → ぜんぶ出題（1問目の解答が一次テストに記録されます）";
  $("startBtn").style.opacity = 1;
}

$("selAll").onclick=()=>{ if(!activeBook) return; selectedCats=new Set(CATS.filter(c=>c.b===activeBook).map(c=>c.b+"|"+c.c)); renderStart(); };
$("selNone").onclick=()=>{ selectedCats=new Set(); renderStart(); };

/* ---- シャッフル ---- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---- 出題アイテム生成 ---- */
function mkMcItem(x,speed){
  if(speed){
    const correct={t:x.o[x.a],correct:true};
    const others=x.o.filter((t,i)=>i!==x.a);
    const dis={t:others[Math.floor(Math.random()*others.length)],correct:false};
    const so=shuffle([correct,dis]);
    return {b:x.b,c:x.c,q:x.q,e:x.e,p:x.p,opts:so,ans:so.findIndex(o=>o.correct),speed:true,qid:mcId(x)};
  }
  const opts=x.o.map((t,i)=>({t,correct:i===x.a}));
  const so=shuffle(opts);
  return {b:x.b,c:x.c,q:x.q,e:x.e,p:x.p,opts:so,ans:so.findIndex(o=>o.correct),speed:false,qid:mcId(x)};
}

/* ---- スタート（選んだ章をぜんぶ出題） ---- */
$("startBtn").onclick=()=>{
  if(!profile) return;
  const p=pool(); if(p.length===0) return;
  const qs=shuffle(p).map(x=>mkItem(x));
  session={qs,idx:0,score:0,answers:[],mode:"mc"};
  show("quiz"); renderQ();
};

/* ---- 言語化（全章🏆で解放） ---- */
$("voiceBtn").onclick=()=>{
  if(!profile||!voiceUnlocked()) return;
  const qs=shuffle(VBANK).map(x=>({b:x.b,c:x.c,q:x.q,model:x.model,p:x.p,voice:true,speed:false,qid:"v:"+hashQ(x.q)}));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"voice"};
  show("quiz"); renderQ();
};

/* ---- 直しテスト（一次テストで間違えた問題だけ・80%以上で制覇） ---- */
$("reviewBtn").onclick=()=>{
  if(!profile) return;
  const b=$("reviewBtn").dataset.book; if(!b) return;
  const B=loadB(); const st=bookState(B,b);
  if(!st.wrongs||!st.wrongs.length) return;
  const set=new Set(st.wrongs);
  const qs=shuffle(ALLBANK.filter(x=>x.b===b&&set.has(qidOf(x)))).map(x=>mkItem(x));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"retest",book:b};
  show("quiz"); renderQ();
};

/* ---- タイマー（2択スピード） ---- */
function clearTimer(){ if(qTimer){ clearInterval(qTimer); qTimer=null; } }
function startTimer(){
  const wrap=$("timerWrap"), bar=wrap.querySelector(".tbar");
  wrap.classList.remove("hidden"); bar.classList.remove("low");
  const dur=TSPEED*1000, t0=performance.now();
  $("tFill").style.width="100%"; $("tNum").textContent=TSPEED.toFixed(1);
  qTimer=setInterval(()=>{
    const left=dur-(performance.now()-t0);
    if(left<=0){ $("tFill").style.width="0%"; $("tNum").textContent="0.0"; clearTimer(); choose(-1,null); return; }
    const r=left/dur; $("tFill").style.width=(r*100)+"%"; $("tNum").textContent=(left/1000).toFixed(1);
    if(r<0.34) bar.classList.add("low");
  },100);
}

function show(which){
  ["start","quiz","result"].forEach(id=>$(id).classList.toggle("hidden",id!==which));
  window.scrollTo(0,0);
}

/* ---- 問題描画 ---- */
function renderQ(){
  clearTimer();
  const s=session, q=s.qs[s.idx];
  $("qtotal").textContent=s.qs.length;
  $("qpos").textContent=s.idx+1;
  $("scoreNow").textContent=s.score;
  $("pbarFill").style.width=((s.idx)/s.qs.length*100)+"%";
  $("qmeta").innerHTML='<span class="tag">'+BOOK_LABEL[q.b]+'</span><span>'+q.c+'</span>';
  $("qtext").textContent=q.q;
  const A=$("answers"); A.innerHTML="";
  const ex=$("explain"); ex.className="explain"; ex.innerHTML="";
  if(q.voice){
    const hint=document.createElement("div");
    hint.style.cssText="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:4px;";
    hint.textContent="🎤 まず自分の言葉で、声に出して説明しよう。言えたらタップ。";
    A.appendChild(hint);
    const b=document.createElement("button");
    b.className="ans";
    b.innerHTML='<span class="mk">💬</span>模範解答を見る';
    b.onclick=()=>revealModel(b);
    A.appendChild(b);
    if(q.done){
      b.disabled=true; b.classList.add("dim");
      ex.innerHTML="💬 <b>模範解答</b><br>"+q.model
        +'<span class="src">出典の目安：'+BOOK_LABEL[q.b]+" "+q.p+"</span>"
        +'<div style="margin-top:8px;font-weight:700;">'+(q.done.voice?"⭕ 言えた（自己採点済み）":"❌ まだ（自己採点済み）")+'</div>';
      ex.classList.add("show");
    }
  } else {
    const letters=["A","B","C","D","E"];
    q.opts.forEach((o,i)=>{
      const b=document.createElement("button");
      b.className="ans";
      b.innerHTML='<span class="mk">'+letters[i]+'</span>'+o.t;
      b.onclick=()=>choose(i,b);
      A.appendChild(b);
    });
    if(q.done) paintDone(q);
  }
  updateNav();
  if(q.speed && !q.done){ startTimer(); } else { $("timerWrap").classList.add("hidden"); }
}

/* ---- 解答済み表示とナビゲーション ---- */
function paintDone(q){
  const btns=[...$("answers").children];
  btns.forEach((b,j)=>{
    b.disabled=true;
    if(j===q.ans) b.classList.add("correct");
    if(q.done.sel>=0 && j===q.done.sel && q.done.sel!==q.ans) b.classList.add("wrong");
    if(j!==q.ans && j!==q.done.sel) b.classList.add("dim");
  });
  const ok=(q.done.sel===q.ans);
  const ex=$("explain");
  const srcLabel=(q.b==="実戦")?("応用問題｜根拠："+q.p)
        :("出典の目安："+BOOK_LABEL[q.b]+" "+q.p);
  const head = ok ? "⭕ <b>正解！</b>" : (q.done.sel<0 ? "⏱ <b>時間切れ</b>　正解は「"+q.opts[q.ans].t+"」" : "❌ <b>不正解</b>　正解は「"+q.opts[q.ans].t+"」");
  ex.innerHTML=head+"<br>"+q.e+'<span class="src">'+srcLabel+"</span>";
  ex.classList.add("show");
}
function updateNav(){
  const s=session, q=s.qs[s.idx];
  $("prevBtn").classList.toggle("hidden", s.idx===0);
  const nb=$("nextBtn");
  nb.classList.toggle("hidden", !q.done);
  nb.textContent = (s.idx===s.qs.length-1)?"結果を見る ▶":"次の問題 ▶";
}
$("prevBtn").onclick=()=>{ const s=session; if(s&&s.idx>0){ clearTimer(); s.idx--; renderQ(); } };

/* ---- 言語化：模範解答と自己採点 ---- */
function revealModel(btn){
  const s=session, q=s.qs[s.idx];
  btn.disabled=true; btn.classList.add("dim");
  const ex=$("explain");
  ex.innerHTML="💬 <b>模範解答</b><br>"+q.model
    +'<span class="src">出典の目安：'+BOOK_LABEL[q.b]+" "+q.p+"</span>"
    +'<div style="margin-top:12px;display:flex;gap:8px;">'
    +'<button class="btn" style="margin-top:0;padding:12px;font-size:15px;" id="sgOk">⭕ 言えた</button>'
    +'<button class="btn lite" style="margin-top:0;padding:12px;font-size:15px;" id="sgNg">❌ まだ</button>'
    +'</div>';
  ex.classList.add("show");
  $("sgOk").onclick=()=>gradeSelf(true);
  $("sgNg").onclick=()=>gradeSelf(false);
}
function gradeSelf(ok){
  const s=session, q=s.qs[s.idx];
  if(q.done) return;
  q.done={voice:ok};
  if(ok){ s.score++; playStrike(); } else { playOut(); }
  recordAnswer(q.qid, ok);
  s.answers.push({q:q.q, your: ok?"⭕ 言えた（自己採点）":"❌ まだ（自己採点）", correct:q.model, ok, e:"", p:q.p, book:q.b, c:q.c});
  $("scoreNow").textContent=s.score;
  $("sgOk").disabled=true; $("sgNg").disabled=true;
  updateNav();
}

/* ---- 効果音（外部ファイルなしで合成） ---- */
let sndOn = localStorage.getItem("haikyu_snd")!=="0";
function updateSndBtn(){ const b=$("sndBtn"); if(b){ b.textContent = sndOn?"🔊":"🔇"; b.style.opacity = sndOn?1:.6; } }
$("sndBtn").onclick=()=>{ sndOn=!sndOn; localStorage.setItem("haikyu_snd", sndOn?"1":"0"); updateSndBtn(); if(sndOn) playStrike(); };
updateSndBtn();
let audioCtx=null;
function actx(){
  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(audioCtx && audioCtx.state==="suspended"){ try{ audioCtx.resume(); }catch(e){} }
  return audioCtx;
}
// 正解：金属バットの「カキーン！」（打撃のインパクト音＋金属の高い余韻）
function playKakiin(){
  if(!sndOn) return; const ctx=actx(); if(!ctx) return;
  const t0=ctx.currentTime;
  // インパクトの「カッ」（短いノイズ）
  const nb=ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.03), ctx.sampleRate);
  const d=nb.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const ns=ctx.createBufferSource(); ns.buffer=nb;
  const ng=ctx.createGain(); ng.gain.setValueAtTime(0.6,t0);
  ns.connect(ng); ng.connect(ctx.destination); ns.start(t0);
  // 金属の「キーン」（高い倍音がゆっくり減衰・わずかに下がる）
  [[1959,0.30],[2513,0.22],[3151,0.15],[4287,0.08]].forEach(fr=>{
    const f=fr[0], v=fr[1];
    const o=ctx.createOscillator(); o.type="sine";
    o.frequency.setValueAtTime(f,t0);
    o.frequency.exponentialRampToValueAtTime(f*0.97,t0+0.8);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(v,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.9);
    o.connect(g); g.connect(ctx.destination); o.start(t0); o.stop(t0+1.0);
  });
}
// 正解：ミットの「パンッ」＋審判の「ストライク！」コール（音声合成）
function playStrike(){
  if(!sndOn) return;
  // ミットに収まる「パンッ」
  const ctx=actx();
  if(ctx){
    const t0=ctx.currentTime;
    const nb=ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.05), ctx.sampleRate);
    const d=nb.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
    const ns=ctx.createBufferSource(); ns.buffer=nb;
    const flt=ctx.createBiquadFilter(); flt.type="lowpass"; flt.frequency.setValueAtTime(900,t0);
    const ng=ctx.createGain(); ng.gain.setValueAtTime(0.9,t0);
    ns.connect(flt); flt.connect(ng); ng.connect(ctx.destination); ns.start(t0);
  }
  let spoke=false;
  try{
    if(window.speechSynthesis && window.SpeechSynthesisUtterance){
      const u=new SpeechSynthesisUtterance("ストライーク！");
      u.lang="ja-JP"; u.rate=1.0; u.pitch=0.6; u.volume=1;
      const vs=speechSynthesis.getVoices();
      const ja=vs.find(v=>v.lang&&v.lang.indexOf("ja")===0);
      if(ja) u.voice=ja;
      speechSynthesis.cancel();
      setTimeout(()=>{ try{ speechSynthesis.speak(u); }catch(e){} },120); // パンッの直後にコール
      spoke=true;
    }
  }catch(e){}
  if(!spoke && ctx){ // 音声合成が使えない端末は明るいチャイムで代用
    const t0=ctx.currentTime+0.08;
    [[1318,0],[1760,0.09]].forEach(fd=>{
      const o=ctx.createOscillator(); o.type="sine"; o.frequency.setValueAtTime(fd[0],t0+fd[1]);
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.0001,t0+fd[1]);
      g.gain.exponentialRampToValueAtTime(0.25,t0+fd[1]+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+fd[1]+0.45);
      o.connect(g); g.connect(ctx.destination); o.start(t0+fd[1]); o.stop(t0+fd[1]+0.5);
    });
  }
}
// 不正解：審判の「アウト！」（音声合成。使えない端末は低いブザーで代用）
function playOut(){
  if(!sndOn) return;
  let spoke=false;
  try{
    if(window.speechSynthesis && window.SpeechSynthesisUtterance){
      const u=new SpeechSynthesisUtterance("アウト！");
      u.lang="ja-JP"; u.rate=1.05; u.pitch=0.55; u.volume=1;
      const vs=speechSynthesis.getVoices();
      const ja=vs.find(v=>v.lang&&v.lang.indexOf("ja")===0);
      if(ja) u.voice=ja;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
      spoke=true;
    }
  }catch(e){}
  if(!spoke){
    const ctx=actx(); if(!ctx) return; const t0=ctx.currentTime;
    const o=ctx.createOscillator(); o.type="square"; o.frequency.setValueAtTime(170,t0);
    o.frequency.exponentialRampToValueAtTime(120,t0+0.3);
    const g=ctx.createGain(); g.gain.setValueAtTime(0.18,t0);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.35);
    o.connect(g); g.connect(ctx.destination); o.start(t0); o.stop(t0+0.4);
  }
}
// iOSは初回タップでAudioContextを起こしておく＆音声合成の声リストを先読み
document.addEventListener("touchstart",function once(){ actx(); try{ speechSynthesis&&speechSynthesis.getVoices(); }catch(e){} document.removeEventListener("touchstart",once); },{passive:true});

/* ---- 回答 ---- */
function choose(i,btn){
  clearTimer();
  $("timerWrap").classList.add("hidden");
  const s=session, q=s.qs[s.idx];
  if(q.done) return; // 解答済み（もどるで再訪中）は再回答不可
  q.done={sel:i};
  const ok=(i===q.ans);
  if(ok){ s.score++; playStrike(); } else { playOut(); }
  recordAnswer(q.qid, ok); // 全履歴（参考用）
  if(s.mode==="mc") recordR1(q.b, q.qid, ok); // 通常出題の1回目だけ一次テストに記録
  const yourText = (i<0) ? "（時間切れ）" : q.opts[i].t;
  s.answers.push({q:q.q, your:yourText, correct:q.opts[q.ans].t, ok, e:q.e, p:q.p, book:q.b, c:q.c});
  $("scoreNow").textContent=s.score;
  paintDone(q);
  updateNav();
}

$("nextBtn").onclick=()=>{
  const s=session;
  if(s.idx===s.qs.length-1){ finish(); }
  else { s.idx++; renderQ(); }
};
$("quitBtn").onclick=()=>{ if(confirm("クイズをやめて範囲選択にもどりますか？")){ clearTimer(); session=null; renderStart(); show("start"); } };

/* ---- 結果 ---- */
function finish(){
  clearTimer();
  $("timerWrap").classList.add("hidden");
  const s=session;
  const total=s.qs.length, sc=s.score, pct=Math.round(sc/total*100);
  $("pbarFill").style.width="100%";
  $("rPct").textContent=pct+"%";
  $("rFrac").textContent=sc+" / "+total;
  // リング
  const C=2*Math.PI*70;
  const ring=$("ring");
  ring.style.strokeDasharray=C;
  ring.style.strokeDashoffset=C;
  ring.style.stroke = pct>=80?"#1f9d55":pct>=50?"#e8b53b":"#d8473b";
  setTimeout(()=>{ ring.style.transition="stroke-dashoffset 1s ease"; ring.style.strokeDashoffset=C*(1-sc/total); },60);
  let msg,sub;
  if(pct===100){msg="満点！配球マスター ⚾👑";sub="文句なし。実戦でも根拠ある1球を。";}
  else if(pct>=80){msg="お見事！正捕手級 🧤";sub="ほぼ理解できています。";}
  else if(pct>=50){msg="いい調子！あと一歩 💪";sub="解説を読み直してから続きへ。";}
  else {msg="ここから伸びる！🌱";sub="解説を読みながらもう一周がおすすめ。";}
  // 本ごとの合否判定
  if(profile && s.mode==="mc"){
    const msgs=evaluateBooks([...new Set(s.qs.map(q=>q.b))]);
    if(msgs.length) sub = msgs.join("　");
  }
  if(profile && s.mode==="retest"){
    const b=s.book;
    if(pct>=GOAL_PCT){
      const B=loadB(); const st=bookState(B,b);
      st.cleared=true; st.wrongs=null; B[b]=st; saveB(B);
      msg="🏆『"+BOOK_LABEL[b]+"』制覇！！";
      sub="一次テスト合格＋直しテスト"+pct+"%。次の本へ進もう！";
    } else {
      msg="📝 直しテスト "+pct+"%…";
      sub="制覇は"+GOAL_PCT+"%から。解説を読み直して、もう一度直しテストに挑戦！";
    }
  }
  $("rMsg").textContent=msg; $("rSub").textContent=sub;
  // 復習（間違いのみ）
  const wrong=s.answers.filter(a=>!a.ok);
  const R=$("review");
  if(wrong.length){
    R.innerHTML="<h3>復習（まちがえた "+wrong.length+" 問）</h3>"+wrong.map(a=>
      '<div class="rev-item"><div class="q">Q. '+a.q+'</div>'
      +'<div>あなた：<span class="y">'+a.your+'</span></div>'
      +'<div>正解：<span class="a">'+a.correct+'</span></div>'
      +'<div style="margin-top:6px;color:#445;">'+a.e+'</div></div>').join("");
  } else {
    R.innerHTML='<h3>全問正解！復習はありません 🎉</h3>';
  }
  show("result");
}
$("againBtn").onclick=()=>{ renderStart(); $("startBtn").click(); };
$("homeBtn").onclick=()=>{ session=null; renderStart(); show("start"); };

/* 初期化 */
renderStart();
</script>
