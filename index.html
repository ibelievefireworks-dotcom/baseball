<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b3d2e">
<title>配球クイズ ⚾</title>
<style>
  :root{
    --bg:#0b3d2e; --bg2:#0f5740; --card:#ffffff; --ink:#1a2a26;
    --muted:#6b7d77; --line:#e3eae7; --accent:#2e8b57; --accent2:#1f6b41;
    --gold:#e8b53b; --ok:#1f9d55; --okbg:#e8f7ee; --ng:#d8473b; --ngbg:#fdecea;
    --shadow:0 8px 30px rgba(0,0,0,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    min-height:100vh; min-height:100dvh;
    display:flex; justify-content:center;
    padding:env(safe-area-inset-top) 12px calc(env(safe-area-inset-bottom) + 12px);
  }
  .app{width:100%; max-width:560px; margin:auto 0;}
  .wrap{padding:18px 0 8px;}

  /* header */
  .brand{text-align:center; color:#fff; margin:14px 0 18px;}
  .brand .ball{font-size:40px; line-height:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));}
  .brand h1{font-size:26px; margin:6px 0 2px; letter-spacing:.04em;}
  .brand p{margin:0; font-size:13px; opacity:.85;}

  .card{background:var(--card); border-radius:20px; box-shadow:var(--shadow); padding:20px; }

  h2.sec{font-size:15px; margin:2px 0 12px; color:var(--accent2); display:flex; align-items:center; gap:8px;}
  h2.sec::before{content:""; width:5px; height:18px; background:var(--gold); border-radius:3px;}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    border:1.5px solid var(--line); background:#fff; color:var(--ink);
    border-radius:999px; padding:8px 14px; font-size:13px; cursor:pointer;
    transition:.15s; user-select:none; font-weight:600;
  }
  .chip small{font-weight:400; color:var(--muted); margin-left:4px;}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff;}
  .chip.on small{color:rgba(255,255,255,.8);}
  .chip.book{border-color:var(--accent2); color:var(--accent2);}
  .chip.book.on{background:var(--accent2); color:#fff;}
  .catgroup{margin-bottom:14px;}
  .catgroup:last-child{margin-bottom:0;}
  .cathead{font-size:12.5px; font-weight:800; color:var(--accent2); margin:0 0 7px 2px; display:flex; align-items:center; gap:6px;}
  .cathead::before{content:""; width:8px; height:8px; border-radius:2px; background:var(--gold);}
  /* 進捗ダッシュボード */
  .goal{font-size:12.5px; color:var(--muted); margin:8px 2px 10px; line-height:1.6;}
  .drow{display:flex; align-items:center; gap:8px; font-size:12.5px; margin-bottom:7px;}
  .drow .nm{width:9.5em; font-weight:700; line-height:1.3;}
  .dbarw{flex:1; height:9px; background:#eef2f0; border-radius:99px; overflow:hidden;}
  .dbar{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width .4s;}
  .drow .pc{width:7.5em; text-align:right; color:var(--muted); font-weight:700; font-size:11.5px;}
  .btn.review{background:linear-gradient(135deg,#b7791f,#e8b53b); box-shadow:0 6px 16px rgba(184,121,31,.35); font-size:15px; padding:13px;}

  .row{display:flex; gap:8px; margin-top:8px;}
  .ghost{background:transparent;border:1.5px solid var(--line);color:var(--muted);border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer;}

  .opts{display:flex; gap:8px; flex-wrap:wrap;}
  .opt-num{flex:1; min-width:64px;}
  .seg{display:flex; border:1.5px solid var(--line); border-radius:12px; overflow:hidden;}
  .seg button{flex:1; border:0; background:#fff; padding:10px 4px; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer;}
  .seg button.on{background:var(--accent); color:#fff;}

  .btn{
    display:block; width:100%; border:0; border-radius:14px; cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
    font-size:18px; font-weight:800; padding:16px; margin-top:16px; letter-spacing:.05em;
    box-shadow:0 6px 16px rgba(31,107,65,.4); transition:.12s;
  }
  .btn:active{transform:translateY(1px); box-shadow:0 3px 8px rgba(31,107,65,.4);}
  .btn.lite{background:#fff;color:var(--accent2);border:2px solid var(--accent);box-shadow:none;}

  /* quiz */
  .topbar{display:flex; align-items:center; justify-content:space-between; color:#fff; margin:6px 2px 12px; font-size:13px;}
  .topbar .quit{background:rgba(255,255,255,.15); border:0; color:#fff; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer;}
  .pbar{height:8px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden; margin:0 2px 14px;}
  .pbar i{display:block; height:100%; background:var(--gold); width:0; transition:width .3s;}

  .qmeta{font-size:12px; color:var(--muted); margin-bottom:6px; display:flex; gap:8px; flex-wrap:wrap;}
  .tag{background:#eef5f1; color:var(--accent2); border-radius:6px; padding:2px 8px; font-weight:700;}
  .qtext{font-size:19px; font-weight:700; line-height:1.5; margin:4px 0 16px;}

  .answers{display:flex; flex-direction:column; gap:10px;}
  .ans{
    text-align:left; border:2px solid var(--line); background:#fff; color:var(--ink);
    border-radius:14px; padding:14px 14px 14px 46px; font-size:15.5px; line-height:1.45;
    cursor:pointer; position:relative; transition:.12s; font-weight:600;
  }
  .ans .mk{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:24px;height:24px;border-radius:50%;
    border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--muted); font-weight:800;}
  .ans:active{border-color:var(--accent);}
  .ans.correct{background:var(--okbg); border-color:var(--ok);}
  .ans.correct .mk{background:var(--ok); border-color:var(--ok); color:#fff;}
  .ans.wrong{background:var(--ngbg); border-color:var(--ng);}
  .ans.wrong .mk{background:var(--ng); border-color:var(--ng); color:#fff;}
  .ans.dim{opacity:.55;}
  .ans[disabled]{cursor:default;}

  .explain{margin-top:14px; background:#f6faf8; border:1px solid var(--line); border-left:5px solid var(--accent); border-radius:10px; padding:12px 14px; font-size:14px; line-height:1.6; display:none;}
  .explain.show{display:block; animation:fade .25s;}
  .explain b{color:var(--accent2);}
  .explain .src{display:block; margin-top:6px; font-size:11.5px; color:var(--muted);}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

  /* result */
  .result{text-align:center;}
  .score-ring{width:160px;height:160px;margin:6px auto 10px; position:relative;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .score-ring .num b{font-size:42px; line-height:1; color:var(--accent2);}
  .score-ring .num span{font-size:13px; color:var(--muted);}
  .rmsg{font-size:18px; font-weight:800; margin:4px 0 2px;}
  .rsub{font-size:13px; color:var(--muted); margin-bottom:10px;}
  .review{text-align:left; margin-top:16px;}
  .review h3{font-size:14px; color:var(--accent2); margin:0 0 8px;}
  .rev-item{border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; font-size:13.5px; line-height:1.5;}
  .rev-item .q{font-weight:700; margin-bottom:6px;}
  .rev-item .a{color:var(--ok); font-weight:700;}
  .rev-item .y{color:var(--ng); font-weight:700;}
  .foot{text-align:center; color:rgba(255,255,255,.6); font-size:11px; margin:16px 0 4px; line-height:1.6;}
  #timerWrap{margin:0 0 12px;}
  .tbar{height:10px;background:#eef2f0;border-radius:99px;overflow:hidden;}
  .tbar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#1f9d55,#e8b53b);transition:width .1s linear;}
  .tnum{text-align:right;font-size:12px;color:var(--muted);margin-top:3px;font-weight:800;}
  .tbar.low i{background:var(--ng);}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app">
  <div class="wrap">
    <div class="brand">
      <div class="ball">⚾</div>
      <h1>配球クイズ</h1>
      <p>配球・捕手の名著をクイズで学ぶ</p>
    </div>

    <!-- ========== START ========== -->
    <div id="start" class="card">
      <h2 class="sec">プレイヤーと進捗</h2>
      <div class="chips" id="profChips"></div>
      <div class="goal" id="goalNote"></div>
      <div id="dash"></div>
      <button class="btn review hidden" id="reviewBtn"></button>
      <button class="btn lite hidden" id="starBtn" style="font-size:15px;padding:13px;margin-top:10px;"></button>
      <button class="btn hidden" id="voiceBtn" style="font-size:15px;padding:13px;margin-top:10px;">🎤 言語化に挑戦（声に出して説明）</button>

      <h2 class="sec" style="margin-top:18px;">本をえらぶ</h2>
      <div class="chips" id="bookChips"></div>
      <h2 class="sec" style="margin-top:18px;">章をえらぶ</h2>
      <div id="catChips"></div>
      <div class="row">
        <button class="ghost" id="selAll">この本の全章をえらぶ</button>
        <button class="ghost" id="selNone">解除</button>
      </div>

      <button class="btn" id="startBtn">スタート ▶（選んだ章をぜんぶ出題）</button>
      <p id="poolInfo" style="text-align:center;color:var(--muted);font-size:12px;margin:12px 0 0;"></p>
    </div>

    <!-- ========== QUIZ ========== -->
    <div id="quiz" class="hidden">
      <div class="topbar">
        <button class="quit" id="quitBtn">✕ やめる</button>
        <div><span id="qpos">1</span> / <span id="qtotal">10</span></div>
        <div>正解 <b id="scoreNow">0</b></div>
      </div>
      <div class="pbar"><i id="pbarFill"></i></div>
      <div class="card">
        <div id="timerWrap" class="hidden"><div class="tbar"><i id="tFill"></i></div><div id="tNum" class="tnum"></div></div>
        <div class="qmeta" id="qmeta"></div>
        <div class="qtext" id="qtext"></div>
        <div class="answers" id="answers"></div>
        <div class="explain" id="explain"></div>
        <div class="row" style="gap:8px;">
          <button class="btn lite hidden" id="prevBtn" style="flex:1;">◀ もどる</button>
          <button class="btn hidden" id="nextBtn" style="flex:1;">次の問題 ▶</button>
        </div>
      </div>
    </div>

    <!-- ========== RESULT ========== -->
    <div id="result" class="hidden">
      <div class="card result">
        <div class="score-ring">
          <svg width="160" height="160">
            <circle cx="80" cy="80" r="70" fill="none" stroke="#e3eae7" stroke-width="14"/>
            <circle id="ring" cx="80" cy="80" r="70" fill="none" stroke="#2e8b57" stroke-width="14" stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="439.8"/>
          </svg>
          <div class="num"><b id="rPct">0%</b><span id="rFrac">0 / 0</span></div>
        </div>
        <div class="rmsg" id="rMsg"></div>
        <div class="rsub" id="rSub"></div>
        <button class="btn" id="againBtn">もう一度（同じ範囲）</button>
        <button class="btn lite" id="homeBtn">範囲を選びなおす</button>

        <div class="review" id="review"></div>
      </div>
      <div class="foot">
        個人学習用 ⚾ 「実戦シナリオ」「応用」は各書の配球原則を状況に応用した問題です<br>出典：『配球の極意』(実業之日本社)／『配球学・リード術』(野村克也・克則／旬報社)<br>『野村ノート』(野村克也／小学館文庫)／『野球配球IQドリル』(野口寿浩監修／メイツ出版)<br>『工藤公康 配球とは』(工藤公康／PHPエディターズ・グループ)
      </div>
    </div>

  </div>
</div>

<script>
/* ============================================================
   問題バンク
   b = 書籍 ("極意" | "リード術")  / c = 章カテゴリ
   q = 問題 / o = 選択肢 / a = 正解index(シャッフル前) / e = 解説 / p = 出典ページ
   ============================================================ */
const BANK = [
/* ===== 実戦シナリオ（両書の配球原則を状況に応用） ===== */
// 実戦｜打者タイプで攻める
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"ドアスイング（バットが体から遠回りする）の打者。最も安全に攻めたいコース・球種は？",o:["インコース低め（ひざ元）の速球・シュート系","アウトコース低めのカーブ","高めの真っ直ぐ","ど真ん中のスライダー"],a:0,e:"ドアスイングは内角が詰まる。インコース高めはファウルになりやすく、ひざ元（低め）が安全ゾーン。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"アッパースイングの強打者を振り遅れさせたい。要求すべきは？",o:["高めのインコースへ速いストレート","低めの落ちる球","外角の緩いカーブ","真ん中のチェンジアップ"],a:0,e:"バットが下から出るため高めの速球に振り遅れる。ただし甘い高め・抜け球は長打に注意。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"基本に忠実なスクエアスタンスのアベレージヒッター。攻めの軸は？",o:["アウトコース低めのストレート・変化球＋緩急","内角高めの速球一辺倒","真ん中で力勝負","ボール球で歩かせる"],a:0,e:"基本に忠実な打者には外角低めを軸に、緩急を加えてタイミングを外す。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"長距離砲（パワーヒッター）。2ストライクまで追い込んだ後の勝負球は？",o:["思い切ってインコース低め・ひざ元","外角高めの甘いストレート","真ん中のスライダー","高めのボール球で釣る"],a:0,e:"長く持つ打者・パワーヒッターは追い込んでからインロー・ひざ元へ。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"右投手 対 左打者。食い込ませて詰まらせる「クロスファイア」のコースは？",o:["左打者のインコース（内角）へ食い込ませる","外角低めへ逃がす","高めのボール球","真ん中の変化球"],a:0,e:"左投手→右打者、右投手→左打者へズバッと食い込ませる内角が有効。",p:"『極意』第4章 打者タイプ別"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"C型（器用型・配球を読んでくる）打者。最も避けたいのは？",o:["単調で読まれやすい“三拍子”のリード","内角を1球見せること","緩急を多用すること","初球から変化球"],a:0,e:"器用な打者には単調なリードは禁物。三拍子のような型は読まれて危険信号。",p:"『リード術』上級編 打者4分類"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"D型（不器用型・真っ直ぐか変化球どちらか狙い）打者への基本方針は？",o:["狙っていない方の球種で打ち取る","必ず真っ直ぐで押す","必ず変化球で攻める","全球を内角に集める"],a:0,e:"狙いがどちらかに偏るため、逆の球種で打ち取る。",p:"『リード術』上級編 打者4分類"},
{b:"実戦",c:"実戦｜打者タイプで攻める",q:"打者のタイプ（A〜D）は遅くともいつまでに見極めたい？",o:["2打席目まで","初球で","3打席目以降で","試合終盤で"],a:0,e:"右目で球、左目で打者の反応を見て、遅くとも2打席目までにタイプを掴む。",p:"『リード術』上級編 打者4分類"},

// 実戦｜カウントで組み立てる
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"カウント3ボール0ストライク（投手不利）。打者の狙いを踏まえた無難な配球は？",o:["変化球でストライクを取る","内角高めの速球","ど真ん中のストレート","ボール球で誘う"],a:0,e:"不利カウントで打者はほぼストレート狙い。置きにいける変化球でストライクを取るのが無難。",p:"『極意』第2章／『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"1ボール1ストライク（バッテリー有利）。打ち気の打者をどう誘う？",o:["低めのゴロゾーン（ボールになる落ちる球）で誘う","ど真ん中で勝負","高めの釣り球で歩かせる","必ずストライクを取りにいく"],a:0,e:"打者は追い込まれたくなく早めに手を出す→低めの誘い球でゴロを打たせる。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"2ストライクと追い込んだ。やってはいけないのは？",o:["1球を大きく外しすぎる／甘い球を置きにいく","高めの釣り球を見せる","内角を厳しく突く","落ちる球で空振りを狙う"],a:0,e:"球数に余裕があるので急がない。大きく外さず、高めや内角で次に生かす。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"初球。カウントを有利に運ぶ考え方として適切なのは？",o:["ストライクから入り、早めに追い込む","必ずボールから入る","初球は必ず変化球","初球は捨て球にする"],a:0,e:"早めに追い込み、安全ゾーンで勝負する形に持っていく。",p:"『極意』第2章"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"ストライクを“稼ぐ”ためのカウント球。無難なコースは？",o:["外角","内角ぎりぎり","高め","真ん中"],a:0,e:"カウント球は外角が無難。打者を“仕留める”勝負球と使い分ける。",p:"『リード術』基礎編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"フルカウント（3-2）。最も避けたい結果は？",o:["四球","ファウル","内野ゴロ","空振り三振"],a:0,e:"四球だけは避ける。最低2球先まで考え、テンポよく。",p:"『リード術』上級編"},
{b:"実戦",c:"実戦｜カウントで組み立てる",q:"追い込む前のカウントで絶対に避けたいのは？",o:["甘い「危険ゾーン」へ置きにいく","際どいボール球","内角を見せる","緩急をつける"],a:0,e:"追い込む前に甘い危険ゾーンへ置きにいかない。安全ゾーンで勝負する。",p:"『極意』第2章"},

// 実戦｜走者・アウトの状況
{b:"実戦",c:"実戦｜走者・アウトの状況",q:"1アウト三塁・同点。犠牲フライを絶対に防ぎたい。狙う打球は？",o:["内野フライ・ゴロ・三振（外野へ飛ばさせない）","浅い外野フライ","ライナー","どんな打球でもよい"],a:0,e:"三塁走者・サヨナラ場面では犠飛厳禁。外野に運ばせない組み立てにする。",p:"『極意』第5章"},
{b:"実戦",c:"実戦｜走者・アウトの状況",q:"1アウト三塁。犠飛を防ぐために有効な球は？",o:["内角高めの速球／低めの落ちる変化球","外角高めの甘い球","真ん中のスライダー","高めのボール球"],a:0,e:"詰まらせて内野フライ・ゴロ・三振を狙う。ストライクからボールへ落ちる球も有効。",p:"『極意』第5章"},

{b:"IQドリル",c:"IQ｜打者タイプ別",q:"インコースが得意な「読み」の打者にも、どこかのタイミングでインコースを突く理由は？",o:["反応を見て次の狙い球を読むため","意地を見せるため","死球を狙うため","理由はない"],a:0,e:"駆け引きと洞察力の勝負。反応が次の1球の根拠になる。",p:"p.34"},
{b:"IQドリル",c:"IQ｜打者タイプ別",q:"一発の長打力はあるがムラのある打者。攻め方の基本は？",o:["はっきりしている苦手なコース・球種を根気よく投げ続ける","得意コースで真っ向勝負","全球歩かせ気味に","毎回初球ストライクから"],a:0,e:"このタイプは苦手がはっきりしていることが多い。投げ続けられる制球力も磨いておく。",p:"p.36-37"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"選球眼に優れた打者を抑えるのに必要な技術は？",o:["コースを1球ごとに数センチずらせるコントロールの調整力","とにかく球速","大きく曲がる変化球だけ","牽制のうまさ"],a:0,e:"ゾーン内で完結せず、ストライク⇔ボールに出入りする変化球と高低の幅も使う。",p:"p.38"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"どんな好打者でも見極めが難しいのは？",o:["高低の選球","内外の選球","球種の見分け","スピードの変化"],a:0,e:"だから高さの幅を有効に使うべき。",p:"p.38"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"3割打者が3人連続でヒットを打つ「三連打」の確率は？",o:["約2.7%","約30%","約10%","約50%"],a:0,e:"連打での失点は実は起きにくい。だからこそ「もらった出塁」が怖い。",p:"p.40"},
{b:"IQドリル",c:"IQ｜選球眼・出塁の考え方",q:"エラーや四球の走者が本当に怖い理由は？",o:["攻撃側が「もらった出塁」と考え、盗塁や送りバントなど思い切った作戦を仕掛けてくるから","走者の足が速くなるから","守備が動揺するから","失点が記録につかないから"],a:0,e:"走者三塁を作られると内野ゴロ・犠飛・パスボールでもヒットなしで失点する。",p:"p.40"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"同じ外角へのストレートでも「意味が変わる」のはなぜ？",o:["初球なのか3-2の勝負球なのか、カウントで投手と打者の心理が変わるから","天候が変わるから","球速が変わるから","捕手の構えが変わるから"],a:0,e:"カウント別の心理を理解すると配球の意図が読めるようになる。野手や走者とも共有したい要素。",p:"p.42-43"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-0の初球、コントロールに自信がない投手に投げさせるべきは？",o:["リスクの小さいコースへ、投手が自信を持っているボール","厳しいコースへ難しいボール","真ん中にストレート","ワンバウンドの変化球"],a:0,e:"立ち上がりは投手も難しい。難しい球ではなく自信のある球でカウントを整える。",p:"p.44"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"過去の対戦で打ち取ったことがある打者への効果的な入り方は？",o:["打ち取ったボールの「残像」で勝負する（詰まらせたなら変化球、泳がせたならストレート）","毎回逆の球から入る","必ずボールから入る","過去は参考にしない"],a:0,e:"打者の記憶に残っている結果球を利用する。",p:"p.44"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-1（1ストライク）で打者に働きやすい心理は？",o:["「追い込まれたくない、その前に打ちたい」という積極性","慎重に見送りたい","バントしたい","何も考えない"],a:0,e:"だからストライクを投げ急がず、ストライクからボールになるゾーンで誘う。",p:"p.45-46"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"制球に自信がある投手の0-1。ゾーンの使い方のイメージは？",o:["ストライクゾーンの内外をそれぞれ15cmずつ広げるイメージで使う","ゾーンのど真ん中だけ","ゾーンを狭く絞る","高めだけを使う"],a:0,e:"先手を取れた優位性を生かし、ボールゾーンも含めて広く攻める。",p:"p.46"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-2で「とりあえず1球外す」がNGな理由は？",o:["①ストライクを取る②追い込む③仕留める、のどれにも当てはまらない無駄な1球だから","ルール違反だから","捕手が疲れるから","観客が退屈するから"],a:0,e:"外すなら高めの釣り球→フォーク、内角厳しく→外角勝負のように、次への伏線となる意味のあるボール球にする。",p:"p.47-48"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"0-2に追い込まれた打者は、どんな割合で球を待っている？",o:["8:2か7:3くらいの割合でストレート待ち","10:0で変化球待ち","5:5で待つ","何も待たない"],a:0,e:"不利な状況でフルスイングは難しく、コンパクトにミートしてくる。だから裏をつく変化球が有効。",p:"p.48"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-0からストライクを取る3つの手段とは？",o:["見逃し・空振り・ファウル","見逃し・敬遠・ボーク","空振りだけ","ファウルだけ"],a:0,e:"芯で捉えられても明らかなファウルなら問題ない。打ってもファウルになるコースに投げきれるかがカギ。",p:"p.49-50"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-0で走者一塁、盗塁が想定される場面の配球は？",o:["キャッチャーが二塁に投げやすい外角に配球する","内角に集める","ワンバウンドの変化球","高めのボール球だけ"],a:0,e:"ボール球を使いにくいカウントでも、送球のしやすさまで考えてコースを選ぶ。",p:"p.50"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-1の平行カウント、実はやや有利なのはどっち？",o:["バッテリー（打者の反応を2球分見ているから）","打者","完全に五分","審判次第"],a:0,e:"2球分の情報がある。打ち気の打者にはギリギリの誘い球やチェンジアップが効く。",p:"p.51-52"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"1-2に追い込むと打者に起こる変化は？",o:["ヤマを張る余裕がなくなり、ストライクゾーンが少し広がる","集中力が上がって強くなる","必ず見逃してくる","バントに切り替える"],a:0,e:"ボール球でも振ってくれる状況。ウイニングショット・苦手攻め・伏線のボール球の3択で仕留める。",p:"p.53-54"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-0の打者は絶好のチャンス。そこに生まれやすいスキは？",o:["油断して甘い真っ直ぐ一本に絞ってくること","慎重になりすぎること","バントを考えること","集中しすぎること"],a:0,e:"だからストライクを取れる変化球をゾーンに投げ込めれば、あっさりカウントを稼げる。",p:"p.55"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-0で守備側が絶対に避けたいのは？",o:["四球（ヒットはしかたないという割り切りも必要）","ヒット","ファウル","時間がかかること"],a:0,e:"甘い球は必ず狙われている。割り切って四球だけは避ける。",p:"p.56"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-1は重要な分岐点。ボールゾーンに振らせる攻めをする条件は？",o:["3-1になるリスクを理解し、打開できるコントロールがあること","打者が弱いこと","味方がリードしていること","条件はない"],a:0,e:"成功すればヒットの確率を下げられるが、失敗すれば圧倒的不利な3-1。リスクと制球のセットで判断する。",p:"p.57-58"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"2-2で走者一塁。バッテリーがフルカウントを避けたい大きな理由は？",o:["3-2では走者がオートマチックスタートになるから","球数が増えるから","観客が飽きるから","サインが複雑になるから"],a:0,e:"だから2-2が勝負所。その日一番調子の良い球か、最も自信のあるウイニングショットで仕留める。",p:"p.59"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"「フルカウントにしたくない」という思いが先行すると起きやすいのは？",o:["かえってコントロールを乱す","球速が上がる","制球が良くなる","打者が油断する"],a:0,e:"追い込まれた打者は変化球も意識している。速球派なら強い意志でストレートを投げ込む。",p:"p.60"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-0はほとんどの打者に「待て」が出る。バッテリーがすべきことは？",o:["ミットを真ん中に構え、ストライクの入る球でまず1つ取る","際どいコースを狙い続ける","1球外して様子を見る","申告敬遠する"],a:0,e:"ストレートの四球だけは避ける。打ちにくる打者はゾーンを上げて甘い球だけを狙ってくる点に注意。",p:"p.61-62"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-1の打者はストレート1本に絞っていることが多い。そこで意外と有効なのは？",o:["多少甘いコースでも変化球（あっさりストライクが取れることがある）","もっと速いストレート","敬遠","ワンバウンドの釣り球"],a:0,e:"変化球でも腕の振りをゆるめないこと。強気のストレートで意表を突く手もある。",p:"p.63-64"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-1で変化球を要求するときキャッチャーが投手に送るべきメッセージは？",o:["「腕を振れ」（置きにいくな）のジェスチャー","「ゆっくり投げろ」","「外していい」","「好きにしろ」"],a:0,e:"置きにいった変化球が一番危ない。サインに首を振る\"演出\"で打者に考えさせる手も有効。",p:"p.64"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-1で打者側に働きやすい心理は？",o:["四球がちらつき「凡打したらもったいない」と消極的になる","強気一辺倒になる","バントしたくなる","何も変わらない"],a:0,e:"圧倒的有利なのにプレッシャーがかかる。守る側はこの心理も利用できる。",p:"p.64"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"フルカウント（3-2）の打者が持ちがちな思い込みは？",o:["「必ずストライクが来る」","「必ずボールが来る」","「必ず敬遠される」","「必ず牽制が来る」"],a:0,e:"だから見ていない落ちるボールがあるなら効果大。ストライクからボールに落とせれば大ケガはない。",p:"p.65-66"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-2で最良の結果は三振。だが歩かせてしまった場合の考え方は？",o:["次の打者と0-0から勝負できる。勝ちを急がない","失敗として引きずる","次も同じ配球をする","守備位置を下げる"],a:0,e:"打球がヒットゾーンに飛ぶリスクより、仕切り直しの方がましな場面がある。",p:"p.66"},
{b:"IQドリル",c:"IQ｜カウント別配球",q:"3-2の勝負球を選ぶ最大の材料は？",o:["3-2になるまでの過程で得た情報（狙い・タイミング・見せていない球種）","運","相手ベンチの声","観客の応援"],a:0,e:"どのような過程でフルカウントになったのかがすべて。醍醐味のカウント。",p:"p.65-66"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"牽制球の本当の役割は？",o:["走者をアウトにすることではなく、相手の出方をうかがうこと","走者を必ず刺すこと","時間を稼ぐこと","投手の肩慣らし"],a:0,e:"牽制への帰塁や打者の構えの反応から、相手の戦術を予測する材料を得る。",p:"p.70"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"走者一塁で「走者を意識しすぎる」とどうなる？",o:["打者への投球がおろそかになり、ボール先行で相手の戦術の幅を広げてしまう","牽制が上手くなる","打者が萎縮する","何も起きない"],a:0,e:"警戒はしてもノーマークにしない程度に。勝負の主戦場はあくまで打者。",p:"p.70"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"盗塁が想定される場面の基本の配球は？",o:["キャッチャーが二塁へ送球しやすい外角","内角","真ん中低め","ワンバウンド"],a:0,e:"外角偏重を読まれそうなら、思い切って内角を突く駆け引きも。",p:"p.70"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"打者が最もバントしにくい球は？",o:["球筋が近く感じるインコースのストレート","腕が伸びるアウトコース","緩いカーブ","低めの変化球"],a:0,e:"高めはフライやファウルを打たせ、低めで空振りを狙える。アウトコースは避けたい。",p:"p.74"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二死一塁が「走者ありで最も得点が入りにくい」理由は？",o:["得点には少なくとも単打2本が必要だから","走者が走れないから","打者が弱いから","守備が有利なシフトを組めるから"],a:0,e:"だから過度にピンチと意識せず、打者を抑えることに集中してよい場面。",p:"p.71"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二死一塁で盗塁を決められたときの正しいメンタルは？",o:["「この打者を抑えればチェンジ」というゆとりを持つ","動揺して牽制を増やす","焦って速球一辺倒","タイムを取って説教"],a:0,e:"セットポジションで走者を見るだけでも警戒は示せる。惑わされないこと。",p:"p.72"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"四球やエラーで出塁した走者が仕掛けやすい心理的理由は？",o:["「もともとアウトの計算だった走者」なので思い切れるから","足が速くなるから","相手が油断するから","サインが増えるから"],a:0,e:"攻撃側は「もらった出塁」と考え、盗塁などの思い切った作戦に出やすい。",p:"p.72"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"無死一・二塁で守備側が理想とするゴロは？",o:["右打者に引っ張らせた三遊間へのゴロ（サードゴロ・ショートゴロ）","一二塁間へのゴロ","投手前のゴロ","捕手前のゴロ"],a:0,e:"二塁走者の背中側（一塁側）へのゴロは進塁打になり併殺が取りにくい。",p:"p.73-74"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"バントシフトの基本の動きは？",o:["サードとファーストが前進、ショートが二塁・セカンドが一塁のベースカバー","全員が前進","外野も内野に入る","誰も動かない"],a:0,e:"投手も投球後に打球方向へダッシュしてカバーし合う。",p:"p.74"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"無死二塁。打者は「最悪でも進塁打」と考えている。右打者への攻めは？",o:["インコース中心（右方向へ流させない）","アウトコース中心","真ん中で勝負","高めのボール球だけ"],a:0,e:"外角は右方向へおっつけられて進塁打になりやすい。『配球の極意』とも一致するセオリー。",p:"p.76"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二死二塁、一打サヨナラ級の場面での投球方針は？",o:["外野の頭を越される球は避け「ゴロのヒットならしょうがない」と割り切る","三振だけを狙う","高めで勝負する","申告敬遠一択"],a:0,e:"外野は前進守備。最悪の一打（長打）だけを消す。",p:"p.75"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"三塁走者ありでスクイズを警戒すべきなのは？",o:["無死・一死の早いカウント（追い込めば相手の選択肢を1つ消せる）","二死のとき","フルカウントだけ","警戒は不要"],a:0,e:"追い込んでしまえばスクイズはなくなるが、今度は犠飛のリスクが出る。",p:"p.77"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"三塁走者ありでフォークなど落ちる球を「使いにくい」と考えがちだが、本書の考えは？",o:["日頃から止める練習をしているはずだから、積極的に使うことも大事","絶対に使ってはいけない","高めに投げれば安全","走者を無視してよい"],a:0,e:"パスボールを怖がって武器を封印しない。",p:"p.78"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"スクイズ狙いの打者に有効な2球種は？",o:["インコース高めのストレート（空振り）→アウトコース低めの変化球（ポップフライ）","外角高め→内角低め","真ん中の速球2連投","緩いカーブ2連投"],a:0,e:"内角高めは体が早く開いて空振りしやすく、その後の外低め変化球は手打ちのフライになりやすい。",p:"p.78"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"一・三塁でのダブルスチール（重盗）への守備側の対応は？",o:["捕手の二塁送球を投手かセカンドがカットし、三塁走者の生還を防ぐ","必ず二塁で刺す","送球しない","タイムをかける"],a:0,e:"一・三塁は最も頭を働かせる局面。初球〜3球目の仕掛けに要注意。",p:"p.82"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"二・三塁で1点はOKという場面の考え方は？",o:["三塁走者は捨て、二塁走者をホームに帰さない配球と守備位置を考える","0点に抑えることだけ考える","満塁にしてはいけない","全員前進守備一択"],a:0,e:"状況次第では次打者の力が落ちるなら敬遠して満塁策も。欲しいのは三振か内野フライ。",p:"p.79-80"},
{b:"IQドリル",c:"IQ｜走者状況別",q:"満塁のピンチでバッテリーが立つべき心構えは？",o:["走者を気にせずバッター勝負に全力を注ぐ","全走者に牽制する","ボール球で様子を見る","スクイズだけ警戒する"],a:0,e:"攻撃側が仕掛けられる作戦は奇襲のスクイズくらい。フォアボールとパスボールだけが自滅の道。",p:"p.83"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"打者が配球を読むときの「軸」になるバッテリーの基本とは？",o:["長打の確率が低いアウトコース＋最も対応しにくい速いストレートが配球の基本","内角の変化球が基本","真ん中の緩い球が基本","決まった基本はない"],a:0,e:"この基本を軸に、投手の持ち球・走者の状況・タイミングの合い方から次の球を予測する。守る側は読みの軸を知っておく。",p:"p.88"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"初球の外角ストレートに打者のタイミングが合っていた。打者に成り立つ読みは？",o:["「同じボールは続けにくい→次は変化球かな」","「次も必ず同じ球」","「次は敬遠」","読みは成り立たない"],a:0,e:"逆に捕手側は、変化球に踏み込まれたくなければ内角ストレートも選択肢。1球ごとに読み合いが動く。",p:"p.89"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"盗塁が想定される場面で投げにくい球種は？",o:["変化球","速いストレート","外角の速球","高めの釣り球"],a:0,e:"だから走者側は「変化球が来そうなカウント」が有利に働く。攻守両方で使える知識。",p:"p.89,100"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"バッテリーが打者の読みを外すのに必要なのは？",o:["コースか球種のどちらか一方を外せば十分","コースと球種の両方を外す必要がある","球速だけ変えればよい","外す必要はない"],a:0,e:"どちらかを外せれば十分なスイングをさせずに抑える確率が上がる。3割打者も7割は失敗する——抑えて当たり前の気持ちで。",p:"p.89"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"バントシフトでチャージされたときの送りバントのコツは？",o:["来たボールに逆らわず、ファーストかサードに取らせるゴロを転がす","強く押し出して野手の間を狙う","必ず投手の正面へ","高く浮かせる"],a:0,e:"強すぎるバントは二塁でフォースアウトにされる。一塁走者のスタートも大事。",p:"p.90"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"進塁打の難易度が右打者より左打者の方が高い理由は？",o:["左打者の進塁打は一二塁間へのゴロで、外中心の配球に対して強引に引っ張る必要があるから","左打者は非力だから","ルール上不利だから","理由はない"],a:0,e:"右打者は外角ストレートを右方向におっつければよい。守る側はこの差も頭に入れる。",p:"p.93"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"ヒットエンドランを仕掛けやすいカウントは？",o:["平行カウント以上、できれば打者有利のカウント","ボール球や決め球が来そうなカウント","0-2","3-0"],a:0,e:"ボール球・決め球が来るカウントではヒットゾーンに打つのが難しく、併殺のリスクも大きい。守る側はカウント負けすると相手に作戦の幅を与える。",p:"p.94-95"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"スクイズを仕掛けやすいのはどんなカウント？",o:["バッテリーが不利なカウント（ストライクの確率が上がるから）","バッテリーが有利なカウント","0-2だけ","カウントは無関係"],a:0,e:"守る側は相手ベンチの動きを警戒し、ときには大胆にボール球で外す。追い込んでもスリーバントスクイズがある。",p:"p.96-97"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"スクイズが決まった後も守備側に残る危険は？",o:["一塁アウトに緩慢な動きをすると俊足の二塁走者まで還るツーランスクイズ","特にない","ボーク","打者の再打席"],a:0,e:"1点で終わらせるか2点になるかは締めの動きひとつ。",p:"p.97"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"「1点まではOK」の場面の内野の守備隊形は？",o:["定位置と前進の間の中間守備でダブルプレーを狙う","全員前進","全員定位置","極端な引っ張りシフト"],a:0,e:"これ以上傷を広げないことを優先し、併殺で流れを取り戻す。1点も渡せないなら前進バックホーム体制。",p:"p.98-99"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"攻撃側の「走るぞ走るぞ」という見せかけの効果は？",o:["相手にストレート系を多く投げさせ、打者の配球読みの材料にできる","特に意味はない","ボークを誘える","守備が下がる"],a:0,e:"盗塁の圧力は配球を縛る。守る側は縛られすぎないバランスが必要。",p:"p.100"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"牽制で相手の裏をつくテクニックは？",o:["最初はゆっくりしたフォームで牽制し、続けて速いフォームで投げる","毎回同じ速さで投げる","牽制は1回だけと決める","偽投を続ける"],a:0,e:"セットで長くボールを持ってから牽制し、打者の構えの変化（バントの気配）もチェックする。",p:"p.106-107"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"当たっている7番打者との勝負で「やってはいけない」のは？",o:["「振ってくれたら儲けもの」という歩かせ気味の中途半端な配球","明確に勝負すること","明確に歩かせること","申告敬遠"],a:0,e:"中途半端な球は甘くなって打たれる。歩かせるか勝負するかを明確にする。",p:"p.108-109"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"あえて敬遠で塁を埋める守備側のメリットは？",o:["フォースアウトが可能になり守りやすくなる","失点が減る記録上の得","相手の士気が下がる","特にない"],a:0,e:"作戦を明確にすることで「次の打者と勝負」という気持ちの切り替えもできる。球数制限のあるアマ野球では申告敬遠で投手の疲労も減らせる。",p:"p.109"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"前進守備の満塁でゴロが飛んだときの最優先は？",o:["本塁でのフォースアウト（タッチ不要で守備側有利）","必ず併殺","一塁アウト","タイムをかける"],a:0,e:"捕手を含む野手が「バックホーム」と大声で指示しプレーを明確に。本塁から一塁への転送で併殺も狙える。",p:"p.112-113"},
{b:"IQドリル",c:"IQ｜作戦とセオリー",q:"井川慶のノーヒットノーラン（2004年、捕手は監修者・野口）。立ち上がりに使った工夫は？",o:["通常ストレート7:変化球3の配球を、1巡目まで5:5に変えて相手を戸惑わせた","全球ストレートで押した","全球変化球にした","サインを全部投手に任せた"],a:0,e:"調子が万全でない日こそ配球の工夫で補う。相手ベンチが円陣で変化球狙いに出たと察すると、今度はストレート主体へ切り替えた。",p:"p.114"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"「振り逃げ」が成立する条件は？",o:["第3ストライクを捕手が完全捕球できなかったとき","バットを振って三振したときだけ","どんな三振でも可能","捕手が落としたときは常に不可"],a:0,e:"見逃し三振でも成立する。二死ならどんな走者状況でも可能。無死・一死では走者一塁または一・二塁のときは不可。",p:"p.117,124"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"振り逃げできる場面で、打者が悔しさのあまりダートサークルを出てしまうと？",o:["走塁放棄とみなされアウトになる","何も起きない","やり直しになる","ボールデッドになる"],a:0,e:"捕手側から見れば、相手打者がサークルを出るまでは気を抜けないということ。",p:"p.124"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"無死一・二塁の送りバントが投手前の小飛球に。走者が帰塁しているときの上級プレーは？",o:["あえてショートバウンドで捕り、三塁→二塁と転送して併殺を狙う","直接捕球して1アウト","見送ってファウルにする","タイムをかける"],a:0,e:"捕手が声で投げる塁を指示する。ただしグラブに当てて落とすと故意落球で1アウトしか取れない可能性がある。",p:"p.116,124"},
{b:"IQドリル",c:"IQ｜捕手のルール知識",q:"サヨナラの場面、二・三塁でタッチアップできる深さの外野ファウルフライ。守備側の選択肢は？",o:["あえて捕球せず、ファウル（ストライクカウント）にしてタッチアップを回避する手もある","必ず捕球する","必ず見送る","内野に任せる"],a:0,e:"捕れば犠飛でサヨナラの危険。捕らなければストライク1つ。チームの作戦・投手の疲労まで頭に入れて判断する。",p:"p.123,127"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"1番打者が初球から思い切り振っていくための準備は？",o:["プレイボール前の投球練習から、相手投手の球速にタイミングを合わせておく","素振りの回数を増やす","相手の帽子の色を確認する","準備は不要"],a:0,e:"狙い球を自分のスイングでコンタクトすることが大事。空振りしても次のチャンスがある。",p:"p.27"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"自分が「非力なタイプ」だと思う打者の正しい心得は？",o:["力で押されるのは想定内。バットを短めに持ちミート中心のコンパクトなスイングで振り切る","力負けしないよう長く持って強振する","当てるだけで振り切らない","バントだけする"],a:0,e:"内野手の頭を鋭いライナーで越える当たりが理想。",p:"p.29"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"追い込まれたカウントでの打者のスイングは？",o:["コンパクトなスイングに変える","フルスイングを貫く","バントに切り替える","目をつぶって振る"],a:0,e:"3番打者クラスでも追い込まれたら対応重視に切り替える。",p:"p.31"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"4番打者が厳しいコース攻めをされ続けるときの考え方は？",o:["しっかり見極めれば四球が増える。それもチャンスと捉え、威圧感に引かない強さを持つ","甘い球が来るまで全部振る","諦めて当てにいく","審判にアピールする"],a:0,e:"警戒される打者ほど選球が武器になる。自分の最大限の力を総動員して勝負を挑む。",p:"p.33"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"ムラのある長距離型の打者がまず理解しておくべきことは？",o:["自分の得意なコース・球種と「穴」。バッテリーは必ずそこを突いてくる","自分の長所だけ","相手の弱点だけ","何も考えない"],a:0,e:"誘い球に簡単に手を出さないためにも、自分の穴の把握が先。",p:"p.37"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"選球眼を良くするための習慣は？",o:["自分のストライクゾーンを正確に把握し、ベンチにいるときから相手投手の動向を見ておく","打席でだけ集中する","審判の癖を覚える","習慣では変わらない"],a:0,e:"これを怠るとストライク・ボールの判断が曖昧になり、難しい球に手を出して打率を下げる。",p:"p.39"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"打者が打席で第一に考えるべき目的は？",o:["出塁すること（走者がいれば進塁のアシスト）","ホームランを打つこと","三振しないことだけ","かっこよく打つこと"],a:0,e:"得点の多くはチームプレーから生まれる。出塁がすべての起点。",p:"p.86"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"2-0の絶好のカウントで打者がやってはいけないのは？",o:["四球狙いで消極的になること（相手の配球の思うツボ）","得意なコースに絞ること","好球を狙うこと","強く振ること"],a:0,e:"難しい球や苦手コースは切って、得意なコースと球種に絞ってスイングしていい場面。",p:"p.56"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"2-1は打者有利。この場面の打者の心得は？",o:["狙い球を絞って悔いのないスイングをする（外れて空振りしても2-2で挽回できる）","慎重に見送る","バントの構えで揺さぶる","何も狙わない"],a:0,e:"理想は長打で出塁して相手にプレッシャーをかけること。",p:"p.58"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"2-2で「待ちの意識」が強すぎるとどうなる？",o:["厳しいコースに手が出ず見逃し三振しやすい。0-2や1-2と同じ意識で立つのが正解","フルカウントに必ずなる","四球が増える","何も起きない"],a:0,e:"ボール球を見逃せればフルカウントで有利になるが、勝負意識は捨てないこと。",p:"p.60"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"3-0から「打て」のサインでも、打ちにいくときの条件は？",o:["自分の好きなポイントだけに絞り、自信を持って振り抜けること（中途半端なスイングはNG）","どんな球でも打ちにいく","当てるだけでいい","バントに変える"],a:0,e:"投手が制球に苦しんでいるなら無理に打ちにいく必要はない。",p:"p.62"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"フルカウントで「見ていない落ちる球」がありそうなときの打者の対応は？",o:["ゾーンを上げて低めは切る。ストレートはコンパクトに振り野手の間を狙う","低めに山を張る","全球フルスイング","必ず見送る"],a:0,e:"粘ってフルカウントにしても狙いを絞り切れていないことが多い。整理して立つ。",p:"p.66"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"満塁で打席に入る打者の的の絞り方は？",o:["投手は押し出しを嫌ってストライク先行で来る。その日ストライクを取れている球種に絞る","ボール球を待つ","初球は必ず見送る","絞らずに全対応"],a:0,e:"単打で次につなぐ意識で十分。",p:"p.84"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"直前の球でストレートに詰まったファウル。次の球への合わせ方は？",o:["ストレートのタイミングで待ち、変化球が来ても球速が遅いので対応する","変化球に絞る","タイミングを取らない","目をつぶって振る"],a:0,e:"速い球に合わせておけば遅い球には何とかバットを当てられる。逆は不可能。",p:"p.93"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"右打者が進塁打を打つ技術のイメージは？",o:["アウトコースのストレートに絞り、右方向におっつける","内角を引っ張る","高めを叩きつける","何でも流す"],a:0,e:"変化球のボール球に手を出すと空振り。ストライクにうまくバットを乗せて右へ。",p:"p.93"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"ヒットエンドランで打者が狙う打球方向は？",o:["ベースカバーに動いたセカンドかショートの方向（空いた穴）へ転がす","外野の頭の上","投手の正面","方向は考えない"],a:0,e:"走者のスタートで二遊間が動く。その穴を突けば出塁も狙える。",p:"p.94-95"},
{b:"IQドリル",c:"IQ｜打者の心理と技術",q:"スクイズを成功させる打者の技術は？",o:["構えを早くしすぎない・外されても飛びついて当てて最低ファウルに・高めはバットを立ててフライにしない","早めに構えて確実に","高めは見送る","強めに転がす"],a:0,e:"構えが早いとウエストされる。ボールに必ず当てることが三塁走者を守る。",p:"p.78"},

/* ===== 工藤公康 配球とは（PHPエディターズ・グループ） ===== */
{b:"工藤",c:"工藤｜配球の基本",q:"工藤が配球を考えるときの大前提は？",o:["配球は1球では完結しない。次の投球にどう繋げるかを考える","1球ごとに独立して考える","結果がすべて","速い球がすべて"],a:0,e:"配球とは「球を配る」もの。1球投げて終わりではない。",p:"p.14"},
{b:"工藤",c:"工藤｜配球の基本",q:"コースの投げ分けの基本となる対角線は？",o:["インハイ（目に一番近い）とアウトロー（目から一番遠い）","アウトハイとインロー","真ん中と外角","高めと低めだけ"],a:0,e:"この2コースに投げ分けることで、打者の狙い球やコースがある程度見抜ける。",p:"p.14"},
{b:"工藤",c:"工藤｜配球の基本",q:"12カウントの中で最も難しいのは？",o:["初球（その打席での打者の考えがわからないから）","フルカウント","0-2","2-0"],a:0,e:"データがあってもその打席の考えは読めない。まず「何を待っているのか」を探る。",p:"p.14-15"},
{b:"工藤",c:"工藤｜配球の基本",q:"「配球に100%はない」と言われる理由は？",o:["カウント×アウト×走者×点差×イニング×調子でシチュエーションが無限にあるから","運のスポーツだから","打者が強すぎるから","ルールが複雑だから"],a:0,e:"12カウント×24通りの走者・アウト状況に、点差・前後半・心理まで加わる。だから「これをすれば絶対」はない。",p:"p.10-11"},
{b:"工藤",c:"工藤｜配球の基本",q:"「見せ球」の主な目的は？",o:["打者の狙い球（待っている球種・コース・方向）を知ること","ストライクを取ること","球数を稼ぐこと","威嚇すること"],a:0,e:"基本はインサイド寄り。見せ球の後に「どの球種を投げるか」の意図があるからこそ重要になる。",p:"p.12"},
{b:"工藤",c:"工藤｜配球の基本",q:"「誘い球」を使う場面と狙いは？",o:["追い込んだ後やカウント有利時に「バットを出させて」狙いを確認する","初球に必ず使う","ボール球を見せるだけ","敬遠の代わり"],a:0,e:"追い込んだ後に打者の狙いが変わることに対して、狙いを確認する球。",p:"p.12"},
{b:"工藤",c:"工藤｜配球の基本",q:"「勝負球は一定にならず必ず変化する」の意味は？",o:["フォークを意識させれば真っ直ぐが勝負球になるように、それまでの球との結びつきで決まる","毎試合ランダムに変える","勝負球は決めない","相手に合わせるだけ"],a:0,e:"スライダーで仕留めたいなら、その前にインサイドの見せ球で意識づけしておく必要がある。",p:"p.12"},
{b:"工藤",c:"工藤｜配球の基本",q:"「カウント球＝ストライクを取る球」と思われがちだが、工藤の定義は？",o:["ボールでも打者が振ってくれればカウント球（カウントは見逃し・空振り・ファウルで作る）","ゾーンに入る球だけ","初球専用の球","遅い球のこと"],a:0,e:"手出しの多い打者にはストライクからボールゾーンへ投げることでカウント球になる。",p:"p.13"},
{b:"工藤",c:"工藤｜配球の基本",q:"「逆球」とは？",o:["外に構えたのに内へ行ってしまった球（内→外も同様）","低めを狙って高めに行った球","ワンバウンドした球","すっぽ抜けた球"],a:0,e:"高低のミスは逆球とは言わず「浮いた」と表現することが多い。",p:"p.13"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"「山を張る（配球を読む）」と「山勘」の違いは？",o:["山を張るは確かなデータと経験に基づく。山勘はデータなしの曖昧な決め打ち","同じ意味","山勘の方が高度","山を張るのは禁止行為"],a:0,e:"山勘でも当たることはあるが、再現性がまったく違う。",p:"p.16-17"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"打者が「待つ」球種の傾向は？",o:["ボールの軌道がわかりやすい球種を待つ（フォークはほぼ待たれない）","一番速い球を待つ","一番遅い球を待つ","待つ球は決めない"],a:0,e:"フォークは不確定で落ち方が毎回違うため、狙い球ではなく「振らないようにする」対象になる。",p:"p.16"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"捕手の最も多いミスは？",o:["「ストレートでいいだろう」「様子見」など初球の入りを安易に考えること","パスボール","送球ミス","サインの出し間違い"],a:0,e:"曖昧なイメージのなんとなくのサインで打たれるのは避けなければならない。投手も「なんとなく」に応じないこと。",p:"p.20"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"投手の最も多いミスは？",o:["コントロールミス（構えたところに百発百中の投手はいない）","牽制ミス","フィールディング","クイックの遅れ"],a:0,e:"バッテリー間の配球ミスを比べると、明らかに捕手のほうが少ない。",p:"p.20"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"甘いコースに行った球がすべて失点になるわけではない理由は？",o:["打者は7割打ち損じる。特にタイミングが合っていない打者は甘い球も凡打になる","審判が助けてくれるから","甘い球は打ちにくいから","運が良ければ助かるから"],a:0,e:"打者の状態判断で最大の要素は「タイミングが合っているか」。失投でも三振することがある。",p:"p.21"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"弱気になったバッテリーの配球に出やすい癖は？",o:["外一辺倒になる","内角一辺倒になる","真ん中が増える","変化はない"],a:0,e:"逆に強気のバッテリーはストレートを選びやすく、それを打たれることもある。捕手は投手が弱気なら鼓舞し、強気すぎれば落ち着かせる。",p:"p.22,33"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"「上手く打たれた」と「たまたま打たれた」の違いは？",o:["崩されてもヘッドが残ってコンタクトされたのが「上手く」。反応だけでチョンと当てたのが「たまたま」","飛距離の違い","打球方向の違い","違いはない"],a:0,e:"ただしどちらも打たれたことに変わりはない。「たまたまだから仕方ない」で終わらせないこと。",p:"p.29-30"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"打たれた後に必要な習慣は？",o:["「別の球を先に見せていれば」など試合後に振り返って反省するルーティン","すぐ忘れること","打者のせいにすること","何もしない"],a:0,e:"反省の積み重ねが頭の切り替えを上手くし、良い神経回路を作る。捕手にも非常に大切な作業。",p:"p.30"},
{b:"工藤",c:"工藤｜ミスと打たれ方",q:"近年フォークボールを投げる投手が増えた配球上の理由は？",o:["打者が狙い球にできない球種であり、制球精度が低い投手でも使えるから","流行だから","肘に優しいから","捕手が楽だから"],a:0,e:"ストレートの軌道からストンと落ちるため捉えにくい。困った時のフォークが増えている。",p:"p.31"},
{b:"工藤",c:"工藤｜打者を知る",q:"工藤が投手の視点から打者を見ていた2つのポイントは？",o:["「どこから動き始めるか」「どうやってタイミングを取るか」","身長と体重","打率と本塁打","構えの高さだけ"],a:0,e:"打者は手か足のどちらかが必ず最初に動き出す。その部位の観察が出発点。",p:"p.23"},
{b:"工藤",c:"工藤｜打者を知る",q:"インコースに1球投げた後、足からタイミングを取る打者がイン意識になったサインは？",o:["足の動き出しが早くなり、体の開きも早くなる","足の動きが遅くなる","構えが低くなる","変化はない"],a:0,e:"インコースは打つポイントが前になるため動き出しが早くなる。手から動くタイプなら手の動き出しが早くなる。",p:"p.23-24"},
{b:"工藤",c:"工藤｜打者を知る",q:"打撃練習で「引っ張り中心の選手がポイントを近づけて呼び込む練習」をしていたら？",o:["調子が悪いことが多い（試合では逆方向を狙って肩が入りやすくなる）","絶好調のサイン","作戦の変更","意味はない"],a:0,e:"練習と試合の違いを観察・分析することで攻略のヒントが多く見つかる。",p:"p.24"},
{b:"工藤",c:"工藤｜打者を知る",q:"打撃練習の「音」からわかることは？",o:["調子が良いと芯付近に当たり乾いた音、悪いと潰れた鈍い音がする","何もわからない","球場の広さ","バットの値段"],a:0,e:"一見配球と関係なさそうな情報にも貴重なヒントが隠れている。",p:"p.24-25"},
{b:"工藤",c:"工藤｜打者を知る",q:"長距離ヒッターが一番嫌がるのは？",o:["ボールが上がらないこと（ゴロ、上っ面を打つバッティング）","三振","四球","詰まること"],a:0,e:"上がらなければホームランも長打も出ない。この心理は攻め筋になる。",p:"p.25"},
{b:"工藤",c:"工藤｜打者を知る",q:"「当てるだけのバッティング」になった打者にも残る危険は？",o:["抜けたスライダーなど遅い「中間球」はうまく当ててヒットにできる","危険は何もない","速球に強くなる","長打が増える"],a:0,e:"遅いボールのほうがコンタクトしやすい。傾向が見えても慢心しないこと。",p:"p.26-27"},
{b:"工藤",c:"工藤｜打者を知る",q:"打者のルーティンを見る意味は？",o:["いつもと違う動きは調子・状態の変化のサインだから","時間つぶし","マナーの確認","相手を油断させる"],a:0,e:"無意識のことが動きや行動に現れる。1球ごとに打席を外して素振りする等の変化に注目。",p:"p.27"},
{b:"工藤",c:"工藤｜打者を知る",q:"審判の癖（今日は低めを取る等）を知っておく配球上の効果は？",o:["打者のストライクゾーンを半個分から1個分に狂わせ、集中力を欠かせられる","抗議の材料になる","特にない","審判と仲良くなれる"],a:0,e:"打者は自分のゾーンがずれることを嫌う。ずれが大きくなるほど凡打の確率が上がる。",p:"p.28"},
{b:"工藤",c:"工藤｜打者を知る",q:"打者の意識の裏をとる基本形は？",o:["インサイドを意識させれば外でカウントが取りやすく、外の意識ならインで詰まらせやすい","意識と関係なく攻める","常に意識した方へ投げる","裏をとる方法はない"],a:0,e:"打者の傾向を「知る」ことでカウントが取れ、追い込みやすくなり、凡打に打ち取りやすくなる。",p:"p.32-33"},
{b:"工藤",c:"工藤｜打者を知る",q:"捕手が「打たれるのが怖い」「失敗したくない」と思うと配球はどうなる？",o:["アウトコースへの変化球に偏り、癖が生まれる","より大胆になる","変わらない","内角が増える"],a:0,e:"不利カウントで取りにいったストライクを打たれる悪循環に。捕手の性格・メンタルは配球の重要な要素。",p:"p.33"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"工藤自身の「勝負球」の作り方は？",o:["すべての球種を勝負球・決め球にする意識で磨いた","1つの魔球だけを磨いた","勝負球は作らなかった","捕手に任せた"],a:0,e:"プロの打者は狙った球種を待てば芯で捉える。だから目先を変えるより自分の球種を磨く努力を選んだ。",p:"p.36"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"ストレートは好調だが変化球が不調な日の配球の基本は？",o:["ストレートで押し、不調の変化球は見せ球として織り交ぜる","変化球を封印する","変化球中心で慣らす","降板させる"],a:0,e:"その日のコンディションに合わせて球種の役割を組み替える。",p:"p.37"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"「四球率が高い」というデータ単体は配球に直接関係ないが、掛け合わせると？",o:["「三振が少ない」と合わせると選球眼が良くボール球を振らないことが明確になり、ボールになる変化球で誘えないとわかる","何もわからない","打率がわかる","足の速さがわかる"],a:0,e:"データは掛け合わせて読み解く。どんなデータも無駄にならない。",p:"p.40-42"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"「ここ3試合で7割5分」という好調情報を先発投手が知りすぎると？",o:["意識しすぎて高確率で1打席目にヒット、2打席目は四球になる","必ず抑えられる","影響はない","打者が萎縮する"],a:0,e:"情報は「投手も知るべきもの」と「捕手だけが知っておけばよいもの」に整理する必要がある。",p:"p.42-43"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"工藤が考える「投手に最も必要な要素」は？",o:["コントロール","球速","変化球の数","気迫"],a:0,e:"コンディショニングとコントロールがあれば心理戦に勝てる。配球とは簡単に言えば心理戦である。",p:"p.43"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"工藤が選手に配った短期決戦の「3つの準備」とは？",o:["身体の準備・心の準備・頭の準備（自分を知り相手を知る）","打つ・守る・走る","朝・昼・夜の準備","道具・食事・睡眠"],a:0,e:"短期決戦もシーズンと同じ攻め方で平常心。準備だけを整える。",p:"p.49"},
{b:"工藤",c:"工藤｜投手の武器と情報",q:"監督の作戦を投手に伝えるとき、工藤がとった方法は？",o:["投手には直接伝えず、捕手主導で「こう動いてもらいたい」と伝えさせた","全体ミーティングで通達","投手にだけ伝えた","伝えなかった"],a:0,e:"「監督が何をしたいか」ではなく捕手主導になることで、投手は集中して打者と勝負できる。",p:"p.50"},
{b:"工藤",c:"工藤｜扇の要",q:"捕手が「扇の要」と言われる最大の要素は？",o:["試合が始まれば「助監督」にならなければいけないこと","ポジションの位置","道具が多いこと","声が大きいこと"],a:0,e:"タイムを取り、投手に助言し、ベンチでは投手交代の進言もする。捕手の助言は試合を左右する。",p:"p.54-55"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤が城島・甲斐に厳しく接し続けた理由は？",o:["バッテリーを組むのは自分だけではなく、自分で考え抑える術を身につけさせるため","嫌いだったから","伝統だから","本人が望んだから"],a:0,e:"捕手の迷いは不安として投手に伝わり敗戦につながる。「厳しく接することこそ唯一の方法」。",p:"p.55-56"},
{b:"工藤",c:"工藤｜扇の要",q:"捕手育成でバッテリーコーチが最初に取り組むのは？",o:["守備能力（キャッチング→スローイング→ブロッキング）","打撃","走塁","サインの暗記"],a:0,e:"投げる球が捕れなければ話にならない。打撃の育成は最後。",p:"p.59-62"},
{b:"工藤",c:"工藤｜扇の要",q:"現代の捕手の「ブロッキング」とは？",o:["投じられた球を後ろに逸らさない技術（本塁ブロックは禁止されている）","走者を体で止める技術","打者を威圧する構え","バント処理"],a:0,e:"落ちる決め球が多い現代は特に重要。足捌きなど下半身の使い方が要求される。",p:"p.61"},
{b:"工藤",c:"工藤｜扇の要",q:"甲斐拓也の二塁送球の速さは？",o:["捕ってから2秒を切り、速いときは1.9秒を切る","3秒前後","2.5秒前後","計測不能"],a:0,e:"普通の捕手は2秒を超えることが多い。送球の精度もずば抜けており、走者にとって走りにくい捕手。",p:"p.60,82"},
{b:"工藤",c:"工藤｜扇の要",q:"古田や城島が打撃でも成績を残せた理由として工藤が挙げるのは？",o:["相手捕手の配球やリードを逆手に取った読みを打撃に利用していた","体格に恵まれていた","打撃練習量だけ","運が良かった"],a:0,e:"捕手独特の視点や能力は打撃にも活かせる。",p:"p.62"},
{b:"工藤",c:"工藤｜扇の要",q:"投手にとって「安心して投げられる捕手」の第一条件は？",o:["どんな球でも止めてくれること（ワンバウンドや引っかけた変化球を後ろに逸らさない）","打撃が良いこと","声が大きいこと","年上であること"],a:0,e:"そのうえでコミュニケーションが取れ、「俺に任せろ」という姿を見せ、チームを勝たせてくれること。",p:"p.63"},
{b:"工藤",c:"工藤｜扇の要",q:"先発投手が1シーズン25〜30試合で「本当に調子が良い」のは何試合？",o:["2〜3試合ほど","20試合以上","半分ほど","毎試合"],a:0,e:"残りは何かが上手くいかない。その投手を配球とリードで勝利まで持っていくのが捕手の仕事。",p:"p.63,74"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤いわく「合わない捕手はいない」。合わないとしたら何か？",o:["野球観（打者に対しての考え方）","性格","年齢","出身地"],a:0,e:"野球観を合わせるために共に学び、会話を重ねる。伊東勤の凄さに気づいたことが配球を学ぶ原点になった。",p:"p.65-67"},
{b:"工藤",c:"工藤｜扇の要",q:"投手が何度も首を振る場面で多い原因は？",o:["投手が投げたい球と捕手が投げてもらいたい球のわずかなずれ","捕手への反抗","時間稼ぎ","サインの見間違い"],a:0,e:"考え方の違いや打者の見え方の違いから起こる。首を振ること自体は悪いことではない。",p:"p.68"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤が古田との対戦で何度も首を振り続けた本当の狙いは？",o:["打者を惑わせ考えさせるための奇策（根拠も意図もない首振り）","本当にサインが合わなかった","肩の調子確認","時間稼ぎ"],a:0,e:"打者は打席で頭で考えながらバットを振れない。頭が整理できないところに外のストレートで見逃し三振。",p:"p.68-69"},
{b:"工藤",c:"工藤｜扇の要",q:"打者の好不調を知る基本の5要素に含まれるのは？",o:["ここ3試合の結果・打撃の内容・相手投手との相性・イン意識後の反応・落ちる球への反応","身長・体重・年齢・出身・打順","道具・天気・球場・観客・審判","打率だけ"],a:0,e:"さらに打球方向や強弱、どんな打ち方だったかまで把握する。",p:"p.70-71"},
{b:"工藤",c:"工藤｜扇の要",q:"どれだけ好調な打者に対しても持つべき前提は？",o:["必ず対応できない配球（球種・コース・緩急・揺さぶり）がある","歩かせるしかない","力勝負しかない","諦めるしかない"],a:0,e:"最初から歩かせ前提や「開き直って行け」ではいけない。投手ごとに打者が対応できない球を知っておく。",p:"p.71"},
{b:"工藤",c:"工藤｜扇の要",q:"前日にシミュレーションをしない捕手に起こりがちなことは？",o:["試合で思考停止しパニックになり、どんなサインも打たれて大量失点につながる","特に問題ない","勘が冴える","投手が助けてくれる"],a:0,e:"捕手が冷静で配球の引き出しを多く持つことで勝敗が決まるケースは多い。",p:"p.73"},
{b:"工藤",c:"工藤｜扇の要",q:"工藤の試合前シミュレーションのやり方は？",o:["走者なしで相手打線を1巡、走者ありでもう1巡、ピンチや不調も想定しておく","好調な場面だけ想定","結果だけイメージ","していない"],a:0,e:"ピンチを想定内にしておけば、失点しても冷静に切り替えられる。ネガティブではなく「想定内」。",p:"p.88-89"},
{b:"工藤",c:"工藤｜扇の要",q:"2打席目にインサイドの見せ球で「続けて来るかも」と思わせるための条件は？",o:["過去に同じコースへ続けて投げた実績がある、または打者がインサイドに敏感であること","条件はない","球速が速いこと","捕手の構えが上手いこと"],a:0,e:"打者の心理に働きかけるには裏付けが要る。",p:"p.78"},
{b:"工藤",c:"工藤｜扇の要",q:"球数が増え球威が衰えた試合後半の配球は？",o:["持っている全球種を使い、緩急・高低・左右の変化で打ち取る","ストレートで押し切る","決め球だけで勝負","考えずに投げる"],a:0,e:"打者は球威や制球の変化に気づいている。『野村ノート』のリリーフ全球種論とも通じる。",p:"p.78"},
{b:"工藤",c:"工藤｜扇の要",q:"「投手の良いところを引き出す」を工藤は一言で何と言う？",o:["技術面と精神面を理解して覚悟を決めさせてあげること","球数を減らすこと","褒め続けること","勝たせること"],a:0,e:"投手の良い時・悪い時・普通の時を知り、何ができて何ができないのかを理解することから始まる。",p:"p.79"},
{b:"工藤",c:"工藤｜走者と心理",q:"俊足の一塁走者がいるとき、バッテリーが考えておく4つのことは？",o:["走者の足の速さ・投手のクイックと牽制精度・捕手の送球速度・相手ベンチの作戦","天気・球場・観客・審判","打順・打率・本塁打・打点","何も考えない"],a:0,e:"どれか1つでも欠けると盗塁を許しやすくなる。",p:"p.80-83"},
{b:"工藤",c:"工藤｜走者と心理",q:"俊足走者がいると外角への投球が多くなる理由は？",o:["できるだけ素早く二塁へ送球したいから（イン構えや緩い変化球は送球がコンマ数秒遅れる）","外角の方が打たれないから","走者から遠いから","習慣だから"],a:0,e:"ただし外角一辺倒にならないよう、クイックや送球を日々磨いて偏りをなくす。",p:"p.81-83"},
{b:"工藤",c:"工藤｜走者と心理",q:"人間が冷静に判断しながら同時に考えられることは、せいぜいいくつ？",o:["2つまで（3つ以上はどれかが疎かになる）","5つまで","無制限","1つだけ"],a:0,e:"だから守備側の思考を増やす俊足走者は脅威そのもの。プレッシャーは配球に表れる。",p:"p.82"},
{b:"工藤",c:"工藤｜走者と心理",q:"「自信がない捕手」のサインに表れる特徴は？",o:["投手にお伺いを立てるようなサインを出す","強気のサインばかり","サインが速い","サインが少ない"],a:0,e:"バッテリーは共同作業であり上下はない。話し合い、納得してサインを出すこと。",p:"p.84-85"},
{b:"工藤",c:"工藤｜走者と心理",q:"工藤の座右の言葉「停滞は◯◯の始まり」。◯◯は？",o:["後退","成長","安定","成功"],a:0,e:"「これで一人前」と思うと努力・探求心・向上心をなくす。だから甲斐をほとんど褒めなかった。",p:"p.85"},
{b:"工藤",c:"工藤｜走者と心理",q:"現役時代の工藤が捕手に絶対譲れないとした技術は？",o:["キャッチング（フレーミング）","強肩","打撃","ブロック"],a:0,e:"ストライクをボールと判定されると配球の組み立てが全く変わってしまうから。",p:"p.88"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"若き工藤を7回2失点に導いた大先輩捕手・黒田の声かけは？",o:["「1人ずつ全力で来い」「先のことは考えるな」「俺のミットだけを見て投げてこい」","「打たれてもいいぞ」","「勝ちを意識しろ」","「今日は流して投げろ」"],a:0,e:"若い投手はイニング・得点・勝ちを意識して崩れる。捕手の一言が集中を作る。",p:"p.92-94"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"プロの世界でメンタルを崩す最大の要因を工藤は何と言う？",o:["不安","怒り","慢心","嫉妬"],a:0,e:"打たれる恐怖も突き詰めればコントロールができないから。対処は「立ち向かう勇気」＝打者を知ることに尽きる。",p:"p.97-99"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"凡打の映像を見るときのポジティブな見方とは？",o:["「あの変化に弱い」と凡打の前の球や変化に着目する","「もう少し甘かったら打たれていた」と考える","見ないようにする","結果だけ記録する"],a:0,e:"同じ映像でも見方でイメージが変わる。ネガティブなイメージのままサインを出せばその通りの結果になる。",p:"p.99"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"配球・リードが良くなる唯一の方法を工藤は何と言う？",o:["目で見て、書いて覚え、実戦で試すことの繰り返し","才能","年数だけ","強い体"],a:0,e:"3割の一流打者でも7割は失敗する、と考えればネガティブになる必要がない。",p:"p.100"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"ブルペンで調子が悪かった投手が試合で良くなることがある理由は？",o:["調子の悪さを自覚した緊張がアドレナリンを出すから","気のせい","ブルペンの計測ミス","打者が弱いから"],a:0,e:"捕手は試合が始まったら「調子が変わったか」をもう一度確かめ、シミュレーションをやり直す。",p:"p.103-104"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"「アウトコース低めに投げて打たれたら仕方ない」という言葉の問題点は？",o:["やみくもな外低めを正当化してしまう。投げるにしても根拠を持つことが本質","何も問題ない","外低めが弱点だから","時代遅れだから"],a:0,e:"全ての球に根拠と意味を持たせる。根拠があれば打たれても次の対戦へのヒントになる。",p:"p.108-109"},
{b:"工藤",c:"工藤｜捕手の心と技",q:"打たれた後の投手のコメントに最も多いのは？",o:["「球が高かった」「甘く入った」などコントロールについての発言","変化球の曲がりの話","捕手のサインの話","運の話"],a:0,e:"本当に困った時、投手はコントロールに頼る。だから最も大切な条件はコントロールの精度。",p:"p.109"},
{b:"工藤",c:"工藤｜観察の技術",q:"打ち取る確率を上げる2本柱は？",o:["打者に考えさせること・インサイドを上手く使うこと","速い球と遅い球","内野と外野の連携","運と勘"],a:0,e:"考えさせれば迷いが生じ打ち損じが増える。インは目と身体に近く、思考を変化させる。",p:"p.110-111"},
{b:"工藤",c:"工藤｜観察の技術",q:"打者がインサイドを嫌う本当の理由を工藤はどう見る？",o:["インサイド自体ではなく、死球など怪我につながることを嫌う","単に打ちにくいから","音が怖いから","理由はない"],a:0,e:"体をひっくり返された次の球を打ちにいく打者はほとんどいない。インは「見せることで打たれる確率を下げる方法」であり、当てていいコースではない。",p:"p.110-111"},
{b:"工藤",c:"工藤｜観察の技術",q:"「良い四球」の例は？",o:["一塁が空いているピンチで、打者を探った結果の四球","無死一塁での四球","次が4番なのに3番を歩かせる四球","投手9番を歩かせて1番につなぐ四球"],a:0,e:"好調な強打者より次の不調な打者と勝負した方が失点確率が低い場合など。誤答は全て「悪い四球」の例。",p:"p.112"},
{b:"工藤",c:"工藤｜観察の技術",q:"満塁で「歩かせてでも1点で抑える」と決めたとき、捕手が投手に伝えないのはなぜ？",o:["ほとんどの投手は「勝負したい」性分で、能力を否定されたと感じてしまうから","ルール違反だから","時間がないから","伝える必要がないから"],a:0,e:"投手のプライドと精神状態を考慮しながら失点を防ぐのも捕手のリード。",p:"p.113"},
{b:"工藤",c:"工藤｜目の錯覚",q:"「上下の錯覚」の使い方は？",o:["顔の近くの球は大きく見える→次に低めを投げると球が小さく見え、見逃しや空振りが増える","高めだけ投げ続ける","低めだけ投げ続ける","錯覚は存在しない"],a:0,e:"人間の目の性質を配球に使う。ストライクゾーンの見極めにも表れる。",p:"p.115-116"},
{b:"工藤",c:"工藤｜目の錯覚",q:"「左右の錯覚」で狂わせられるものは？",o:["打者が感覚で把握しているホームベースの幅（半個分の精度を1〜2個分に）","審判の判定","ベースの実際の幅","投手の制球"],a:0,e:"インや目に近い高めで意識をずらすと起こる。ストライクを振らせない・手を出させないのが「究極の配球」。",p:"p.116-117"},
{b:"工藤",c:"工藤｜目の錯覚",q:"チェンジアップが効く根本的な理由は？",o:["打者は投手の最も速い球にタイミングを合わせているから","遅いから","曲がるから","新しい球種だから"],a:0,e:"同じフォーム・腕の振りなら「ストレートだ」と思う。カーブに対応できる打者よりチェンジアップに対応できる打者は圧倒的に少ない。",p:"p.117-118"},
{b:"工藤",c:"工藤｜観察の技術",q:"ネクストバッターズサークルで工藤が見ていたのは？",o:["1巡目と2巡目の素振りの違い（球種やコースを意識したスイングか）","打者の表情だけ","バットの種類","待ち時間の長さ"],a:0,e:"カーブに合わせた素振りからカーブ待ちを見抜き、誘い球で確認して直球で見逃し三振に取った実例も。",p:"p.119-120"},
{b:"工藤",c:"工藤｜観察の技術",q:"テイクバックでバットを身体の近くに引き付ける打者の傾向は？",o:["インサイドにバットが出にくく詰まりやすい","外角に強い","低めに強い","特徴はない"],a:0,e:"対処でポイントを前にすると動き出しが早くなり、イン狙いがバレやすくなる。そこで外角へ。",p:"p.121-122"},
{b:"工藤",c:"工藤｜観察の技術",q:"打者の「投げられて嫌がる反応」の2タイプは？",o:["目に近いインハイを嫌がるタイプと、軸足を動かされることを嫌がるタイプ（長距離打者に多い）","内角と外角","高めと低め","速球と変化球"],a:0,e:"どちらのタイプかを見極めれば崩し方が決まる。",p:"p.123"},
{b:"工藤",c:"工藤｜観察の技術",q:"バットを立てて高く構える打者（長距離型に多い）の特徴は？",o:["アッパー気味になりやすく、インロー低めに素直にバットが出て、外角高めは長打が出やすい","高めに強く低めに弱い","小技が得意","打球が上がらない"],a:0,e:"レベル構え＝中距離（甘め得意）、担ぐ低グリップ＝アベレージ型（高め得意で、得意コースの近くが弱点）。構えで得意・苦手が予測できる。",p:"p.124-126"},
{b:"工藤",c:"工藤｜観察の技術",q:"打者の「好きなコース」の近くに存在するものは？",o:["空振りゾーン・ファウルゾーン・見逃しゾーン","安全地帯","何もない","ホームランゾーンだけ"],a:0,e:"好きなゾーンには多少タイミングがずれても打ちにいくから。そのすぐ外側が仕留めどころになる。",p:"p.127-128"},
{b:"工藤",c:"工藤｜観察の技術",q:"ファウルの4分類のうち「最もやっかい」なのは？",o:["追い込まれてから粘って球数を投げさせるファウル（状態が良い証拠）","狙い球でコースが良くてファウル","狙いと違うのにバットが出たファウル","タイミングがずれたファウル"],a:0,e:"粘りに根負けするとヒット・四球で流れが変わり、球数は投手交代の心配まで生む。",p:"p.133-136"},
{b:"工藤",c:"工藤｜観察の技術",q:"「狙いと違う球にバットが出てファウル」からわかることは？",o:["ボールが見えていない・タイミングが取れていない＝調子が悪い","絶好調","狙いが完璧","何もわからない"],a:0,e:"ファウルの種類を直近の試合と比較すれば打者の状態が把握できる。",p:"p.134"},
{b:"工藤",c:"工藤｜観察の技術",q:"ハーフスイングが多い打者から読み取れることは？",o:["球の見極めができていない、打ち返す自信がない、狙い球を決めかねている","絶好調である","選球眼が良い","次は必ず打ってくる"],a:0,e:"ストレート待ちで変化球に途中で止めるケースが典型。",p:"p.136"},
{b:"工藤",c:"工藤｜観察の技術",q:"逆方向を狙っている打者に一番投げてはいけない球は？",o:["インサイドの甘めの球（詰まっても逆方向に打ちやすい）","外角低めの変化球","高めの釣り球","ワンバウンド"],a:0,e:"インを使うなら詰まってもゴロになる低めのボール気味に。外は変化球で低めを突く。",p:"p.137-138"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤が突然勝てなくなった本当の原因は？",o:["投じる回数が増えるほど球種・軌道・傾向を読まれる確率が上がっていたこと","球速の低下","故障","運"],a:0,e:"東尾の「いつまでもストレートとカーブだけで勝てると思うな」の意味。同じボールと軌道は長く通用しない。",p:"p.140-142"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤の登板日ルーティン「トイレでの20〜30分」でやっていたことは？",o:["1番から9番まで走者なし→走者ありで打ち取るシミュレーション","仮眠","ストレッチ","データの暗記"],a:0,e:"良いイメージが早く鮮明にできた日ほど実際の投球も良かった。",p:"p.143-145"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"「考えすぎると良くないので自分の球を信じて投げます」という若手への工藤の考えは？",o:["考えすぎるぐらい考え、できることを全てやり尽くしてから試合に入るべき","その通りで正しい","考えは人それぞれ","若手はそれでいい"],a:0,e:"ネガティブになる原因は自分の理解不足と情報不足。学び尽くした先にリラックスがある。",p:"p.146-147"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"すべての調子が悪い日に工藤がとった投球は？",o:["とにかく「低め、低め」に投げ、打者の打ち損じを待つ","真ん中に集める","全球変化球","登板回避"],a:0,e:"調子が悪い日の方が多いからこそ、備えの引き出しを持つ。",p:"p.152"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤による「配球」の定義は？",o:["打ち取る確率を上げるための考え方","必勝の方程式","捕手の勘","投手の自由"],a:0,e:"絶対がないからこそ学び続けなければならない。",p:"p.153"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"工藤が「配球の師」とした人物は？",o:["野村克也（著書を繰り返し読み込んだ）","東尾修","広岡達朗","王貞治"],a:0,e:"映像を見直しても答えが出ないとき野村の本を読み返し、頭がクリアになった。野村の捕手論が日本の配球文化を作った。",p:"p.155-158"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"「リード」と「配球」の違いは？",o:["配球は球種とコースのサイン、リードは投手の精神面と試合全体への指示（身振り手振り含む）","同じ意味","リードは打者向け","配球は監督の仕事"],a:0,e:"守備位置の指示やセーフティ警戒の注意喚起もリード。捕手は助監督である。",p:"p.159-161"},
{b:"工藤",c:"工藤｜本質と心理戦",q:"投手が持つ「性（さが）」と捕手の役割は？",o:["投手は打者と勝負したがる。捕手はそれに「待った」をかけ、勝利の確率が高い投球へ導く","投手は逃げたがる。捕手は勝負させる","性は存在しない","捕手も勝負したがる"],a:0,e:"だから捕手は守りが最も評価される唯一のポジション。",p:"p.161"},

/* ---- プレイヤー（記録の分離）と習得記録 ---- */
const PROFILES=["莉映","父"];
const GOAL_PCT=80;
function hashQ(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))|0; } return (h>>>0).toString(36); }
let profile = localStorage.getItem("haikyu_profile")||"";
function mkey(){ return "haikyu_m_"+profile; }
function loadM(){ try{ return JSON.parse(localStorage.getItem(mkey()))||{}; }catch(e){ return {}; } }
function saveM(m){ try{ localStorage.setItem(mkey(),JSON.stringify(m)); }catch(e){} }
function recordAnswer(qid,ok,countMastery){
  if(!profile||!qid) return;
  if(countMastery===undefined) countMastery=true;
  const m=loadM(); const r=m[qid]||{c:0,w:0,ok:false,s:0};
  if(r.s===undefined) r.s=(r.ok?1:0);
  if(ok){ r.c++; r.ok=true; if(countMastery) r.s++; }
  else { r.w++; r.ok=false; r.s=0; }
  m[qid]=r; saveM(m);
}
function mcId(x){ return "mc:"+hashQ(x.q); }
function oxId(x){ return "ox:"+hashQ(x.q); }
function qidOf(x){ return x.ox ? oxId(x) : mcId(x); }
function mkItem(x){ return x.ox ? mkOxItem(x) : mkMcItem(x,false); }
// 記録の状態: seen=挑戦済み / ok=直近正解 / s=連続正解数（2以上=🟢定着）
function stOf(m,qid){
  const r=m[qid]; if(!r) return {seen:false,ok:false,s:0};
  const s=(r.s!==undefined)?r.s:(r.ok?1:0);
  return {seen:true,ok:r.ok,s};
}
function isMastered(m,qid){ return stOf(m,qid).s>=2; }
function isStar(m,qid){ const st=stOf(m,qid); return st.ok&&st.s===1; }
function voiceUnlocked(){ return profile && localStorage.getItem("haikyu_voiceok_"+profile)==="1"; }

function renderDash(){
  const pc=$("profChips"); pc.innerHTML="";
  PROFILES.forEach(p=>{
    const el=document.createElement("div");
    el.className="chip book"+(p===profile?" on":"");
    el.innerHTML="👤 "+p;
    el.onclick=()=>{ profile=p; localStorage.setItem("haikyu_profile",p); renderStart(); };
    pc.appendChild(el);
  });
  const goal=$("goalNote"), d=$("dash"), rb=$("reviewBtn");
  if(!profile){
    goal.textContent="👤 だれがプレイするか選んでね（記録は別々に保存されます）";
    d.innerHTML=""; rb.classList.add("hidden"); $("starBtn").classList.add("hidden"); $("voiceBtn").classList.add("hidden");
    return;
  }
  goal.textContent="🎯 目標：8/2(日)までに、全部の本の全部の章で🟢定着"+GOAL_PCT+"%（🏆）！ 定着＝2回連続正解（まぐれは通用しない）。下の本・章のチップに🟢と🏆が出るよ。全部の章をコンプすると…🎤言語化ボタンが出現！";
  const m=loadM();
  const rows=BOOKS.map(b=>{
    const qs=ALLBANK.filter(x=>x.b===b);
    return {nm:((b==="実戦"||b==="OX")?BOOK_LABEL[b]:"『"+BOOK_LABEL[b]+"』"), tot:qs.length,
      mast:qs.filter(x=>isMastered(m,qidOf(x))).length};
  });
  const allIds=ALLBANK.map(x=>qidOf(x));
  const nSeen=allIds.filter(id=>stOf(m,id).seen).length;
  const nStar=allIds.filter(id=>isStar(m,id)).length;
  const nMast=allIds.filter(id=>isMastered(m,id)).length;
  d.innerHTML='<div class="goal" style="margin:0 2px 8px;">ぜんたい：挑戦 '+nSeen+'/'+allIds.length+'　⭐正解 '+nStar+'　🟢定着 '+nMast+'</div>'
    + rows.map(r=>{
    const pct=r.tot?Math.round(r.mast/r.tot*100):0;
    const badge=pct>=GOAL_PCT?" 🏆":"";
    return '<div class="drow"><div class="nm">'+r.nm+badge+'</div><div class="dbarw"><i class="dbar" style="width:'+pct+'%"></i></div><div class="pc">'+r.mast+'/'+r.tot+'（'+pct+'%）</div></div>';
  }).join("");
  // 全部の章🏆（○×クイズ含む）→ 言語化ボタンを解放（一度解放されたら戻らない）
  const allChaptersCleared = CATS.every(c=>{
    const qs=ALLBANK.filter(x=>x.b===c.b&&x.c===c.c);
    const mast=qs.filter(x=>isMastered(m,qidOf(x))).length;
    return qs.length>0 && Math.round(mast/qs.length*100)>=GOAL_PCT;
  });
  if(allChaptersCleared){
    localStorage.setItem("haikyu_voiceok_"+profile,"1");
  }
  $("voiceBtn").classList.toggle("hidden", !voiceUnlocked());
  const nWrong=wrongCount(m);
  if(nWrong>0){ rb.textContent="🔁 まちがえた問題だけ復習する（"+nWrong+"問）"; rb.classList.remove("hidden"); }
  else rb.classList.add("hidden");
  const sb=$("starBtn");
  const nStarBtn=ALLBANK.filter(x=>isStar(m,qidOf(x))).length;
  if(nStarBtn>0){ sb.textContent="🎯 定着チャレンジ：⭐をもう一度正解して🟢に（"+nStarBtn+"問）"; sb.classList.remove("hidden"); }
  else sb.classList.add("hidden");
}
function wrongCount(m){
  return ALLBANK.filter(x=>{ const r=m[qidOf(x)]; return r&&!r.ok; }).length;
}

let activeBook = null;        // いま開いている本（本を選ぶ→章を選ぶ、の順）
let selectedCats = new Set(); // 選択中の章（開いている本の中だけ）
let session = null;
let qTimer = null;
const TSPEED = 12; // 2択スピードの制限秒

/* ---- 描画：開始画面 ---- */
function renderStart(){
  renderDash();
  const m = profile ? loadM() : null;
  // 書籍チップ（🟢定着と🏆を表示）
  const bc = $("bookChips"); bc.innerHTML="";
  BOOKS.forEach(b=>{
    const qs=ALLBANK.filter(x=>x.b===b);
    const total=qs.length;
    const mast=m ? qs.filter(x=>isMastered(m,qidOf(x))).length : 0;
    const pct=total?Math.round(mast/total*100):0;
    const el=document.createElement("div");
    el.className="chip book"+(b===activeBook?" on":"");
    const title=((b==="実戦"||b==="OX") ? BOOK_LABEL[b] : "『"+BOOK_LABEL[b]+"』")+((m&&pct>=GOAL_PCT)?" 🏆":"");
    const sub=m ? (BOOK_AUTHOR[b]+"・🟢"+mast+"/"+total) : (BOOK_AUTHOR[b]+"・"+total+"問");
    el.innerHTML=title+"<br><small>"+sub+"</small>";
    el.onclick=()=>{
      if(activeBook===b){ activeBook=null; selectedCats.clear(); }
      else{
        activeBook=b; selectedCats.clear();
        const cs=CATS.filter(c=>c.b===b);
        if(cs.length===1) selectedCats.add(cs[0].b+"|"+cs[0].c); // 章が1つの本は自動選択
      }
      renderStart();
    };
    bc.appendChild(el);
  });
  // カテゴリチップ（開いている本の章だけを表示）
  const cc=$("catChips"); cc.innerHTML="";
  if(!activeBook){
    cc.innerHTML='<div class="goal" style="margin:0 2px;">📖 上で本をタップすると、その本の章がここに出ます。</div>';
  }
  BOOKS.filter(b=>b===activeBook).forEach(b=>{
    const cats=CATS.filter(c=>c.b===b);
    if(!cats.length) return;
    const g=document.createElement("div"); g.className="catgroup";
    const h=document.createElement("div"); h.className="cathead";
    h.textContent=(b==="実戦"||b==="OX") ? BOOK_LABEL[b] : "『"+BOOK_LABEL[b]+"』";
    g.appendChild(h);
    const row=document.createElement("div"); row.className="chips";
    cats.forEach(c=>{
      const key=c.b+"|"+c.c;
      const qs=ALLBANK.filter(x=>x.b===c.b&&x.c===c.c);
      const total=qs.length;
      const mast=m ? qs.filter(x=>isMastered(m,qidOf(x))).length : 0;
      const pct=total?Math.round(mast/total*100):0;
      const label=(c.c.includes("｜") ? c.c.slice(c.c.indexOf("｜")+1) : c.c)+((m&&pct>=GOAL_PCT)?" 🏆":"");
      const el=document.createElement("div");
      el.className="chip"+(selectedCats.has(key)?" on":"");
      el.innerHTML=label+"<small>"+(m?("🟢"+mast+"/"+total):total)+"</small>";
      el.onclick=()=>{ selectedCats.has(key)?selectedCats.delete(key):selectedCats.add(key); renderStart(); };
      row.appendChild(el);
    });
    g.appendChild(row);
    cc.appendChild(g);
  });
  updatePool();
}
function pool(){ return ALLBANK.filter(x=>selectedCats.has(x.b+"|"+x.c)); }
function updatePool(){
  if(!profile){ $("poolInfo").textContent="👤 まず上でプレイヤーを選んでね"; $("startBtn").style.opacity=.5; return; }
  const n=pool().length;
  if(n===0){
    $("poolInfo").textContent = activeBook
      ? "📖 章をタップして選ぼう（🏆がまだ付いていない章がおすすめ）"
      : "📚 本をタップして選ぼう（🏆がまだ付いていない本がおすすめ）";
    $("startBtn").style.opacity=.5; return;
  }
  $("poolInfo").textContent = "選択中 "+n+"問 → ぜんぶ出題（4択・○×は⭕❌で解答）";
  $("startBtn").style.opacity = 1;
}

$("selAll").onclick=()=>{ if(!activeBook) return; selectedCats=new Set(CATS.filter(c=>c.b===activeBook).map(c=>c.b+"|"+c.c)); renderStart(); };
$("selNone").onclick=()=>{ selectedCats=new Set(); renderStart(); };

/* ---- シャッフル ---- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---- 出題アイテム生成 ---- */
function mkOxItem(x){
  const opts=[{t:"⭕ 正しい",correct:x.t===true},{t:"❌ 誤り",correct:x.t===false}];
  return {b:"OX",c:"まとめてチェック",q:x.q,e:x.e,p:x.p,opts,ans:(x.t?0:1),speed:false,qid:oxId(x)};
}
function mkMcItem(x,speed){
  if(speed){
    const correct={t:x.o[x.a],correct:true};
    const others=x.o.filter((t,i)=>i!==x.a);
    const dis={t:others[Math.floor(Math.random()*others.length)],correct:false};
    const so=shuffle([correct,dis]);
    return {b:x.b,c:x.c,q:x.q,e:x.e,p:x.p,opts:so,ans:so.findIndex(o=>o.correct),speed:true,qid:mcId(x)};
  }
  const opts=x.o.map((t,i)=>({t,correct:i===x.a}));
  const so=shuffle(opts);
  return {b:x.b,c:x.c,q:x.q,e:x.e,p:x.p,opts:so,ans:so.findIndex(o=>o.correct),speed:false,qid:mcId(x)};
}

/* ---- スタート（選んだ章をぜんぶ出題） ---- */
$("startBtn").onclick=()=>{
  if(!profile) return;
  const p=pool(); if(p.length===0) return;
  const qs=shuffle(p).map(x=>mkItem(x));
  session={qs,idx:0,score:0,answers:[],mode:"mc"};
  show("quiz"); renderQ();
};

/* ---- 言語化（全章🏆で解放） ---- */
$("voiceBtn").onclick=()=>{
  if(!profile||!voiceUnlocked()) return;
  const qs=shuffle(VBANK).map(x=>({b:x.b,c:x.c,q:x.q,model:x.model,p:x.p,voice:true,speed:false,qid:"v:"+hashQ(x.q)}));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"voice"};
  show("quiz"); renderQ();
};

/* ---- 復習（まちがえた問題だけ） ---- */
$("reviewBtn").onclick=()=>{
  if(!profile) return;
  const m=loadM();
  const qs=shuffle(ALLBANK.filter(x=>{ const r=m[qidOf(x)]; return r&&!r.ok; }).map(x=>mkItem(x)));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"review"};
  show("quiz"); renderQ();
};

/* ---- 定着チャレンジ（⭐→🟢） ---- */
$("starBtn").onclick=()=>{
  if(!profile) return;
  const m=loadM();
  const qs=shuffle(ALLBANK.filter(x=>isStar(m,qidOf(x))).map(x=>mkItem(x)));
  if(!qs.length) return;
  session={qs,idx:0,score:0,answers:[],mode:"consolidate"};
  show("quiz"); renderQ();
};

/* ---- タイマー（2択スピード） ---- */
function clearTimer(){ if(qTimer){ clearInterval(qTimer); qTimer=null; } }
function startTimer(){
  const wrap=$("timerWrap"), bar=wrap.querySelector(".tbar");
  wrap.classList.remove("hidden"); bar.classList.remove("low");
  const dur=TSPEED*1000, t0=performance.now();
  $("tFill").style.width="100%"; $("tNum").textContent=TSPEED.toFixed(1);
  qTimer=setInterval(()=>{
    const left=dur-(performance.now()-t0);
    if(left<=0){ $("tFill").style.width="0%"; $("tNum").textContent="0.0"; clearTimer(); choose(-1,null); return; }
    const r=left/dur; $("tFill").style.width=(r*100)+"%"; $("tNum").textContent=(left/1000).toFixed(1);
    if(r<0.34) bar.classList.add("low");
  },100);
}

function show(which){
  ["start","quiz","result"].forEach(id=>$(id).classList.toggle("hidden",id!==which));
  window.scrollTo(0,0);
}

/* ---- 問題描画 ---- */
function renderQ(){
  clearTimer();
  const s=session, q=s.qs[s.idx];
  $("qtotal").textContent=s.qs.length;
  $("qpos").textContent=s.idx+1;
  $("scoreNow").textContent=s.score;
  $("pbarFill").style.width=((s.idx)/s.qs.length*100)+"%";
  $("qmeta").innerHTML='<span class="tag">'+BOOK_LABEL[q.b]+'</span><span>'+q.c+'</span>';
  $("qtext").textContent=q.q;
  const A=$("answers"); A.innerHTML="";
  const ex=$("explain"); ex.className="explain"; ex.innerHTML="";
  if(q.voice){
    const hint=document.createElement("div");
    hint.style.cssText="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:4px;";
    hint.textContent="🎤 まず自分の言葉で、声に出して説明しよう。言えたらタップ。";
    A.appendChild(hint);
    const b=document.createElement("button");
    b.className="ans";
    b.innerHTML='<span class="mk">💬</span>模範解答を見る';
    b.onclick=()=>revealModel(b);
    A.appendChild(b);
    if(q.done){
      b.disabled=true; b.classList.add("dim");
      ex.innerHTML="💬 <b>模範解答</b><br>"+q.model
        +'<span class="src">出典の目安：'+BOOK_LABEL[q.b]+" "+q.p+"</span>"
        +'<div style="margin-top:8px;font-weight:700;">'+(q.done.voice?"⭕ 言えた（自己採点済み）":"❌ まだ（自己採点済み）")+'</div>';
      ex.classList.add("show");
    }
  } else {
    const letters=(q.b==="OX")?["○","×"]:["A","B","C","D","E"];
    q.opts.forEach((o,i)=>{
      const b=document.createElement("button");
      b.className="ans";
      b.innerHTML='<span class="mk">'+letters[i]+'</span>'+o.t;
      b.onclick=()=>choose(i,b);
      A.appendChild(b);
    });
    if(q.done) paintDone(q);
  }
  updateNav();
  if(q.speed && !q.done){ startTimer(); } else { $("timerWrap").classList.add("hidden"); }
}

/* ---- 解答済み表示とナビゲーション ---- */
function paintDone(q){
  const btns=[...$("answers").children];
  btns.forEach((b,j)=>{
    b.disabled=true;
    if(j===q.ans) b.classList.add("correct");
    if(q.done.sel>=0 && j===q.done.sel && q.done.sel!==q.ans) b.classList.add("wrong");
    if(j!==q.ans && j!==q.done.sel) b.classList.add("dim");
  });
  const ok=(q.done.sel===q.ans);
  const ex=$("explain");
  const srcLabel=(q.b==="実戦")?("応用問題｜根拠："+q.p)
    :(q.b==="OX")?("正誤クイズ｜根拠："+q.p)
    :("出典の目安："+BOOK_LABEL[q.b]+" "+q.p);
  const head = ok ? "⭕ <b>正解！</b>" : (q.done.sel<0 ? "⏱ <b>時間切れ</b>　正解は「"+q.opts[q.ans].t+"」" : "❌ <b>不正解</b>　正解は「"+q.opts[q.ans].t+"」");
  ex.innerHTML=head+"<br>"+q.e+'<span class="src">'+srcLabel+"</span>";
  ex.classList.add("show");
}
function updateNav(){
  const s=session, q=s.qs[s.idx];
  $("prevBtn").classList.toggle("hidden", s.idx===0);
  const nb=$("nextBtn");
  nb.classList.toggle("hidden", !q.done);
  nb.textContent = (s.idx===s.qs.length-1)?"結果を見る ▶":"次の問題 ▶";
}
$("prevBtn").onclick=()=>{ const s=session; if(s&&s.idx>0){ clearTimer(); s.idx--; renderQ(); } };

/* ---- 言語化：模範解答と自己採点 ---- */
function revealModel(btn){
  const s=session, q=s.qs[s.idx];
  btn.disabled=true; btn.classList.add("dim");
  const ex=$("explain");
  ex.innerHTML="💬 <b>模範解答</b><br>"+q.model
    +'<span class="src">出典の目安：'+BOOK_LABEL[q.b]+" "+q.p+"</span>"
    +'<div style="margin-top:12px;display:flex;gap:8px;">'
    +'<button class="btn" style="margin-top:0;padding:12px;font-size:15px;" id="sgOk">⭕ 言えた</button>'
    +'<button class="btn lite" style="margin-top:0;padding:12px;font-size:15px;" id="sgNg">❌ まだ</button>'
    +'</div>';
  ex.classList.add("show");
  $("sgOk").onclick=()=>gradeSelf(true);
  $("sgNg").onclick=()=>gradeSelf(false);
}
function gradeSelf(ok){
  const s=session, q=s.qs[s.idx];
  if(q.done) return;
  q.done={voice:ok};
  if(ok) s.score++;
  recordAnswer(q.qid, ok);
  s.answers.push({q:q.q, your: ok?"⭕ 言えた（自己採点）":"❌ まだ（自己採点）", correct:q.model, ok, e:"", p:q.p, book:q.b, c:q.c});
  $("scoreNow").textContent=s.score;
  $("sgOk").disabled=true; $("sgNg").disabled=true;
  updateNav();
}

/* ---- 回答 ---- */
function choose(i,btn){
  clearTimer();
  $("timerWrap").classList.add("hidden");
  const s=session, q=s.qs[s.idx];
  if(q.done) return; // 解答済み（もどるで再訪中）は再回答不可
  q.done={sel:i};
  const ok=(i===q.ans);
  if(ok) s.score++;
  // 2択スピードの正解はマスター判定に入れない（腕試し用）。ミスは復習プールへ。
  if(!(q.speed && ok)) recordAnswer(q.qid, ok, !q.speed);
  const yourText = (i<0) ? "（時間切れ）" : q.opts[i].t;
  s.answers.push({q:q.q, your:yourText, correct:q.opts[q.ans].t, ok, e:q.e, p:q.p, book:q.b, c:q.c});
  $("scoreNow").textContent=s.score;
  paintDone(q);
  updateNav();
}

$("nextBtn").onclick=()=>{
  const s=session;
  if(s.idx===s.qs.length-1){ finish(); }
  else { s.idx++; renderQ(); }
};
$("quitBtn").onclick=()=>{ if(confirm("クイズをやめて範囲選択にもどりますか？")){ clearTimer(); show("start"); } };

/* ---- 結果 ---- */
function finish(){
  clearTimer();
  $("timerWrap").classList.add("hidden");
  const s=session;
  const total=s.qs.length, sc=s.score, pct=Math.round(sc/total*100);
  $("pbarFill").style.width="100%";
  $("rPct").textContent=pct+"%";
  $("rFrac").textContent=sc+" / "+total;
  // リング
  const C=2*Math.PI*70;
  const ring=$("ring");
  ring.style.strokeDasharray=C;
  ring.style.strokeDashoffset=C;
  ring.style.stroke = pct>=80?"#1f9d55":pct>=50?"#e8b53b":"#d8473b";
  setTimeout(()=>{ ring.style.transition="stroke-dashoffset 1s ease"; ring.style.strokeDashoffset=C*(1-sc/total); },60);
  let msg,sub;
  if(pct===100){msg="満点！配球マスター ⚾👑";sub="文句なし。実戦でも根拠ある1球を。";}
  else if(pct>=80){msg="お見事！正捕手級 🧤";sub="ほぼ理解できています。間違えた所だけ復習を。";}
  else if(pct>=50){msg="いい調子！あと一歩 💪";sub="苦手な章を選んで反復しよう。";}
  else {msg="ここから伸びる！🌱";sub="解説を読みながらもう一周がおすすめ。";}
  if(profile){
    const nWrong=wrongCount(loadM());
    sub += nWrong>0 ? "　🔁 復習プール："+nWrong+"問" : "　🔁 復習プールはゼロ！🎉";
  }
  $("rMsg").textContent=msg; $("rSub").textContent=sub;
  // 復習（間違いのみ）
  const wrong=s.answers.filter(a=>!a.ok);
  const R=$("review");
  if(wrong.length){
    R.innerHTML="<h3>復習（まちがえた "+wrong.length+" 問）</h3>"+wrong.map(a=>
      '<div class="rev-item"><div class="q">Q. '+a.q+'</div>'
      +'<div>あなた：<span class="y">'+a.your+'</span></div>'
      +'<div>正解：<span class="a">'+a.correct+'</span></div>'
      +'<div style="margin-top:6px;color:#445;">'+a.e+'</div></div>').join("");
  } else {
    R.innerHTML='<h3>全問正解！復習はありません 🎉</h3>';
  }
  show("result");
}
$("againBtn").onclick=()=>{ $("startBtn").click(); };
$("homeBtn").onclick=()=>{ show("start"); };

/* 初期化 */
renderStart();
</script>
</body>
